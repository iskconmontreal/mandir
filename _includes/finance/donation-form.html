<!-- Income existing modal -->
<template id="don-existing-modal-template">
<div class="modal-overlay" :onkeydown.esc.document="cancelAdd()">
  <div class="modal" :onclick.outside="cancelAdd()">
    <div class="modal-header">
      <h2 style="display:flex;align-items:center;gap:var(--s-sm)">
        <span :text="location.pathname.includes('/app/finance') ? 'Edit Income' : 'Edit donation'"></span>
        <span :if="detailDon?.id" class="dim modal-title-sub" :text="'#' + detailDon?.id"></span>
      </h2>
      <button class="modal-close" type="button" aria-label="Close dialog" :onclick="cancelAdd()" :html="icon('close')"></button>
    </div>
    <div class="modal-body">
      <div style="display:flex;flex-direction:column;gap:var(--s-md)">
        <form id="don-existing-form" :onsubmit.prevent="saveDonation" style="display:flex;flex-direction:column;gap:var(--s-md)">
          {% include partials/donation-fields.html %}
          <div class="form-warn" :if="addErr" :text="addErr"></div>
        </form>

        <div :if="detailDon" style="display:flex;flex-direction:column;gap:var(--s-sm)">
          <label>History</label>
          <div class="activity-feed" :if="donHistory.length">
            <div class="activity-item" :each="h in donHistory">
              <span class="activity-marker" :class="'activity-marker-' + h.badge" :html="activityIcon(h.badge)"></span>
              <div class="activity-copy">
                <div class="activity-line">
                  <span class="activity-label" :text="h.label"></span>
                  <span :if="h.actor"> by </span>
                  <a class="activity-actor-link" :if="h.actor && h.uid" href="{{ '/app/members/' | relative_url }}" :text="h.actor"></a>
                  <span :if="h.actor && !h.uid" :text="h.actor"></span>
                  <span :if="h.detail" class="activity-detail" :text="h.detail"></span>
                  <time class="activity-date-inline" :if="h.date" :text="timelineShortDate(h.date)" :datetime="h.date" :title="new Date(h.date).toLocaleString()"></time>
                </div>
              </div>
            </div>
          </div>
          <div :if="!donHistory.length" class="dim" style="font-size:var(--f-sm)">No activity yet</div>
        </div>

        <div style="display:flex; justify-content:flex-end; gap:var(--s-sm); align-items:center; flex-wrap:wrap">
          <button :if="editId && !delConfirm" type="button" class="btn btn-danger" style="margin-right:auto" :onclick="delConfirm = true">Delete</button>
          <button :if="editId && !delConfirm" type="button" class="btn btn-secondary" :onclick="printDonation(detailDon)">Print</button>
          <span :if="editId && delConfirm" class="dim" style="font-size:var(--f-sm); margin-right:auto; align-self:center">Delete permanently?</span>
          <button :if="editId && delConfirm" type="button" class="btn btn-danger" :class="{'btn-loading': deleting}" :onclick="delDonation()">Yes</button>
          <button :if="editId && delConfirm" type="button" class="btn btn-outline" :onclick="delConfirm = false">No</button>
          <button :if="!delConfirm" type="button" class="btn btn-outline" :onclick="cancelDonationEdit()">Cancel</button>
          <button :if="!delConfirm" type="submit" form="don-existing-form" :class="donSaving ? 'btn btn-primary btn-loading' : 'btn btn-primary'">Update</button>
        </div>
      </div>
    </div>
  </div>
</div>
</template>

<!-- Income create modal -->
<template id="don-create-modal-template">
<div class="modal-overlay" :onkeydown.esc.document="cancelAdd()">
  <div class="modal" :onclick.outside="cancelAdd()">
    <div class="modal-header">
      <h2 :text="location.pathname.includes('/app/finance') ? 'Add Income' : 'Add donation'"></h2>
      <button class="modal-close" type="button" aria-label="Close dialog" :onclick="cancelAdd()" :html="icon('close')"></button>
    </div>
    <div class="modal-body">
      <form :onsubmit.prevent="saveDonation" style="display:flex;flex-direction:column;gap:var(--s-md)">
        {% include partials/donation-fields.html %}

        <div class="form-warn" :if="addErr" :text="addErr"></div>

        <div style="display:flex; justify-content:flex-end; gap:var(--s-sm)">
          <button type="button" class="btn btn-outline" :onclick="cancelAdd()">Cancel</button>
          <button type="submit" :class="donSaving ? 'btn btn-primary btn-loading' : 'btn btn-primary'">Save</button>
        </div>
      </form>
    </div>
  </div>
</div>
</template>

<div :html="showAdd && activeTab === 'income'
  ? document.getElementById(
      donMode === 'create'
        ? 'don-create-modal-template'
        : 'don-existing-modal-template'
    )
  : ''"></div>
