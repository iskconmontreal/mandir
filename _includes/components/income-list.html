<define-element>
  <income-list years:array mopen:object mfresh:string="" loading:boolean="false" error:string="" search:string="" hasmore:boolean="false" empty:boolean="false" nomatch:boolean="false">
    <style>:host { display: contents; }</style>
    <template>
      <div :if="error" class="login-error" :text="error" style="margin:var(--s-md)"></div>
      <div :if="loading" class="dim" style="text-align:center;padding:var(--s-lg)">Loading…</div>
      <div :if="empty" class="dim" style="text-align:center;padding:var(--s-xl)">No income yet</div>
      <div :if="nomatch" class="dim" style="text-align:center;padding:var(--s-lg)">No income matches filters</div>
      <div :each="yr in years" class="finance-year-section">
        <div class="finance-year-sticky" :if="yr.key !== 'unknown'" :text="yr.key"></div>
        <div class="finance-year-months">
          <div :each="(g, gi) in yr.items" :class="{'finance-month-wrap-open': mopen[g.key], 'finance-month-wrap-divider': gi > 0}">
            <button type="button" class="exp-group-header" :class="{'exp-group-header-open': mopen[g.key], 'exp-group-header-empty': !g.count}" :aria-expanded="mopen[g.key] ? 'true' : 'false'" :disabled="!g.count" :onclick="e => g.count && _toggle(g.key)">
              <span class="exp-group-chevron" :html="icon('chevron_down')"></span>
              <span class="exp-group-heading">
                <span class="exp-group-label">
                  <span class="finance-month-label-desktop" :text="fmtMonthShort(g.key)"></span>
                  <span class="finance-month-label-mobile" :text="fmtMonth(g.key)"></span>
                </span>
                <span :if="g.count" class="exp-group-count" :text="g.count"></span>
              </span>
              <span class="exp-group-total" :text="'$' + fmtAmt(g.total || 0)"></span>
              <span :if="g.breakdown?.length" class="exp-group-breakdown">
                <span :each="seg in g.breakdown" class="exp-group-breakdown-seg" :title="seg.title" :style="seg.style"></span>
              </span>
            </button>
            <div class="recent-inc-list finance-exp-list finance-inc-list-group" :class="{'finance-exp-list-open': mopen[g.key], 'finance-exp-list-fresh': mfresh === g.key}" :aria-hidden="mopen[g.key] ? 'false' : 'true'">
              <div :each="d in g.items" class="recent-inc-item row-link finance-inc-item" :onclick="e => _emit('view', d)">
                <span class="recent-inc-icon-col" :class="'recent-inc-icon-' + (d.method || 'cash')">
                  <span class="recent-inc-icon" :html="methodIcon(d.method || 'cash')"></span>
                </span>
                <div class="recent-inc-main">
                  <div class="recent-inc-info">
                    <div class="recent-inc-title-row">
                      <div style="display:flex;align-items:baseline;gap:var(--s-xs);flex-wrap:wrap">
                        <div class="recent-inc-title" :html="hl(d.source_name || d.member_name || 'Anonymous', search || '')"></div>
                        <span :if="d.id" class="recent-inc-title-sub dim" :text="'#' + d.id"></span>
                      </div>
                    </div>
                    <div class="recent-inc-subtitle">
                      <span class="recent-inc-method" :class="'recent-inc-method-' + (d.method || 'cash')" :text="d.method || 'cash'"></span>
                      <time class="recent-inc-time" :datetime="d.date_received || d.created_at || ''" :title="(d.date_received || d.created_at) ? new Date(d.date_received || d.created_at).toLocaleString() : ''" :text="fmtDate(d.date_received || d.created_at)"></time>
                    </div>
                  </div>
                  <div :if="d.attachments?.length" class="row-attachments">
                    <img :each="a in (d.attachments || []).slice(0, 4)" :if="a.mime_type?.startsWith('image/')" class="row-attach-thumb" :src="apiBase + '/' + a.file_path" :alt="a.original_name">
                    <span :each="a in (d.attachments || []).slice(0, 4)" :if="!a.mime_type?.startsWith('image/')" class="row-attach-file" :title="a.original_name" :html="icon('attach')"></span>
                  </div>
                </div>
                <span class="recent-inc-actions" :onclick.stop="">
                  <button type="button" class="btn btn-sm btn-outline" aria-label="Print receipt" :onclick.stop="e => _emit('print', d)" :html="printIcon + ' Print'"></button>
                </span>
                <div class="recent-inc-type">
                  <span class="badge" :class="catCls((d.type || 'donation') === 'donation' ? (d.category || 'general') : (d.type || 'other'))" :text="fmtCat((d.type || 'donation') === 'donation' ? (d.category || 'general') : (d.type || 'other'))"></span>
                </div>
                <div class="recent-inc-amount">
                  <div class="recent-inc-value stat-ok" :text="'+$' + fmtAmt(d.amount || 0)"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div :if="hasmore" class="scroll-sentinel"><span class="load-spinner"></span></div>
    </template>
  </income-list>
</define-element>
