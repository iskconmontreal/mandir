---
---
<div class="page-header" style="display:flex; align-items:baseline; justify-content:space-between">
  <div>
    <h1>Members</h1>
  </div>
  <div style="display:flex; gap:var(--s-sm)">
    <button class="btn btn-primary btn-sm" :onclick="openAdd()">+ Add Member</button>
  </div>
</div>

<!-- Edit / Add modal -->
<div class="modal-overlay" :if="showEdit" :onclick="e => { if (e.target === e.currentTarget) closeEdit() }">
  <div class="modal">
    <div class="modal-header">
      <h2 :text="editing ? 'Edit Member' : 'Add Member'"></h2>
      <button class="modal-close" :onclick="closeEdit()">&times;</button>
    </div>
    <div class="modal-body">
      <form :onsubmit.prevent="saveMember">
        <div class="form-row">
          <div class="field">
            <label for="m-first">First Name</label>
            <input id="m-first" type="text" :value="form.first_name" placeholder="Legal first name" required>
          </div>
          <div class="field">
            <label for="m-last">Last Name</label>
            <input id="m-last" type="text" :value="form.last_name" placeholder="Family name" required>
          </div>
        </div>
        <div class="form-row">
          <div class="field">
            <label for="m-email">Email</label>
            <input id="m-email" type="email" :value="form.email" placeholder="email@example.com">
          </div>
          <div class="field">
            <label for="m-phone">Phone</label>
            <input id="m-phone" type="tel" :value="form.phone" placeholder="514-000-0000">
          </div>
        </div>
        <div class="form-row">
          <div class="field">
            <label for="m-role">Role</label>
            <select id="m-role" :value="form.role">
              <option :each="r in roles" :value="r" :text="r"></option>
            </select>
          </div>
          <div class="field">
            <label for="m-joined">Joined</label>
            <input id="m-joined" type="date" :value="form.joined">
          </div>
        </div>
        <div class="field">
          <label for="m-notes">Notes</label>
          <textarea id="m-notes" :value="form.notes" placeholder="Optional…" rows="2"></textarea>
        </div>

        <details>
          <summary style="cursor:pointer; font-weight:600; margin-bottom:var(--s-sm); color:var(--c-text-dim)">Personal Details</summary>
          <div style="gap:var(--s-md); display:flex; flex-direction:column">
            <div class="form-row">
              <div class="field">
                <label for="m-dob">Date of Birth</label>
                <input id="m-dob" type="date" :value="form.dob">
              </div>
              <div class="field">
                <label for="m-gender">Gender</label>
                <select id="m-gender" :value="form.gender">
                  <option value="">—</option>
                  <option value="Male">Male</option>
                  <option value="Female">Female</option>
                </select>
              </div>
            </div>
            <div class="form-row">
              <div class="field">
                <label for="m-nationality">Nationality</label>
                <input id="m-nationality" type="text" :value="form.nationality">
              </div>
              <div class="field">
                <label for="m-occupation">Occupation</label>
                <input id="m-occupation" type="text" :value="form.occupation">
              </div>
            </div>
            <div class="field">
              <label for="m-address">Address</label>
              <textarea id="m-address" :value="form.address" placeholder="For tax receipts…" rows="2"></textarea>
            </div>
            <div class="form-row">
              <div class="field">
                <label for="m-marriage">Marriage Status</label>
                <select id="m-marriage" :value="form.marriage_status">
                  <option value="">—</option>
                  <option value="Single">Single</option>
                  <option value="Married">Married</option>
                  <option value="Widowed">Widowed</option>
                </select>
              </div>
              <div class="field">
                <label for="m-spouse">Spouse</label>
                <input id="m-spouse" type="text" :value="form.spouse" placeholder="Name; KC status">
              </div>
            </div>
            <div class="field">
              <label for="m-children">Children</label>
              <input id="m-children" type="text" :value="form.children" placeholder="Names and ages">
            </div>
          </div>
        </details>

        <details>
          <summary style="cursor:pointer; font-weight:600; margin-bottom:var(--s-sm); color:var(--c-text-dim)">Spiritual Details</summary>
          <div style="gap:var(--s-md); display:flex; flex-direction:column">
            <div class="form-row">
              <div class="field">
                <label for="m-initiated">Initiated Name</label>
                <input id="m-initiated" type="text" :value="form.initiated_name" placeholder="Spiritual name">
              </div>
              <div class="field">
                <label for="m-guru">Diksa Guru</label>
                <input id="m-guru" type="text" :value="form.diksa_guru" placeholder="Initiating spiritual master">
              </div>
            </div>
            <div class="field">
              <label for="m-guide">Guiding Devotee</label>
              <input id="m-guide" type="text" :value="form.guiding_devotee" placeholder="Siksa guru / mentor">
            </div>
            <div class="form-row">
              <div class="field">
                <label for="m-rounds">Japa Rounds</label>
                <input id="m-rounds" type="number" :value="form.rounds" placeholder="16" min="0">
              </div>
              <div class="field">
                <label for="m-rounds-years">Chanting for (years)</label>
                <input id="m-rounds-years" type="number" :value="form.rounds_years" min="0">
              </div>
            </div>
            <div class="form-row">
              <div class="field">
                <label for="m-regs-years">4 Regs for (years)</label>
                <input id="m-regs-years" type="number" :value="form.four_regs_years" min="0">
              </div>
              <div class="field">
                <label for="m-kc-years">Years in KC</label>
                <input id="m-kc-years" type="number" :value="form.kc_years" min="0">
              </div>
            </div>
            <div class="form-row">
              <div class="field">
                <label for="m-temple">Temple</label>
                <input id="m-temple" type="text" :value="form.temple" placeholder="ISKCON Montreal">
              </div>
              <div class="field">
                <label for="m-services">Services</label>
                <input id="m-services" type="text" :value="form.services" placeholder="Cooking, pujari, etc.">
              </div>
            </div>
            <div class="form-row">
              <div class="field" style="display:flex; align-items:center; gap:var(--s-sm); min-height:2.5rem">
                <input id="m-temple-live" type="checkbox" :checked="form.lives_in_temple" style="width:auto">
                <label for="m-temple-live" style="margin:0">Lives in temple</label>
              </div>
              <div class="field" style="display:flex; align-items:center; gap:var(--s-sm); min-height:2.5rem">
                <input id="m-namahatta" type="checkbox" :checked="form.namahatta" style="width:auto">
                <label for="m-namahatta" style="margin:0">Namahatta member</label>
              </div>
            </div>
          </div>
        </details>

        <div class="field" :if="editing" style="margin-bottom:var(--s-md)">
          <label for="m-status">Status</label>
          <input id="m-status" type="text" :value="form.status" placeholder="Leave blank if active. E.g. Moved away, Passed away…">
        </div>

        <div class="login-error" :if="formErr" :text="formErr" style="margin-bottom:var(--s-sm)"></div>

        <div style="display:flex; justify-content:flex-end; gap:var(--s-sm); margin-top:var(--s-lg)">
          <button type="button" class="btn btn-outline" :onclick="closeEdit()">Cancel</button>
          <button type="submit" class="btn btn-primary" :class="{dim: saving}" :text="saving ? 'Saving…' : 'Save'"></button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Member detail modal -->
<div class="modal-overlay" :if="showDetail" :onclick="e => { if (e.target === e.currentTarget) closeDetail() }">
  <div class="modal">
    <div class="modal-header">
      <h2 :text="detail.first_name + ' ' + detail.last_name"></h2>
      <button class="modal-close" :onclick="closeDetail()">&times;</button>
    </div>
    <div class="modal-body" style="display:flex; flex-direction:column; gap:var(--s-md)">
      <div style="display:flex; gap:var(--s-lg); flex-wrap:wrap">
        <div>
          <div class="stat-label">Email</div>
          <div :text="detail.email || '—'"></div>
        </div>
        <div>
          <div class="stat-label">Phone</div>
          <div :text="detail.phone || '—'"></div>
        </div>
        <div>
          <div class="stat-label">Role</div>
          <span class="badge" :text="detail.role || '—'"></span>
        </div>
        <div>
          <div class="stat-label">Joined</div>
          <div :text="detail.joined || '—'"></div>
        </div>
      </div>

      <div :if="detail.initiated_name || detail.diksa_guru" style="display:flex; gap:var(--s-lg); flex-wrap:wrap">
        <div :if="detail.initiated_name">
          <div class="stat-label">Initiated Name</div>
          <div :text="detail.initiated_name"></div>
        </div>
        <div :if="detail.diksa_guru">
          <div class="stat-label">Diksa Guru</div>
          <div :text="detail.diksa_guru"></div>
        </div>
      </div>

      <div :if="detail.notes" style="font-size:var(--f-sm); color:var(--c-text-dim)" :text="detail.notes"></div>

      <!-- System account section -->
      <div :if="detail._user_id && can('users:view')" style="border-top:1px solid var(--c-border); padding-top:var(--s-md)">
        <div style="display:flex; align-items:center; gap:var(--s-sm); margin-bottom:var(--s-sm)">
          <span class="badge" style="background:rgba(107,92,231,.1); color:var(--c-accent)">System User</span>
        </div>
        <div style="display:flex; gap:var(--s-lg); flex-wrap:wrap; font-size:var(--f-sm)">
          <div>
            <div class="stat-label">Role</div>
            <div :if="!can('roles:update')" :text="userRoleName(userDetail)"></div>
            <select :if="can('roles:update')" style="width:auto; font-size:var(--f-sm)"
              :onchange="e => changeRole(+e.target.value)">
              <option value="0" :selected="!userDetail.role_id">None</option>
              <option :each="r in sysRoles" :value="r.id" :text="r.name" :selected="r.id === userDetail.role_id"></option>
            </select>
          </div>
          <div :if="pendingRoleId" style="flex-basis:100%; display:flex; gap:var(--s-xs); align-items:center">
            <input type="password" placeholder="Set password for this role" :value="rolePassword"
              :oninput="e => rolePassword = e.target.value"
              style="font-size:var(--f-sm); padding:var(--s-xs) var(--s-sm); width:14rem">
            <button class="btn btn-primary btn-sm" :onclick="confirmRolePassword()">Set</button>
            <button class="btn btn-outline btn-sm" :onclick="pendingRoleId = null">Cancel</button>
            <span :if="rolePasswordErr" class="login-error" style="font-size:var(--f-xs)" :text="rolePasswordErr"></span>
          </div>
          <div>
            <div class="stat-label">Last Login</div>
            <div :text="userDetail.last_login?.slice(0, 10) || 'Never'"></div>
          </div>
          <div :if="userDetail.id">
            <div class="stat-label">Trusted Devices</div>
            <div :if="!userDetail.devices?.length" class="dim">None</div>
            <div :each="d in userDetail.devices || []" style="display:flex; align-items:center; gap:var(--s-sm); font-size:var(--f-sm)">
              <span :text="d.label || d.device_id?.slice(0, 8) + '…'"></span>
              <span class="dim" :text="'(' + d.device_id?.slice(0, 8) + '…)'"></span>
            </div>
            <button :if="userDetail.devices?.length" class="btn-link" style="color:var(--c-err); font-size:var(--f-sm); margin-top:var(--s-xs)" :onclick="revokeDevice()" :class="{dim: revoking}">Revoke all</button>
          </div>
        </div>

        <!-- Permission grid -->
        <div :if="can('roles:update') && userDetail.role_id" style="margin-top:var(--s-md)">
          <div class="stat-label" style="margin-bottom:var(--s-xs)">Permissions</div>
          <div style="display:grid; grid-template-columns:repeat(auto-fill, minmax(11rem, 1fr)); gap:var(--s-xs)">
            <label :each="p in allPerms" style="display:flex; align-items:center; gap:var(--s-xs); font-size:var(--f-sm); cursor:pointer">
              <input type="checkbox" style="width:auto"
                :checked="userRolePerms.includes(p.key)"
                :onchange="e => togglePerm(p.id, e.target.checked)">
              <span :text="fmtPerm(p.key)"></span>
            </label>
          </div>
          <div class="dim" style="font-size:var(--f-xs); margin-top:var(--s-xs)">Changes apply to all users with this role</div>
        </div>
      </div>

      <!-- Invite section (no account yet) -->
      <div :if="!detail._user_id && detail.email" style="border-top:1px solid var(--c-border); padding-top:var(--s-md)">
        <div class="dim" style="font-size:var(--f-sm); margin-bottom:var(--s-sm)">No system account</div>
        <button class="btn btn-outline btn-sm" :onclick="inviteMember()" :class="{dim: inviting}">Send Invite</button>
      </div>

      <div style="display:flex; justify-content:flex-end; gap:var(--s-sm); border-top:1px solid var(--c-border); padding-top:var(--s-md)">
        <button class="btn btn-outline btn-sm" :onclick="editFromDetail()">Edit</button>
      </div>
    </div>
  </div>
</div>

<!-- Filter bar -->
<div class="filter-bar">
  <input class="filter-search" type="search" placeholder="Search name, email or phone…"
    :value="search" :oninput.debounce-150="e => { search = e.target.value; page = 1; load() }">
  <select :onchange="e => { filterRole = e.target.value; load() }" style="width:auto">
    <option value="">All roles</option>
    <option :each="r in roles" :value="r" :text="r"></option>
  </select>
  <button class="btn btn-outline btn-sm" :if="search || filterRole" :onclick="e => { search = ''; filterRole = ''; load() }">Clear</button>
</div>

<!-- Members list -->
<div class="card">
  <div :if="loadErr" class="login-error" :text="loadErr" style="margin:var(--s-md)"></div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Role</th>
          <th>Joined</th>
        </tr>
      </thead>
      <tbody>
        <tr :each="m in members" :class="{'dim': m.status}" style="cursor:pointer" :onclick="openDetail(m)">
          <td>
            <span :text="m.first_name + ' ' + m.last_name"></span>
            <span :if="m.status" class="badge" style="margin-left:var(--s-xs); font-size:var(--f-xs)" :text="m.status"></span>
            <span :if="m._user_id" class="badge" style="margin-left:var(--s-xs); font-size:var(--f-xs); background:rgba(107,92,231,.1); color:var(--c-accent)">User</span>
          </td>
          <td :text="m.email || '—'"></td>
          <td :text="m.phone || '—'"></td>
          <td><span class="badge" :text="m.role || '—'"></span></td>
          <td class="dim" :text="m.joined || '—'"></td>
        </tr>
        <tr :if="!members.length && !loadErr">
          <td colspan="5" class="dim" style="text-align:center; padding:var(--s-lg)" :text="loading ? 'Loading…' : 'No members found'"></td>
        </tr>
      </tbody>
    </table>
  </div>
  <div :if="totalPages > 1" style="display:flex; justify-content:space-between; align-items:center; padding:var(--s-sm) var(--s-md); border-top:1px solid var(--c-border)">
    <span class="dim" style="font-size:var(--f-sm)" :text="total + ' members'"></span>
    <div style="display:flex; gap:var(--s-xs)">
      <button class="btn btn-outline btn-sm" :onclick="page = Math.max(1, page - 1); load()" :class="{dim: page === 1}">←</button>
      <span style="padding:var(--s-xs) var(--s-sm); font-size:var(--f-sm)" :text="page + ' / ' + totalPages"></span>
      <button class="btn btn-outline btn-sm" :onclick="page = Math.min(totalPages, page + 1); load()" :class="{dim: page === totalPages}">→</button>
    </div>
  </div>
</div>

<script type="module">
  import { init, ROLES, auth, fmtCat } from '../lib/app.js'
  import { api } from '../lib/api.js'

  const today = new Date().toISOString().slice(0, 10)
  const perPage = 20

  const emptyForm = () => ({
    first_name: '', last_name: '', email: '', phone: '', role: 'Devotee', joined: today,
    address: '', notes: '', status: '',
    initiated_name: '', diksa_guru: '', guiding_devotee: '', services: '',
    rounds: '', rounds_years: '', four_regs_years: '',
    kc_years: '', temple: '', dob: '', gender: '', nationality: '', occupation: '',
    marriage_status: '', spouse: '', children: '',
    lives_in_temple: false, namahatta: false
  })

  function toMember(c) {
    const d = typeof c.client === 'string' ? JSON.parse(c.client) : c.client
    return { _id: c.id, _public: c.public_id, _user_id: c.user_id, ...d }
  }

  const s = init({
    showEdit: false,
    showDetail: false,
    editing: null,
    form: emptyForm(),
    detail: {},
    userDetail: {},
    sysRoles: [],
    allPerms: [],
    members: [],
    total: 0,
    roles: ROLES,
    loading: false,
    saving: false,
    inviting: false,
    revoking: false,
    pendingRoleId: null,
    rolePassword: '',
    rolePasswordErr: null,
    loadErr: null,
    formErr: null,
    search: '',
    filterRole: '',
    page: 1,

    get totalPages() { return Math.max(1, Math.ceil(this.total / perPage)) },

    get userRolePerms() {
      const role = this.sysRoles.find(r => r.id === this.userDetail.role_id)
      return role?.permissions || []
    },

    fmtPerm(key) {
      const [scope, action] = key.split(':')
      return fmtCat(scope) + ' — ' + action
    },

    openAdd() {
      s.editing = null
      s.form = emptyForm()
      s.formErr = null
      s.showEdit = true
    },

    async openDetail(m) {
      s.detail = m
      s.userDetail = {}
      s.showDetail = true
      if (m._user_id && auth.can('users:view')) {
        try { s.userDetail = await api.getUser(m._user_id) }
        catch {}
        if (auth.can('roles:update') && !s.sysRoles.length) {
          try {
            const res = await api.getRoles()
            s.sysRoles = res.roles || []
            s.allPerms = res.all_permissions || []
          } catch {}
        }
      }
    },

    closeDetail() {
      s.showDetail = false
      s.detail = {}
      s.userDetail = {}
      s.pendingRoleId = null
      s.rolePassword = ''
      s.rolePasswordErr = null
    },

    editFromDetail() {
      const m = s.detail
      s.showDetail = false
      s.editing = m
      s.form = { ...m }
      s.formErr = null
      s.showEdit = true
    },

    closeEdit() {
      s.showEdit = false
      s.editing = null
      s.form = emptyForm()
      s.formErr = null
    },

    async saveMember() {
      s.formErr = null
      s.saving = true
      const data = { ...s.form }
      delete data._id
      delete data._public
      delete data._user_id
      try {
        if (s.editing) {
          await api.updateMember(s.editing._id, data)
          const updated = { ...s.editing, ...data }
          s.closeEdit()
          s.openDetail(updated)
        } else {
          await api.createMember(data)
          s.closeEdit()
        }
        load()
      } catch (e) {
        s.formErr = e.message || 'Failed to save member'
      } finally {
        s.saving = false
      }
    },

    async inviteMember() {
      if (!confirm(`Send invite to ${s.detail.email}?`)) return
      s.inviting = true
      try {
        await api.inviteMember(s.detail._id)
        alert(`Invite sent to ${s.detail.email}`)
      } catch (e) {
        alert(e.message || 'Failed to send invite')
      } finally { s.inviting = false }
    },

    async changeRole(roleId) {
      s.rolePassword = ''
      s.rolePasswordErr = null
      s.pendingRoleId = null
      try {
        await api.updateUser(s.userDetail.id, { role_id: roleId })
        s.userDetail = { ...s.userDetail, role_id: roleId }
      } catch (e) {
        if (e.message === 'Password required for this role') {
          s.pendingRoleId = roleId
          return
        }
        alert(e.message || 'Failed to change role')
      }
    },

    async confirmRolePassword() {
      if (!s.rolePassword) return
      s.rolePasswordErr = null
      try {
        await api.updateUser(s.userDetail.id, { role_id: s.pendingRoleId, password: s.rolePassword })
        s.userDetail = { ...s.userDetail, role_id: s.pendingRoleId }
        s.pendingRoleId = null
        s.rolePassword = ''
      } catch (e) {
        s.rolePasswordErr = e.message || 'Failed to change role'
      }
    },

    async togglePerm(permId, enabled) {
      const roleId = s.userDetail.role_id
      try {
        await api.updateRolePerms(roleId, { permission_id: permId, enabled })
        const res = await api.getRoles()
        s.sysRoles = res.roles || []
      } catch (e) { alert(e.message || 'Failed to update permission') }
    },

    async revokeDevice() {
      s.revoking = true
      try {
        await api.revokeDevice(s.userDetail.id)
        s.userDetail = { ...s.userDetail, devices: [] }
      } catch (e) { alert(e.message || 'Failed to revoke') }
      finally { s.revoking = false }
    },

    userRoleName(u) {
      if (!u.role?.role) return ''
      const r = typeof u.role.role === 'string' ? JSON.parse(u.role.role) : u.role.role
      return r.name || ''
    },

    load,
  })

  async function load() {
    s.loading = true
    s.loadErr = null
    try {
      const params = { page: s.page, itemsPerPage: perPage }
      if (s.search) params.search = s.search
      if (s.filterRole) params['client.role'] = s.filterRole
      const res = await api.getMembers(params)
      s.members = (res.items || []).map(toMember)
      s.total = res.total || 0
    } catch (e) {
      s.loadErr = e.message || 'Failed to load members'
    } finally {
      s.loading = false
    }
  }

  load()
</script>
