---
---
<div class="page-header">
  <h1>Profile</h1>
  <p>Your account details</p>
</div>

<div class="card" style="margin-bottom:var(--s-xl)">
  <div style="display:flex; gap:var(--s-lg); flex-wrap:wrap">
    <div>
      <div class="stat-label">Name</div>
      <div :text="fullName"></div>
    </div>
    <div>
      <div class="stat-label">Email</div>
      <div :text="user?.email || '—'"></div>
    </div>
    <div>
      <div class="stat-label">Role</div>
      <span class="badge" :text="roleName"></span>
    </div>
  </div>
</div>

<div class="card">
  <h3 style="margin-bottom:var(--s-md)">Trusted Device</h3>
  <div style="display:flex; align-items:center; justify-content:space-between; gap:var(--s-md)">
    <div>
      <div :text="deviceLabel" style="font-size:var(--f-sm)"></div>
      <div class="dim" style="font-size:var(--f-sm)" :text="'ID: ' + deviceId.slice(0, 8) + '…'"></div>
    </div>
  </div>
</div>

<script type="module">
  import { init, auth } from '../lib/app.js'

  const u = auth.user
  const meta = u?.meta || {}

  init({
    fullName: [meta.first_name, meta.last_name].filter(Boolean).join(' ') || u?.email?.split('@')[0] || '—',
    roleName: (() => {
      try {
        const r = u?.role?.role
        const parsed = typeof r === 'string' ? JSON.parse(r) : r
        return parsed?.name || '—'
      } catch { return '—' }
    })(),
    deviceLabel: auth.deviceLabel,
    deviceId: auth.deviceId,
  })
</script>
