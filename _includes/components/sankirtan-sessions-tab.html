<define-element>
  <sankirtan-sessions-tab active:boolean="false" sessions:array books:array loading:boolean="false" error:string="" canmanage:boolean="false">
    <style>:host { display: contents; }</style>
    <template>
      <section :if="active">

        <div :if="error" class="login-error" :text="error"></div>

        <!-- Filter bar -->
        <div class="filter-bar" style="margin-bottom:var(--s-lg)">
          <input type="date" title="From date"
            style="width:auto"
            :value="filterFrom"
            :change="v => filterFrom = v">
          <input type="date" title="To date"
            style="width:auto"
            :value="filterTo"
            :change="v => filterTo = v">
          <input type="text" placeholder="Distributor name…"
            style="flex:1; min-width:10rem"
            :value="filterWho"
            :oninput="e => filterWho = e.target.value">
          <input type="text" placeholder="Location…"
            style="flex:1; min-width:10rem"
            :value="filterLocation"
            :oninput="e => filterLocation = e.target.value">
          <button :if="filterFrom || filterTo || filterWho || filterLocation" type="button" class="btn btn-outline btn-sm"
            :onclick="filterFrom='', filterTo='', filterWho='', filterLocation=''">Clear</button>
          <button :if="canmanage" type="button" class="btn btn-outline btn-sm"
            :onclick="backupSessions()" title="Download every session as a JSON backup">Export</button>
          <button :if="canmanage" type="button" class="btn btn-outline btn-sm"
            :class="{'btn-loading': restoring}"
            :onclick="(host || document).querySelector('#sessions-import-input')?.click()"
            title="Restore sessions from a JSON backup">Import</button>
          <input type="file" id="sessions-import-input" accept=".json,application/json" style="display:none"
            :onchange="e => { restoreSessions(e.target.files[0]); e.target.value = '' }">
        </div>

        <!-- BBT report actions, on their own line below the filter -->
        <div :if="canmanage" style="display:flex; gap:var(--s-sm); flex-wrap:wrap; margin-bottom:var(--s-lg)">
          <button type="button" class="btn btn-primary btn-sm"
            :onclick="openEmailModal()">Email BBT report</button>
          <button type="button" class="btn btn-primary btn-sm"
            :onclick="exportReport()">Export BBT report to Excel</button>
        </div>

        <div :if="loading && !sessions.length" class="dim" style="padding:var(--s-lg); text-align:center">Loading…</div>
        <div :if="!loading && !groupedSessions().length && !error" class="dim" style="padding:var(--s-lg); text-align:center">No sessions found.</div>

        <!-- Date-grouped session list -->
        <div :each="group in groupedSessions()">
          <div style="font-weight:var(--f-wt-b); color:var(--c-text-dim); font-size:var(--f-sm);
                      padding:var(--s-xs) 0; margin-top:var(--s-lg);
                      border-bottom:1px solid var(--c-border)"
            :text="group.label"></div>

          <div :each="sess in group.sessions" class="card"
            style="margin-top:var(--s-sm); padding:var(--s-md); cursor:pointer"
            :onclick="toggleSession(sess)">

            <!-- Session summary row -->
            <div style="display:flex; align-items:center; gap:var(--s-md); flex-wrap:wrap">
              <span :html="icon('chevron_right')"
                style="flex-shrink:0; transition:transform .15s"
                :style="{transform: sess._open ? 'rotate(90deg)' : 'none'}"></span>
              <div style="flex:1; min-width:8rem; display:flex; flex-direction:column">
                <span style="font-weight:var(--f-wt-b)" :text="sess.distributor_name || 'Unknown'"></span>
                <span :if="sess.location" class="dim" style="font-size:var(--f-sm)" :text="sess.location"></span>
              </div>
              <span class="dim" style="font-size:var(--f-sm)"
                :text="fmtTime(sess.created_at)"></span>
              <span class="badge"
                :text="(sess.total_books || 0) + ' book' + (sess.total_books === 1 ? '' : 's')"></span>
              <span class="badge cat-purple"
                :text="(sess.total_points || 0) + ' pts'"></span>
              <span class="stat-ok" style="font-size:var(--f-sm); font-weight:var(--f-wt-b)"
                :text="'$' + fmtAmt(sess.collected_cents)"></span>
              <span class="badge" :each="p in (sess.payments || [])"
                :text="p.method + ' · $' + fmtAmt(p.amount_cents)"></span>
            </div>

            <!-- Expanded books list -->
            <div :if="sess._open"
              style="margin-top:var(--s-md); padding-top:var(--s-sm); border-top:1px solid var(--c-border)"
              :onclick.stop="">
              <div :if="sess._loadingBooks" class="dim" style="font-size:var(--f-sm)">Loading…</div>
              <div :if="!sess._loadingBooks && !sess.books?.length" class="dim" style="font-size:var(--f-sm)">No book details recorded.</div>
              <table :if="sess.books?.length" style="font-size:var(--f-sm)">
                <thead>
                  <tr>
                    <th>Book</th>
                    <th>Category</th>
                    <th>Qty</th>
                    <th>Points</th>
                  </tr>
                </thead>
                <tbody :each="sb in sess.books">
                  <tr :style="{cursor: sb.category_snapshot === 'STK' ? 'pointer' : ''}"
                    :onclick.stop="sb.category_snapshot === 'STK' && toggleStackRow(sb)">
                    <td>
                      <span :if="sb.category_snapshot === 'STK'" :html="icon('chevron_right')"
                        style="display:inline-flex; vertical-align:middle; margin-right:var(--s-xs); transition:transform .15s"
                        :style="{transform: stackOpen[sb.id] ? 'rotate(90deg)' : 'none'}"></span>
                      <span :text="sb.title_snapshot"></span>
                      <span :if="sb.excluded" class="badge" style="margin-left:var(--s-xs); background:#ffedd5; color:#ea580c">Excluded from BBT</span>
                    </td>
                    <td><span class="badge" :class="catCls(sb.category_snapshot)" :text="coverLabel(sb.category_snapshot)"></span></td>
                    <td :text="sb.qty"></td>
                    <td :text="pointsLabel(sb)"></td>
                  </tr>
                  <!-- Foldable stack breakdown: component books resolved from the current catalog -->
                  <tr :if="sb.category_snapshot === 'STK' && stackOpen[sb.id]">
                    <td colspan="4" style="padding-left:var(--s-xl)">
                      <div :if="!stackComponents(sb).length" class="dim" style="font-size:var(--f-sm)">Breakdown unavailable (stack no longer in catalog).</div>
                      <div :each="comp in stackComponents(sb)"
                        style="display:flex; align-items:center; gap:var(--s-sm); padding:var(--s-xs) 0">
                        <span style="flex:1" :text="comp.title + (comp.language ? ' (' + comp.language + ')' : '')"></span>
                        <span class="badge" :class="catCls(comp.category)" :text="coverLabel(comp.category)"></span>
                        <span class="dim" style="font-size:var(--f-sm)" :text="'×' + sb.qty"></span>
                      </div>
                    </td>
                  </tr>
                </tbody>
              </table>
              <div :if="sess.note" class="dim"
                style="font-size:var(--f-sm); margin-top:var(--s-sm)"
                :text="sess.note"></div>
            </div>

          </div>
        </div>

        <!-- BBT report email modal -->
        <div :if="showEmailModal" class="modal-overlay"
          :onpointerdown="e => { _downOnBackdrop = (e.target === e.currentTarget) }"
          :onclick="e => { if (_downOnBackdrop && e.target === e.currentTarget) closeEmailModal() }"
          :onkeydown.esc.document="closeEmailModal()">
          <div class="modal">
            <div class="modal-header">
              <h2>Email BBT report</h2>
              <button class="modal-close" type="button" aria-label="Close"
                :onclick="closeEmailModal" :html="icon('close')"></button>
            </div>
            <form class="modal-body" :onsubmit.prevent="sendEmail()">
              <div class="field">
                <label for="bbt-to">To</label>
                <input id="bbt-to" type="email" required
                  :value="emailTo" :change="v => emailTo = v">
              </div>
              <div class="field">
                <label for="bbt-cc">Cc (comma-separated)</label>
                <input id="bbt-cc" type="text"
                  :value="emailCc" :change="v => emailCc = v">
              </div>
              <div class="field">
                <label for="bbt-subject">Subject</label>
                <input id="bbt-subject" type="text" required
                  :value="emailSubject" :change="v => emailSubject = v">
              </div>
              <div class="field">
                <label for="bbt-msg">Greeting</label>
                <textarea id="bbt-msg" rows="4"
                  :value="emailMessage" :change="v => emailMessage = v"></textarea>
              </div>
              <div class="field">
                <label for="bbt-note">Books excluded from BBT (optional)</label>
                <textarea id="bbt-note" rows="3" placeholder="e.g. Bhagavad-gita (Farsi): 12…"
                  :value="emailSpecialNote" :change="v => emailSpecialNote = v"></textarea>
              </div>

              <!-- Score table preview -->
              <div :if="reportLoading" class="dim" style="padding:var(--s-md); text-align:center">Loading…</div>
              <table :if="report && !reportLoading" style="font-size:var(--f-sm); margin-top:var(--s-sm)">
                <thead>
                  <tr><th>Category</th><th>Books</th><th>Points</th></tr>
                </thead>
                <tbody>
                  <tr :each="row in report.rows">
                    <td :text="row.label"></td>
                    <td :text="row.books"></td>
                    <td :text="row.points"></td>
                  </tr>
                  <tr style="font-weight:var(--f-wt-b)">
                    <td>Total</td>
                    <td :text="report.total_books"></td>
                    <td :text="report.total_points"></td>
                  </tr>
                </tbody>
              </table>

              <div :if="emailErr" class="login-error" :text="emailErr"></div>
              <button type="submit" class="btn btn-primary"
                :class="{'btn-loading': sending}" :disabled="reportLoading || sending"
                :text="sending ? 'Sending…' : 'Send'"></button>
            </form>
          </div>
        </div>

      </section>
    </template>
    <script>
      this.filterFrom = ''
      this.filterTo = ''
      this.filterWho = ''
      this.filterLocation = ''
      this.restoring = false

      // BBT monthly score report — Excel export + emailed report (manager-only).
      this.DEFAULT_TO = 'mayapur@aol.com'
      this.DEFAULT_CC = ['Saksik.remy@gmail.com', 'gokul1008@yahoo.com', 'srchoudhury42@gmail.com', 'dfcreative@gmail.com', 'charith108@gmail.com']
      this.showEmailModal = false
      this.report = null
      this.reportLoading = false
      this.sending = false
      this.emailErr = null
      this.emailTo = ''
      this.emailCc = ''
      this.emailSubject = ''
      this.emailMessage = ''
      this.emailSpecialNote = ''
      this.catCls = function(cat) {
        return ({ S1:'cat-blue', S2:'cat-teal', S3:'cat-green', S4:'cat-purple',
                  H1:'cat-blue', H2:'cat-teal', H3:'cat-green', H4:'cat-purple' })[cat] || 'cat-gray'
      }
      this.coverLabel = function(cat) {
        return cat === 'STK' ? 'Stack' : (cat && cat[0] === 'H') ? 'Hard cover' : 'Soft cover'
      }
      // Excluded books are recorded but not scored — show a dash instead of 0 points.
      this.pointsLabel = function(sb) { return sb && sb.excluded ? '—' : (sb ? sb.line_points : '') }
      // Stack breakdown — recorded stack lines aren't snapshotted with their components, so we
      // resolve them from the current catalog (mirrors the BBT report). Each stack contains one of
      // each component book, so a component's qty in this line equals the stack line's qty.
      this.bookById = function(id) { return (this.books || []).find(function(x) { return x.id === id }) }
      this.stackComponents = function(sb) {
        var self = this
        var stack = this.bookById(sb.book_id)
        if (!stack || !stack.is_stack || !stack.items) return []
        return stack.items.map(function(it) { return self.bookById(it.book_id) }).filter(Boolean)
      }
      // Per-stack-line open state lives in a top-level reactive map keyed by the session_book id.
      // (Mutating a fresh `_open` flag on a lazily-loaded sess.books item isn't tracked by sprae.)
      this.stackOpen = {}
      this.toggleStackRow = function(sb) {
        this.stackOpen = Object.assign({}, this.stackOpen, { [sb.id]: !this.stackOpen[sb.id] })
      }
      this.toggleSession = function(sess) {
        var self = this
        sess._open = !sess._open
        if (sess._open && !sess.books?.length && !sess._loadingBooks) {
          sess._loadingBooks = true
          self.api.getSankirtanSession(sess.id)
            .then(function(full) {
              sess.books = full.books || []
              sess._loadingBooks = false
            })
            .catch(function(e) {
              sess._loadingBooks = false
              self.toast && self.toast(e.message || 'Failed to load session details')
            })
        }
      }
      this.fmtTime = function(iso) {
        if (!iso) return '—'
        return new Date(iso).toLocaleTimeString(undefined, { hour:'2-digit', minute:'2-digit' })
      }
      this.filteredSessions = function() {
        var self = this
        return (self.sessions || []).filter(function(s) {
          var dt = (s.occurred_at || '').slice(0, 10)
          if (self.filterFrom && dt < self.filterFrom) return false
          if (self.filterTo && dt > self.filterTo) return false
          if (self.filterWho && !(s.distributor_name || '').toLowerCase().includes(self.filterWho.toLowerCase())) return false
          if (self.filterLocation && !(s.location || '').toLowerCase().includes(self.filterLocation.toLowerCase())) return false
          return true
        })
      }
      this.groupedSessions = function() {
        var filtered = this.filteredSessions()
        var map = {}, keys = []
        filtered.forEach(function(s) {
          var day = (s.occurred_at || '').slice(0, 10) || 'unknown'
          if (!map[day]) { map[day] = []; keys.push(day) }
          map[day].push(s)
        })
        keys.sort(function(a, b) { return b.localeCompare(a) })
        return keys.map(function(k) {
          var label = k === 'unknown' ? 'Undated' : new Date(k + 'T00:00:00').toLocaleDateString(undefined, {
            weekday:'long', year:'numeric', month:'long', day:'numeric'
          })
          return { label: label, sessions: map[k] }
        })
      }

      // reportRange resolves the active filter into {from, to}, defaulting to the
      // current month (1st → today) when the filter is empty.
      this.reportRange = function() {
        var now = new Date()
        var pad = function(n) { return String(n).padStart(2, '0') }
        var firstOfMonth = now.getFullYear() + '-' + pad(now.getMonth() + 1) + '-01'
        var today = now.getFullYear() + '-' + pad(now.getMonth() + 1) + '-' + pad(now.getDate())
        return { from: this.filterFrom || firstOfMonth, to: this.filterTo || today }
      }
      this.monthLabel = function(from) {
        return new Date(from + 'T00:00:00').toLocaleDateString(undefined, { month:'long', year:'numeric' })
      }
      this.exportReport = function() {
        var self = this
        var r = self.reportRange()
        self.api.downloadSankirtanReportXLSX(r.from, r.to)
          .catch(function(e) { self.toast && self.toast(e.message || 'Failed to export', 'error') })
      }
      // Backup/restore of the full session history (manager-only). Backup downloads
      // a JSON bundle of every session; Restore uploads one back, skipping sessions
      // already present, then reloads the list.
      this.backupSessions = function() {
        var self = this
        self.api.downloadSankirtanSessionsBackup()
          .catch(function(e) { self.toast && self.toast(e.message || 'Failed to export backup', 'error') })
      }
      this.restoreSessions = function(file) {
        if (!file) return
        var self = this
        self.restoring = true
        self.api.importSankirtanSessions(file)
          .then(function(res) {
            var msg = 'Restored ' + (res.imported || 0) + ' session' + (res.imported === 1 ? '' : 's')
            if (res.skipped) msg += ', ' + res.skipped + ' skipped (already present)'
            self.toast && self.toast(msg, 'success')
            self.emit('reload')
          })
          .catch(function(e) { self.toast && self.toast(e.message || 'Failed to restore', 'error') })
          .finally(function() { self.restoring = false })
      }
      this.openEmailModal = function() {
        var self = this
        var r = self.reportRange()
        var label = self.monthLabel(r.from)
        self.emailTo = self.DEFAULT_TO
        self.emailCc = self.DEFAULT_CC.join(', ')
        self.emailSubject = 'ISKCON Montreal — BBT Score ' + label
        self.emailMessage = 'Hare Krisna,\n\nPlease accept our humble obeisances, all glories to Srila Prabhupada.\n\nPlease find here the score for the Month of ' + label + ' for ISKCON Montreal.'
        self.emailSpecialNote = ''
        self.emailErr = null
        self.report = null
        self.reportLoading = true
        self.showEmailModal = true
        self.api.getSankirtanReport(r.from, r.to)
          .then(function(rep) {
            self.report = rep
            self.reportLoading = false
            // Prefill the (still-editable) note with the per-title counts of the books
            // excluded from the BBT score (Farsi/Arabic + any manually-excluded title).
            if (rep.excluded_books && rep.excluded_books.length) {
              self.emailSpecialNote = rep.excluded_books
                .map(function(r) { return r.title + (r.language ? ' (' + r.language + ')' : '') + ': ' + r.count }).join('\n')
            }
          })
          .catch(function(e) {
            self.reportLoading = false
            self.emailErr = e.message || 'Failed to load report'
          })
      }
      this.closeEmailModal = function() { this.showEmailModal = false }
      this.sendEmail = function() {
        var self = this
        if (self.reportLoading || self.sending) return
        var cc = (self.emailCc || '').split(/[,\n]/).map(function(s) { return s.trim() }).filter(Boolean)
        var r = self.reportRange()
        self.sending = true
        self.emailErr = null
        self.api.sendSankirtanReportEmail({
          from: r.from,
          to_date: r.to,
          subject: self.emailSubject,
          message: self.emailMessage,
          special_note: self.emailSpecialNote,
          recipients: { to: self.emailTo, cc: cc },
        })
          .then(function() {
            self.sending = false
            self.showEmailModal = false
            self.toast && self.toast('BBT report sent', 'success')
          })
          .catch(function(e) {
            self.sending = false
            self.emailErr = e.message || 'Failed to send'
          })
      }
    </script>
  </sankirtan-sessions-tab>
</define-element>
