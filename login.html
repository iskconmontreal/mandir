<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Mandala</title>
    <link rel="stylesheet" href="css/tokens.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/login.css">
  </head>

  <body>
    <div class="login-page">

      <!-- Left: branding panel -->
      <div class="login-brand">
        <a href="index.html" class="login-brand-logo">
          <img src="assets/iskcon-montreal.svg" alt="ISKCON Montreal" width="108" height="108" style="filter: brightness(0) invert(1)">
        </a>
        <div class="login-brand-text">
          <p>— Śrīla Prabhupāda:</p>
          <div class="quotes-carousel">
            <figure class="quote" :each="(q, i) in quotes" :class="{active: i === qi}">
              <blockquote :text="q.text"></blockquote>
              <figcaption><a :href="q.url" :text="q.source" target="_blank" rel="noopener"></a></figcaption>
            </figure>
          </div>
        </div>
      </div>

      <!-- Right: sign-in form -->
      <div class="login-form-panel">
        <div class="login-form-wrap" :scope="state">

          <button :if="step !== 'email'" type="button" class="btn-link login-back" :onclick="goBack">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
            Back
          </button>

          <h1 :text="{email: 'Sign in', password: 'Password', otp: 'Verify'}[step]"></h1>
          <p :text="{email: 'Access temple management dashboard.', password: email, otp: 'Enter the 6-digit code sent to ' + email}[step]"></p>

          <div class="login-warn" :if="offline" :text="offline"></div>
          <div class="login-error" :if="err" :text="err"></div>

          <form class="login-form" :if="step === 'email' && !offline" :onsubmit.prevent="submit">
            <div class="field">
              <label for="email">Email</label>
              <input id="email" type="email" placeholder="name@example.com" :value="email" required autofocus autocomplete="email">
            </div>
            <button type="submit" class="btn btn-primary btn-block" :class="{'btn-loading': loading}">Continue</button>
          </form>

          <form class="login-form" :if="step === 'password'" :onsubmit.prevent="submitPassword">
            <div class="field field-password" :scope="{showPw: false}">
              <label for="password">Password</label>
              <input id="password" :type="showPw ? 'text' : 'password'" placeholder="" :value="password" required autofocus autocomplete="current-password">
              <button type="button" class="toggle-pw" :onclick="showPw = !showPw" :text="showPw ? '🙈' : '👁'" aria-label="Toggle password visibility"></button>
            </div>
            <button type="submit" class="btn btn-primary btn-block" :class="{'btn-loading': loading}">Sign In</button>
          </form>

          <form class="login-form" :if="step === 'otp'" :onsubmit.prevent="verify">
            <div class="field">
              <label for="otp">Verification code</label>
              <input id="otp" class="otp-input" type="text" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" placeholder="000000" :value="otp" required autofocus autocomplete="one-time-code">
            </div>
            <button type="submit" class="btn btn-primary btn-block" :class="{'btn-loading': loading}">Verify</button>
            <div class="otp-meta">
              <span :text="'Expires in ' + expiry"></span>
              <button :if="countdown > 0" type="button" class="btn-link" disabled :text="'Resend in ' + countdown + 's'"></button>
              <button :if="countdown <= 0" type="button" class="btn-link" :onclick="resend" :class="{'btn-loading': resending}">Resend code</button>
            </div>
          </form>

          <div :if="step === 'email'">
            <div class="login-divider">or continue with</div>

            <div class="login-social">
              <button class="btn btn-outline" :onclick="google" aria-label="Sign in with Google">
                <svg viewBox="0 0 24 24" width="20" height="20">
                  <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4" />
                  <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853" />
                  <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05" />
                  <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335" />
                </svg>
                Google
              </button>
            </div>
          </div>

        </div>
      </div>

    </div>

    <script type="module">
      import sprae from './lib/sprae.js'
      import { auth } from './lib/auth.js'
      import { api, BASE } from './lib/api.js'


      // If already logged in, go to dashboard
      if (auth.active) window.location.href = 'app/index.html'

      // Capture token from OAuth redirect
      auth.capture()

      const notice = new URLSearchParams(location.search).get('msg')
      if (notice) {
        history.replaceState(null, '', location.pathname)
        const el = document.createElement('div')
        el.className = 'login-toast'
        el.textContent = notice
        document.body.appendChild(el)
        requestAnimationFrame(() => el.classList.add('in'))
        setTimeout(() => { el.classList.remove('in'); el.addEventListener('transitionend', () => el.remove()) }, 4000)
      }

      let loginStarted = false
      let otpInterval = null

      const welcomeQuotes = [
        { text: "If one offers Me with love and devotion a leaf, a flower, a fruit or water, I will accept it.", source: "Bhagavad-gītā As It Is 9.26", url: "https://vedabase.io/en/library/bg/9/26/" },
        { text: "In this endeavor there is no loss or diminution, and a little advancement on this path can protect one from the most dangerous type of fear.", source: "Bhagavad-gītā As It Is 2.40", url: "https://vedabase.io/en/library/bg/2/40/" },
        { text: "The cooperation is possible to be made either by life, wealth, intelligence or words.", source: "Letter to Mathura Prasad — Vrindavan, 23 May 1964", url: "https://vedabase.io/en/library/letters/letter-to-mathura-prasad/" },
        { text: "This process is very easy and can be attempted even by the poorest of the poor, without any kind of qualification.", source: "Bhagavad-gītā As It Is 9.26, Purport", url: "https://vedabase.io/en/library/bg/9/26/" },
        { text: "A sādhu engages in the highest philanthropic activities for the benediction of all living entities.", source: "Śrīmad-Bhāgavatam 3.25.21, Purport", url: "https://vedabase.io/en/library/sb/3/25/21/" },
        { text: "For one who sees Me everywhere and sees everything in Me, I am never lost, nor is he ever lost to Me.", source: "Bhagavad-gītā As It Is 6.30", url: "https://vedabase.io/en/library/bg/6/30/" },
      ]

      const managerQuotes = [
        { text: "That is the art of management: to draw out spontaneous loving spirit of sacrificing some energy for Krishna.", source: "Letter to Karandhara — Bombay, 22 December 1972", url: "https://vedabase.io/en/library/letters/letter-to-karandhara-54/#bb133206" },
        { text: "Do not centralize anything. Each temple must remain independent and self-sufficient.", source: "Letter to Karandhara — Bombay, 22 December 1972", url: "https://vedabase.io/en/library/letters/letter-to-karandhara-54/#bb133205" },
        { text: "Krishna Consciousness Movement is for training men to be independently thoughtful and competent… not for making bureaucracy.", source: "Letter to Karandhara — Bombay, 22 December 1972", url: "https://vedabase.io/en/library/letters/letter-to-karandhara-54/#bb133205" },
        { text: "Once there is bureaucracy the whole thing will be spoiled.", source: "Letter to Karandhara — Bombay, 22 December 1972", url: "https://vedabase.io/en/library/letters/letter-to-karandhara-54/#bb133205" },
        { text: "There must be always individual striving and work and responsibility.", source: "Letter to Karandhara — Bombay, 22 December 1972", url: "https://vedabase.io/en/library/letters/letter-to-karandhara-54/#bb133205" },
        { text: "Our leaders shall be careful not to kill the spirit of enthusiastic service, which is individual and spontaneous and voluntary.", source: "Letter to Karandhara — Bombay, 22 December 1972", url: "https://vedabase.io/en/library/letters/letter-to-karandhara-54/#bb133207" },
        { text: "Accounts must be kept, things must be in order and lawfully done.", source: "Letter to Karandhara — Bombay, 22 December 1972", url: "https://vedabase.io/en/library/letters/letter-to-karandhara-54/#bb133205" },
        { text: "We are world-wide organization… Now that requires proper accounts in all our temples.", source: "Letter to Karandhara — Bombay, 3 December 1972", url: "https://prabhupadabooks.com/letters/bombay/december/03/1972/karandhara" },
        { text: "Record of expenditures must be there, that is standard procedure.", source: "Letter to Gurudasa & Yamuna — Bombay, 19 December 1972", url: "https://vanisource.org/wiki/721219_-_Letter_to_Gurudasa_and_Yamuna_written_from_Bombay" },
        { text: "Each center should be responsible for its own management.", source: "Letter to Karandhara — Bombay, 22 December 1972", url: "https://vedabase.io/en/library/letters/letter-to-karandhara-54/#bb133206" },
        { text: "This movement is meant for training men to become reliable and responsible.", source: "Letter to Karandhara — Bombay, 22 December 1972", url: "https://vedabase.io/en/library/letters/letter-to-karandhara-54/#bb133206" },
      ]

      const state = sprae(document.body, {
        quotes: welcomeQuotes,
        qi: Math.floor(Math.random() * welcomeQuotes.length),

        step: 'email',
        email: '',
        password: '',
        otp: '',
        loading: false,
        err: null,
        offline: null,
        countdown: 0,
        expiry: '',
        resending: false,

        goBack() {
          clearInterval(otpInterval)
          state.step = 'email'
          state.password = ''
          state.otp = ''
          state.loading = false
          state.err = null
          state.offline = null
          state.quotes = welcomeQuotes
          state.qi = 0
        },

        startOtpTimer() {
          const sent = Date.now()
          clearInterval(otpInterval)
          state.countdown = 30
          state.expiry = '10:00'
          otpInterval = setInterval(() => {
            const elapsed = Date.now() - sent
            state.countdown = Math.max(0, Math.ceil((30000 - elapsed) / 1000))
            const left = Math.max(0, Math.ceil((600000 - elapsed) / 1000))
            state.expiry = `${Math.floor(left / 60)}:${String(left % 60).padStart(2, '0')}`
            if (left <= 0) {
              clearInterval(otpInterval)
              state.err = 'Code expired. Please request a new one.'
            }
          }, 1000)
        },

        async resend() {
          state.resending = true
          state.err = null
          try {
            await api.login(state.email, state.password, auth.deviceId, auth.deviceLabel)
            state.startOtpTimer()
          } catch (e) {
            state.err = e.message || 'Could not resend code'
          } finally {
            state.resending = false
          }
        },

        async submit() {
          loginStarted = true
          state.err = null
          state.loading = true
          try {
            const res = await api.login(state.email, '', auth.deviceId, auth.deviceLabel)
            state.loading = false
            if (res.step === 'password_required') {
              state.step = 'password'
              state.quotes = managerQuotes
              state.qi = 0
            } else if (res.step === 'otp_required') {
              state.step = 'otp'
              state.startOtpTimer()
            } else if (res.token) {
              auth.save(res.token, res.user, res.refresh_token)
              window.location.href = 'app/index.html'
            }
          } catch (e) {
            state.err = e.message || 'Sign in failed'
          } finally {
            state.loading = false
          }
        },

        async submitPassword() {
          state.err = null
          state.loading = true
          try {
            const res = await api.login(state.email, state.password, auth.deviceId, auth.deviceLabel)
            state.loading = false
            if (res.step === 'otp_required') {
              state.step = 'otp'
              state.startOtpTimer()
            } else {
              auth.save(res.token, res.user, res.refresh_token)
              window.location.href = 'app/index.html'
            }
          } catch (e) {
            state.err = e.message || 'Sign in failed'
          } finally {
            state.loading = false
          }
        },

        async verify() {
          state.err = null
          state.loading = true
          try {
            const res = await api.verifyOtp(state.email, state.otp, auth.deviceId, auth.deviceLabel)
            auth.save(res.token, res.user, res.refresh_token)
            window.location.href = 'app/index.html'
          } catch (e) {
            state.err = e.message || 'Verification failed'
          } finally {
            state.loading = false
          }
        },

        async google() {
          try {
            const { url } = await api.googleUrl()
            window.location.href = url
          } catch {
            state.err = 'Could not connect to server'
          }
        }
      })

      setInterval(() => {
        state.qi = (state.qi + 1) % state.quotes.length
      }, 5000)

      fetch(`${BASE}/api/health`).then(r => r.json()).then(d => {
        if (d.status !== 'ok' && !loginStarted) state.offline = 'Server is experiencing issues. Please try again later.'
      }).catch(() => {
        if (!loginStarted) state.offline = 'Cannot reach server. Please check your connection.'
      })
    </script>
  </body>

</html>
