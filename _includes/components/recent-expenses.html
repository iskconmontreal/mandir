<define-element>
  <recent-expenses items:array usernames:object myuserid:number>
    <style>:host { display: contents; }</style>
    <template>
      <div :each="x in items" class="recent-exp-item row-link" :onclick="e => emit('view', x)">
        <span class="recent-exp-icon-col">
          <span class="status-icon" :class="'status-' + (x.status || 'submitted')" :html="statusIcon(x.status || 'submitted')"></span>
        </span>
        <div class="recent-exp-main">
          <div class="recent-exp-info">
            <div class="recent-exp-title-row">
              <div class="recent-exp-title" :text="x.payee || '\u2014'"></div>
            </div>
            <div class="recent-exp-meta-row">
              <span class="recent-exp-status-text" :class="'status-' + (x.status || 'submitted')" :text="statusText(x)"></span>
              <span :if="reporter(x)" class="recent-exp-meta" :text="reporter(x)"></span>
              <time class="recent-exp-time" :datetime="x.expense_date || x.created_at || ''" :title="(x.expense_date || x.created_at) ? new Date(x.expense_date || x.created_at).toLocaleString() : ''" :text="fmtDate(x.expense_date || x.created_at)"></time>
            </div>
          </div>
        </div>
        <div class="recent-exp-cat">
          <span :if="x.attachment_count" class="recent-exp-attach" :title="x.attachment_count + ' document' + (x.attachment_count > 1 ? 's' : '')">
            <span class="recent-exp-attach-icon" :html="icon('attach')"></span>
            <span :if="x.attachment_count > 1" class="recent-exp-attach-count" :text="x.attachment_count"></span>
          </span>
          <span class="badge" :class="catCls(x.category || 'other')" :text="fmtCat(x.category || 'other')"></span>
        </div>
        <div class="recent-exp-amount">
          <div class="recent-exp-value stat-err" :text="'-$' + fmtAmt(x.amount || 0)"></div>
        </div>
      </div>
    </template>
    <script>
      this.statusText = function(x) {
        const st = x?.status || 'submitted'
        return st === 'submitted' ? `Approval ${x?.approval_count || 0}/${x?.approvals_required || '?'}` : this.fmtStatus(st)
      }
      this.reporter = function(x) {
        const st = x?.status || 'submitted'
        const uid = st === 'submitted'
          ? (x?.created_by || x?.updated_by)
          : (x?.updated_by || x?.created_by)
        if (!uid) return ''
        if (uid === this.myuserid) return 'by you'
        const who = this.usernames?.[uid]
        return who ? `by ${who}` : ''
      }
    </script>
  </recent-expenses>
</define-element>
