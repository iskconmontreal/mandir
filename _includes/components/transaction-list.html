<define-element>
  <transaction-list years:array mopen:object mfresh:string="" loading:boolean="false" error:string="" search:string="" empty:boolean="false" canapprove:boolean="false" quickloading:object myapprovals:object>
    <style>:host { display: contents; }</style>
    <template>
      <div :if="error" class="login-error" :text="error" style="margin:var(--s-md)"></div>
      <div :if="loading" class="dim" style="text-align:center;padding:var(--s-lg)">Loading…</div>
      <div :if="empty" class="dim" style="text-align:center;padding:var(--s-xl)">No transactions yet</div>
      <div :each="yr in years" class="finance-year-section">
        <div class="finance-year-sticky" :if="yr.key !== 'unknown'" :text="yr.key"></div>
        <div class="finance-year-months">
          <div :each="(g, gi) in yr.items" :class="{'finance-month-wrap-open': mopen[g.key], 'finance-month-wrap-divider': gi > 0}">
            <button type="button" class="exp-group-header" :class="{'exp-group-header-open': mopen[g.key], 'exp-group-header-empty': !g.count}" :aria-expanded="mopen[g.key] ? 'true' : 'false'" :disabled="!g.count" :onclick="e => g.count && _toggle(g.key)">
              <span class="exp-group-chevron" :html="icon('chevron_down')"></span>
              <span class="exp-group-heading">
                <span class="exp-group-label">
                  <span class="finance-month-label-desktop" :text="fmtMonthShort(g.key)"></span>
                  <span class="finance-month-label-mobile" :text="fmtMonth(g.key)"></span>
                </span>
                <span :if="g.count" class="exp-group-count" :text="g.count"></span>
              </span>
              <span class="exp-group-total" :class="g.count ? (g.net >= 0 ? 'stat-ok' : 'stat-err') : ''" :text="g.count ? ((g.net >= 0 ? '+' : '\u2212') + '$' + fmtAmt(Math.abs(g.net))) : '$0'"></span>
            </button>
            <div class="recent-exp-list recent-inc-list finance-exp-list finance-inc-list-group finance-net-list" :class="{'finance-exp-list-open': mopen[g.key], 'finance-exp-list-fresh': mfresh === g.key}" :aria-hidden="mopen[g.key] ? 'false' : 'true'">
              <template :each="tx in g.items">
                <!-- Expense row -->
                <div :if="tx._isExp" class="recent-exp-item row-link finance-net-item" :onclick="e => _emit('viewexp', tx)">
                  <span class="recent-exp-icon-col">
                    <span class="status-icon" :class="'status-' + (tx.status || 'submitted')" :html="statusIcon(tx.status || 'submitted')"></span>
                  </span>
                  <div class="recent-exp-main">
                    <div class="recent-exp-info">
                      <div class="recent-exp-title-row">
                        <div class="recent-exp-title">
                          <span :html="hl(tx.payee || '\u2014', search || '')"></span>
                          <span :if="tx.expense_no" class="recent-exp-title-sub dim" :text="'#' + tx.expense_no"></span>
                        </div>
                      </div>
                      <div class="recent-exp-meta-row">
                        <span class="recent-exp-status-text" :class="'status-' + (tx.status || 'submitted')" :text="fmtStatus(tx.status || 'submitted')"></span>
                        <time class="recent-exp-time" :datetime="tx.expense_date || tx.created_at || ''" :title="(tx.expense_date || tx.created_at) ? new Date(tx.expense_date || tx.created_at).toLocaleString() : ''" :text="fmtDate(tx.expense_date || tx.created_at)"></time>
                      </div>
                    </div>
                  </div>
                  <span :if="canapprove" class="recent-exp-actions" :onclick.stop="">
                    <span :if="quickloading[tx.id]" class="load-spinner" aria-label="Working"></span>
                    <button :if="tx.status === 'submitted' && !quickloading[tx.id] && !myapprovals[tx.id]" type="button" class="btn btn-sm btn-outline" aria-label="Quick approve expense" :onclick.stop="e => _emit('approve', tx)" :html="approveIcon + ' Approve'"></button>
                    <span :if="tx.status === 'submitted' && myapprovals[tx.id] && !quickloading[tx.id]" class="dim" aria-label="Approved by you" style="font-size:var(--f-sm)" title="You approved this — awaiting co-approval">✓ Approved</span>
                    <button :if="tx.status === 'approved' && !quickloading[tx.id]" type="button" class="btn btn-sm btn-outline" aria-label="Mark as paid" :onclick.stop="e => _emit('pay', tx)" :html="payIcon + ' Paid'"></button>
                    <button :if="tx.status === 'paid' && !tx.attachment_count && !quickloading[tx.id]" type="button" class="btn btn-sm btn-outline" :onclick.stop="e => _emit('attach', tx)">Attach receipt</button>
                  </span>
                  <div class="recent-exp-cat">
                    <span :if="tx.attachment_count" class="recent-exp-attach" :title="tx.attachment_count + ' document' + (tx.attachment_count > 1 ? 's' : '')">
                      <span class="recent-exp-attach-icon" :html="icon('attach')"></span>
                      <span :if="tx.attachment_count > 1" class="recent-exp-attach-count" :text="tx.attachment_count"></span>
                    </span>
                    <span class="badge" :class="catCls(tx.category || 'other')" :text="fmtCat(tx.category || 'other')"></span>
                  </div>
                  <div class="recent-exp-amount">
                    <div class="recent-exp-value stat-err" :text="'-$' + fmtAmt(tx.amount || 0)"></div>
                  </div>
                </div>
                <!-- Income row -->
                <div :if="!tx._isExp" class="recent-inc-item row-link finance-net-item" :onclick="e => _emit('viewinc', tx)">
                  <span class="recent-inc-icon-col" :class="'recent-inc-icon-' + (tx.method || 'cash')">
                    <span class="recent-inc-icon" :html="methodIcon(tx.method || 'cash')"></span>
                  </span>
                  <div class="recent-inc-main">
                    <div class="recent-inc-info">
                      <div class="recent-inc-title-row">
                        <div style="display:flex;align-items:baseline;gap:var(--s-xs);flex-wrap:wrap">
                          <div class="recent-inc-title" :html="hl(tx.source_name || tx.member_name || 'Anonymous', search || '')"></div>
                          <span :if="tx.id" class="recent-inc-title-sub dim" :text="'#' + tx.id"></span>
                        </div>
                      </div>
                      <div class="recent-inc-subtitle">
                        <span class="recent-inc-method" :class="'recent-inc-method-' + (tx.method || 'cash')" :text="tx.method || 'cash'"></span>
                        <time class="recent-inc-time" :datetime="tx.date_received || tx.created_at || ''" :title="(tx.date_received || tx.created_at) ? new Date(tx.date_received || tx.created_at).toLocaleString() : ''" :text="fmtDate(tx.date_received || tx.created_at)"></time>
                      </div>
                    </div>
                  </div>
                  <span class="recent-inc-actions" :onclick.stop="" aria-hidden="true">
                    <button type="button" class="btn btn-sm btn-outline recent-row-action-stub" tabindex="-1" :html="printIcon + ' Print'"></button>
                  </span>
                  <div class="recent-inc-type">
                    <span class="badge" :class="catCls((tx.type || 'donation') === 'donation' ? (tx.category || 'general') : (tx.type || 'other'))" :text="fmtCat((tx.type || 'donation') === 'donation' ? (tx.category || 'general') : (tx.type || 'other'))"></span>
                  </div>
                  <div class="recent-inc-amount">
                    <div class="recent-inc-value stat-ok" :text="'+$' + fmtAmt(tx.amount || 0)"></div>
                  </div>
                </div>
              </template>
            </div>
          </div>
        </div>
      </div>
    </template>
  </transaction-list>
</define-element>
