<div {% if include.each %}:each="{{ include.each }}"{% endif %} class="recent-exp-item row-link{% if include.row_class %} {{ include.row_class }}{% endif %}" :class="{'row-fresh': isFresh(x.id)}" :onclick="viewExpense(x)">
  <span class="recent-exp-icon-col">
    <span class="status-icon" :class="'status-' + (x.status || 'submitted')" :html="statusIcon(x.status || 'submitted')"></span>
  </span>
  <div class="recent-exp-main">
    <div class="recent-exp-info">
      <div class="recent-exp-title-row">
        <div class="recent-exp-title">
          <span :html="hl(expenseRowTitle(x), typeof expSearch === 'undefined' ? '' : expSearch)"></span>
          {% if include.show_expense_no %}<span :if="x.expense_no" class="recent-exp-title-sub dim" :text="'#' + x.expense_no"></span>{% endif %}
        </div>
      </div>
      <div class="recent-exp-meta-row">
        <span class="recent-exp-status-text" :class="'status-' + (x.status || 'submitted')" :text="recentExpStatus(x)"></span>
        <span :if="recentExpReporter(x)" class="recent-exp-meta" :text="recentExpReporter(x)"></span>
        <span class="recent-exp-time" :text="expenseRowTime(x)"></span>
      </div>
    </div>
    <div :if="x.attachments?.length" class="row-attachments">
      <img :each="a in (x.attachments || []).slice(0, 4)" :if="a.mime_type?.startsWith('image/')" class="row-attach-thumb" :src="apiBase + '/' + a.file_path" :alt="a.original_name">
      <span :each="a in (x.attachments || []).slice(0, 4)" :if="!a.mime_type?.startsWith('image/')" class="row-attach-file" :title="a.original_name" :html="icon('attach')"></span>
      <span :if="(x.attachments || []).length > 4" class="row-attach-more" :text="'+' + (x.attachments.length - 4)"></span>
    </div>
  </div>
  <span class="recent-exp-actions" :onclick.stop="">
    {% if include.show_actions %}
<button :if="expenseCanQuickApprove(x)" type="button" class="btn btn-sm btn-outline" title="Quick approve expense" aria-label="Quick approve expense" :onclick.stop="expenseQuickApprove(x)" :html="approveIcon + ' Approve'"></button>
    <span :if="expenseApprovedByMe?.(x)" class="dim" style="font-size:var(--f-sm)" title="You approved this — awaiting co-approval" aria-label="Approved by you">✓ Approved</span>
    <button :if="expenseCanQuickPay(x)" type="button" class="btn btn-sm btn-outline btn-ok-outline" title="Mark as paid" aria-label="Mark as paid" :onclick.stop="expenseQuickPay(x)" :html="payIcon + ' Paid'"></button>
    <button :if="expenseCanQuickClose?.(x)" type="button" class="btn btn-sm btn-outline btn-ok-outline" title="Close expense" aria-label="Close expense" :onclick.stop="closeRecentExpense(x)" :html="closeIcon + ' Close'"></button>
    <button :if="expensePaidNoReceipt?.(x)" type="button" class="btn btn-sm btn-outline" title="Attach receipt to close" aria-label="Attach receipt" :onclick.stop="attachExpense(x)" :html="icon('attach') + ' Attach receipt'"></button>
    <span :if="expenseActionBusy(x)" class="btn btn-sm btn-outline" style="pointer-events:none;color:var(--c-text-dim)" aria-label="Working">…</span>
    {% endif %}
  </span>
  <div class="recent-exp-cat">
    <span :if="x.attachments?.length" class="recent-exp-attach" :title="x.attachments.length + ' receipt' + (x.attachments.length > 1 ? 's' : '')">
      <span class="recent-exp-attach-icon" :html="icon('attach')"></span>
      <span :if="x.attachments.length > 1" class="recent-exp-attach-count" :text="x.attachments.length"></span>
    </span>
    <span class="badge" :class="catCls(x.category || 'other')" :text="expenseRowCategory(x)"></span>
  </div>
  <div class="recent-exp-amount">
    <div class="recent-exp-value stat-err" :text="'-$' + fmtAmt(x.amount || 0)"></div>
  </div>
</div>
