<!-- Expense modal (create + edit) -->
<template id="exp-modal-template">
<div class="modal-overlay" :onkeydown.esc.document="e => { if (lightboxSrc || filePickerOpen) return; detailExp ? cancelExpenseEdit() : cancelAdd() }">
  <div class="modal modal-expense" :onclick.outside="e => { if (lightboxSrc || filePickerOpen) return; detailExp ? cancelExpenseEdit() : cancelAdd() }">
    <div class="expense-media-pane" :if="!detailExp || expAttachments.length || receipts.length || (expMode === 'edit')"
      :ondragover="e => e.preventDefault()"
      :ondrop="e => { e.preventDefault(); addReceipts(e.dataTransfer.files) }">

      <div :class="{'hidden': expAttachments.length || receipts.length}" class="expense-media-empty"
        :onclick="() => { filePickerOpen = true; document.getElementById('exp-receipt-input').click() }">
        <div class="scan-icon">
          <span :html="icon('scan_receipts')"></span>
        </div>
        <div class="expense-media-empty-title">Scan receipts</div>
      </div>

      <div :class="{'hidden': !expAttachments.length && !receipts.length}" class="receipt-carousel">
        <div id="exp-receipt-track" class="receipt-carousel-track" :onscroll="e => syncExpenseReceiptSlide(e)">
          <div :each="(item, i) in expenseReceiptItems(expAttachments)" class="receipt-thumb receipt-thumb-gallery"
            :class="{ 'receipt-extracting': item.kind === 'queued' && item.value.extracting, 'receipt-error': item.kind === 'queued' && item.value.err, 'receipt-duplicate': item.kind === 'queued' && item.value.duplicate }"
            :onclick="e => {
              if (e.target.closest('.receipt-remove')) return
              if (item.kind === 'saved') {
                return item.value.mime_type?.startsWith('image/')
                  ? (lightboxSrc = apiBase + '/' + item.value.file_path)
                  : window.open(apiBase + '/' + item.value.file_path, '_blank')
              }
              if (item.value.preview) lightboxSrc = item.value.preview
            }">
            <img :if="item.kind === 'saved' && item.value.mime_type?.startsWith('image/')" :src="apiBase + '/' + item.value.file_path" :alt="item.value.original_name">
            <img :if="item.kind === 'queued' && item.value.preview" :src="item.value.preview">
            <div :if="item.kind === 'saved' && !item.value.mime_type?.startsWith('image/')" class="receipt-placeholder">
              <span class="receipt-placeholder-icon" :html="icon('file')"></span>
              <span :text="item.value.original_name?.split('.').pop()?.toUpperCase() || 'FILE'"></span>
              <div :if="item.value.extracted_data?.vendor || item.value.extracted_data?.amount" class="receipt-placeholder-data">
                <span :if="item.value.extracted_data?.vendor" class="receipt-placeholder-vendor" :text="item.value.extracted_data.vendor"></span>
                <span :if="item.value.extracted_data?.amount" class="receipt-placeholder-amt" :text="'$' + Number(item.value.extracted_data.amount).toFixed(2)"></span>
                <span :if="item.value.extracted_data?.date" :text="item.value.extracted_data.date"></span>
              </div>
            </div>
            <div :if="item.kind === 'queued' && !item.value.preview" class="receipt-placeholder">
              <span class="receipt-placeholder-icon" :html="icon('file')"></span>
              <span :text="item.value.name?.split('.').pop()?.toUpperCase() || 'FILE'"></span>
              <div :if="item.value.data?.vendor || item.value.data?.amount" class="receipt-placeholder-data">
                <span :if="item.value.data?.vendor" class="receipt-placeholder-vendor" :text="item.value.data.vendor"></span>
                <span :if="item.value.data?.amount" class="receipt-placeholder-amt" :text="'$' + Number(item.value.data.amount).toFixed(2)"></span>
                <span :if="item.value.data?.date" :text="item.value.data.date"></span>
              </div>
            </div>
            <div :if="item.kind === 'queued' && item.value.extracting" class="receipt-spinner"><span class="receipt-spinner-label">Scanning…</span></div>
            <button :if="item.kind === 'queued'" type="button" class="receipt-remove" :onclick="removeReceipt(item.value)">&times;</button>
            <button :if="item.kind === 'saved' && (detailExp?.status !== 'paid' || hasRole('admin') || hasRole('administrator'))" type="button" class="receipt-remove" :onclick="deleteSavedAttachment(item.value)">&times;</button>
          </div>
        </div>
        <div class="receipt-dots" :if="expenseReceiptItems(expAttachments).length > 1">
          <button type="button" class="receipt-dot" :each="(_, i) in expenseReceiptItems(expAttachments)" :class="expenseReceiptDotClass(i)" :onclick="jumpExpenseReceiptSlide('exp-receipt-track', i)"></button>
        </div>
      </div>
      <button :class="{'hidden': !expAttachments.length && !receipts.length}" type="button" class="receipt-add receipt-add-gallery"
        :onclick="() => { filePickerOpen = true; document.getElementById('exp-receipt-input').click() }">
        + Add more
      </button>
      <input id="exp-receipt-input" type="file" accept="image/*,.pdf" multiple style="display:none">
    </div>

    <div class="expense-content-pane">
      <div class="modal-header">
        <h2 style="display:flex;align-items:center;gap:var(--s-sm)">
          <span :text="detailExp ? 'Edit Expense' : 'Add Expense'"></span>
          <span :if="detailExp?.expense_no" class="dim modal-title-sub" :text="'#' + detailExp?.expense_no"></span>
          <span :if="detailExp?.status" class="badge" :class="'badge-' + detailExp?.status" :text="fmtStatus(detailExp?.status)"></span>
        </h2>
        <button class="modal-close" type="button" aria-label="Close dialog" :onclick="detailExp ? cancelExpenseEdit() : cancelAdd()" :html="icon('close')"></button>
      </div>
      <div class="modal-body">
        <form id="exp-form" :onsubmit.prevent="saveExpense" style="display:flex;flex-direction:column;gap:var(--s-md)">
          <div :if="expEditPolicy.message" class="dim" style="font-size:var(--f-sm)" :text="expEditPolicy.message"></div>
          <div class="form-row">
            <div :if="can('expenses:approve')" class="field autocomplete">
              <label>Payee</label>
              <div style="position:relative">
                <input id="exp-vendor" type="text" :value="expForm.payee"
                :onfocus="e => filterExpensePayees(expForm.payee)"
                :oninput="e => { expForm.member_id = null; filterExpensePayees(e.target.value) }"
                :onblur="e => { vendorHits = []; memberHits = [] }"
                placeholder="Vendor, store, person…" :required="!editId" :disabled="expEditPolicy.payeeLocked">
                <button :if="expForm.member_id && !expEditPolicy.payeeLocked" type="button" class="btn-link"
                  style="position:absolute;right:.5rem;top:50%;transform:translateY(-50%)"
                  :onclick="clearExpMember()">&times;</button>
              </div>
              <div :if="memberHits.length || vendorHits.length" class="autocomplete-list">
                <div :if="memberHits.length" class="autocomplete-group-label">Members</div>
                <div class="autocomplete-item" :each="m in memberHits" :onmousedown.prevent="selectExpMember(m)" :text="m.name"></div>
                <div :if="vendorHits.length" class="autocomplete-group-label">Recent payees</div>
                <div class="autocomplete-item" :each="v in vendorHits" :onmousedown.prevent="selectExpVendor(v)" :text="v"></div>
              </div>
            </div>
            <div class="field">
              <label>Amount ($)</label>
              <input id="exp-amount" type="number" :value="expForm.amount" :oninput="e => markDirty(`amount`)" step="0.01" min="0.01" placeholder="0.01" required :disabled="expEditPolicy.amountLocked">
            </div>
            <div class="field">
              <label>Category</label>
              <select id="exp-cat" :value="expForm.category" :onchange="e => markDirty(`category`)" :disabled="expEditPolicy.lockedAll">
                <option value="" disabled hidden :selected="!(expForm.category || '')">Select…</option>
                {% include partials/expense-category-options.html %}
              </select>
            </div>
          </div>
          <div :if="can('expenses:approve')" class="form-row">
            <div class="field">
              <label>Date</label>
              <input id="exp-date" type="date" :value="expForm.expense_date" :oninput="e => markDirty(`date`)" :disabled="expEditPolicy.dateLocked" :placeholder="'Defaults to today'">
            </div>
          </div>
          <div class="field">
            <label>Note</label>
            <textarea id="exp-desc" rows="1" style="field-sizing:content;resize:none" :value="expForm.note" :oninput="e => markDirty(`note`)" placeholder="Optional…" :disabled="expEditPolicy.lockedAll"></textarea>
          </div>

          <div :if="receipts.some(r => r.duplicate)" class="form-warn">Possible duplicate — a receipt was previously uploaded for another expense</div>
          <div class="form-warn" :if="addErr" :text="addErr"></div>
        </form>

        <div :if="detailExp" style="display:flex;flex-direction:column;gap:var(--s-sm)">
          <label>History</label>
          <div class="activity-feed">
            <div class="activity-item" :each="e in expTimeline">
              <span class="activity-marker" :class="'activity-marker-' + e.badge" :html="activityIcon(e.badge)"></span>
              <div class="activity-copy">
                <div class="activity-line">
                  <span class="activity-label" :text="e.label"></span>
                  <span :if="e.actor"> by </span>
                  <a class="activity-actor-link" :if="e.actor && e.uid && e.uid !== myUid" href="{{ '/app/members/' | relative_url }}" :text="e.actor"></a>
                  <span :if="e.actor && (!e.uid || e.uid === myUid)" :text="e.actor"></span>
                  <span class="activity-date-inline" :if="e.date" :text="timelineShortDate(e.date)"></span>
                </div>
                <div :if="e.detail" class="activity-detail" :text="e.detail"></div>
              </div>
            </div>

            <div :if="expenseHasActions(detailExp)" class="activity-item activity-item-current">
              <span class="activity-marker" :class="'activity-marker-' + expenseCurrentStatusBadge(detailExp)" :html="activityIcon(expenseCurrentStatusBadge(detailExp))"></span>
              <div class="activity-copy">
                <div class="activity-line activity-line-current">
                  <span class="activity-label" :text="expenseCurrentStatusText(detailExp)"></span>
                  <div :if="detailExp?.status === 'submitted' && can('expenses:approve') && !expRejecting" class="activity-followup-actions activity-followup-actions-inline">
                    <button class="btn btn-primary btn-sm" :class="{'btn-loading': actioning}" :onclick="approveExp()">Approve</button>
                    <button class="btn btn-danger btn-sm" :onclick="openExpenseReject()">Reject</button>
                  </div>
                  <div :if="detailExp?.status === 'submitted' && can('expenses:approve') && expRejecting" class="activity-followup-actions activity-followup-actions-inline activity-followup-actions-reject-inline">
                    <span class="activity-inline-input-wrap">
                      <input class="activity-inline-input" type="text" :value="actionNote" placeholder="Reason">
                      <button class="activity-inline-clear" aria-label="Cancel reject" title="Cancel reject" :onclick="cancelExpenseReject()">×</button>
                    </span>
                    <button class="btn btn-danger btn-sm" :class="{'btn-loading': actioning}" :onclick="rejectExp()">Send</button>
                  </div>
                  <div :if="detailExp?.status === 'approved' && can('expenses:approve')" class="activity-followup-actions activity-followup-actions-inline">
                    <input type="text" :value="payRef" :oninput="e => payRef = e.target.value" placeholder="Reference (optional)" class="input input-sm" style="width:14rem">
                    <button class="btn btn-primary btn-sm" :class="{'btn-loading': actioning}" :onclick="payExp()">Paid</button>
                  </div>
                  <div :if="detailExp?.status === 'paid' && can('expenses:approve')" class="activity-followup-actions activity-followup-actions-inline">
                    <button class="btn btn-primary btn-sm" :class="{'btn-loading': actioning}" :disabled="!expAttachments.length" :title="expAttachments.length ? '' : 'Attach receipt before closing'" :onclick="closeExp()">Close</button>
                    <span :if="!expAttachments.length" class="activity-hint dim">Attach receipt first</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div style="display:flex; justify-content:flex-end; gap:var(--s-sm); align-items:center; flex-wrap:wrap">
          <button :if="editId && expMode === 'edit' && !delConfirm && detailExp?.status !== 'closed' && (detailExp?.status === 'submitted' || hasRole('admin') || hasRole('administrator'))" type="button" class="btn btn-danger" style="margin-right:auto" :onclick="delConfirm = true">Delete</button>
          <span :if="delConfirm" class="dim" style="font-size:var(--f-sm); margin-right:auto; align-self:center">Delete permanently?</span>
          <button :if="delConfirm" type="button" class="btn btn-danger" :class="{'btn-loading': deleting}" :onclick="delExpense()">Yes</button>
          <button :if="delConfirm" type="button" class="btn btn-outline" :onclick="delConfirm = false">No</button>
          <button :if="!delConfirm && !detailExp" type="button" class="btn btn-outline" :onclick="cancelAdd()">Cancel</button>
          <button :if="!delConfirm && !detailExp" type="submit" form="exp-form" class="btn btn-primary" :disabled="expEditPolicy.lockedAll || expSaving">Submit</button>
          <button :if="!delConfirm && detailExp && expMode !== 'edit'" type="button" class="btn btn-outline" :onclick="cancelExpenseEdit()">Close</button>
          <button :if="!delConfirm && detailExp && expMode !== 'edit' && (detailExp?.status === 'submitted' || hasRole('admin') || hasRole('administrator'))" type="button" class="btn btn-primary" :onclick="beginExpenseEdit()">Edit</button>
          <button :if="!delConfirm && detailExp && expMode === 'edit'" type="button" class="btn btn-outline" :onclick="cancelExpenseEdit()">Cancel</button>
          <button :if="!delConfirm && detailExp && expMode === 'edit'" type="submit" form="exp-form" class="btn btn-primary" :class="{'btn-loading': expSaving}" :disabled="expEditPolicy.lockedAll || expSaving">Update</button>
        </div>
      </div>
    </div>
  </div>
</div>
</template>
<div :html="showAdd && activeTab === 'expenses' ? document.getElementById('exp-modal-template') : ''"></div>
<div :if="lightboxSrc" class="lightbox" :onclick="lightboxSrc = ''" :onkeydown.esc.document="lightboxSrc = ''">
  <img :src="lightboxSrc">
  <button class="lightbox-close" :onclick="lightboxSrc = ''" :html="icon('close')"></button>
</div>
