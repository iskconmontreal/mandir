---
---
<div class="page-header">
  <h1>Profile</h1>
  <p>Your account details</p>
</div>

<div class="card" style="margin-bottom:var(--s-xl)">
  <div style="display:flex; gap:var(--s-lg); flex-wrap:wrap">
    <div>
      <div class="stat-label">Name</div>
      <div :text="user?.meta?.spiritual_name || user?.meta?.name || user?.email?.split('@')[0] || '—'"></div>
    </div>
    <div>
      <div class="stat-label">Email</div>
      <div :text="user?.email || '—'"></div>
    </div>
    <div>
      <div class="stat-label">Role</div>
      <span class="badge" :text="roleName"></span>
    </div>
  </div>
</div>

<div :if="permissions.length" class="card" style="margin-bottom:var(--s-xl)">
  <h3 style="margin-bottom:var(--s-md)">Permissions</h3>
  <div style="display:flex; flex-direction:column; gap:var(--s-md)">
    <div :each="scope in Object.keys(permGroups)">
      <div class="stat-label" style="margin-bottom:var(--s-xs)" :text="({clients:'Members',users:'Users',expenses:'Expenses',donations:'Donations',roles:'Roles'})[scope] || fmtCat(scope)"></div>
      <div style="display:flex; flex-wrap:wrap; gap:var(--s-xs)">
        <span class="badge" :each="action in permGroups[scope]" :text="action"></span>
      </div>
    </div>
  </div>
</div>

<div class="card">
  <h3 style="margin-bottom:var(--s-md)">Trusted Devices</h3>
  <div :if="devicesLoading" class="section-loader"><img src="/assets/preloader.svg"></div>
  <div :if="!devicesLoading && !devices.length" class="dim" style="font-size:var(--f-sm)">No trusted devices</div>
  <div :if="!devicesLoading" :each="d in devices"
    :scope="{confirm:false, loading:false}"
    style="display:flex; align-items:center; justify-content:space-between; gap:var(--s-md); padding:var(--s-sm) 0; border-bottom:1px solid var(--c-border)">
    <div>
      <div style="font-size:var(--f-sm)">
        <span :text="d.label || 'Unknown'"></span>
        <span :if="d.device_id === currentDeviceId" class="badge" style="margin-left:var(--s-xs)">This device</span>
      </div>
      <div class="dim" style="font-size:var(--f-sm)" :text="'ID: ' + d.device_id.slice(0, 8) + '…'"></div>
    </div>
    <div :if="!confirm">
      <button class="btn-link" style="color:var(--c-err); font-size:var(--f-sm); white-space:nowrap"
        :onclick="confirm = true">Revoke</button>
    </div>
    <div :if="confirm" style="display:flex; align-items:center; gap:var(--s-sm)">
      <span class="dim" style="font-size:var(--f-sm)">Revoke?</span>
      <button class="btn btn-danger btn-sm" :class="{'btn-loading': loading}"
        :onclick="async () => { loading=true; await revokeDevice(d.id); confirm=false; loading=false }">Yes</button>
      <button class="btn-link" style="font-size:var(--f-sm)" :onclick="confirm = false">No</button>
    </div>
  </div>
</div>

<script type="module">
  import { init, auth, fmtCat, toast } from '../lib/app.js'
  import { api } from '../lib/api.js'

  const u = auth.user

  const s = init({
    fmtCat,
    roleName: (() => {
      try {
        const r = u?.role?.role
        const parsed = typeof r === 'string' ? JSON.parse(r) : r
        return parsed?.name || '—'
      } catch { return '—' }
    })(),
    permissions: auth.permissions,
    get permGroups() {
      const groups = {}
      for (const p of this.permissions) {
        const [scope, action] = p.split(':')
        if (!groups[scope]) groups[scope] = []
        groups[scope].push(action)
      }
      return groups
    },
    devices: [],
    devicesLoading: true,
    currentDeviceId: auth.deviceId,
    async revokeDevice(id) {
      try {
        await api.revokeMyDevice(id)
        s.devices = s.devices.filter(d => d.id !== id)
      } catch (e) { toast(e.message || 'Failed to revoke') }
    },
  })

  api.getMyDevices().then(d => { s.devices = d; s.devicesLoading = false }).catch(() => { s.devicesLoading = false })
</script>
