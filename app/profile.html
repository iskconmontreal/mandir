---
layout: app
title: My Profile
---
<link rel="stylesheet" href="../../css/layout.css">
<script src="../../lib/define-element.js" defer></script>

{% include components/profile-view.html %}
{% include components/profile-edit.html %}
{% include components/profile-devices.html %}
{% include components/profile-permissions.html %}

<main data-start>
  <div class="page-header mt-8" style="display:flex; align-items:center; flex-wrap:wrap; gap:var(--s-sm)">
    <div style="display:flex; align-items:center; gap:var(--s-md); flex:1; min-width:0">
      <div :if="!photoSrc" style="width:3.5rem; height:3.5rem; border-radius:50%; background:var(--c-surface-150); color:var(--c-text-dim); display:flex; align-items:center; justify-content:center; font-size:1.4rem; font-weight:600; flex-shrink:0" :text="u?.email?.[0]?.toUpperCase() || '—'"></div>
      <img :if="photoSrc" :src="photoSrc" style="width:3.5rem; height:3.5rem; border-radius:50%; object-fit:cover; flex-shrink:0" alt="Profile photo">
      <div style="min-width:0">
        <h1 class="page-title" style="font-size:1.5rem" :text="displayName"></h1>
        <div class="page-subtitle" :text="u?.email"></div>
      </div>
    </div>
    
    <div style="display:flex; gap:var(--s-sm); align-items:center">
      <button :if="!memberLoading && hasMember && !editing" class="btn btn-outline btn-sm" :onclick.stop="editing = true">Edit</button>
      <div :if="editing" style="display:flex; gap:var(--s-sm)">
        <div class="login-error" :if="saveErr" :text="saveErr"></div>
        <button type="button" class="btn btn-outline btn-sm" :onclick.stop="editing = false">Cancel</button>
        <button type="submit" form="profile-form" class="btn btn-primary btn-sm" :class="{'btn-loading': saving}" :onclick.stop="document.getElementById('profile-form').requestSubmit()">Save</button>
      </div>
    </div>
  </div>

  <div :if="memberLoading" class="card"><div class="section-loader"><img src="/assets/preloader.svg"></div></div>
  <div :if="!memberLoading && !hasMember" class="card" style="margin-bottom:var(--s-lg)">
    <div class="dim">No community profile linked to your account.</div>
  </div>

  <div :if="hasMember && !editing" class="mx-auto pb-12 w-full" style="display:flex; flex-direction:column; gap:var(--s-lg)">
    <profile-view :member="m" :user="u" :role-names="roleNames" :photosrc="photoSrc"></profile-view>
    <profile-devices :items="deviceItems" :currentid="deviceId"></profile-devices>
    <profile-permissions :permissions="permissions" :perm-groups="permGroups"></profile-permissions>
  </div>
  <div :if="hasMember && editing" class="mx-auto pb-12 w-full" style="max-width:48rem">
    <profile-edit :member="m" :user="u" :photosrc="photoSrc" :onsave="e => handleSave(e.detail)" :onsaving="e => saving = e.detail" :onerror="e => saveErr = e.detail"></profile-edit>
  </div>
</main>

<script type="module">
  import { init, auth, fmtCat, toast, userRoleNames } from 'lib/app.js'
  import { api, BASE } from 'lib/api.js'
  import sprae from 'lib/sprae.js'
  import { setupProcessor } from 'lib/processor.js'

  setupProcessor(sprae, {
    api, BASE,
    fmtCat, toast,
    auth, userRoleNames
  })

  // Load member profile
  api.getMyMember().then(async member => {
    window.memberRaw = member
    const data = typeof member.data === 'string' ? JSON.parse(member.data) : (member.data || {})
    s.m = data
    s.hasMember = true
    s.memberLoading = false

    if (member.public_id) {
      try {
        const res = await fetch(`${BASE}/uploads/community/members/${member.public_id}.webp`, {
          headers: auth.token ? { Authorization: `Bearer ${auth.token}` } : {},
        })
        if (res.ok) s.photoSrc = URL.createObjectURL(await res.blob())
      } catch {}
    }
  }).catch(() => { s.memberLoading = false })

  // Load trusted devices
  api.getMyDevices()
    .then(d => { s.deviceItems = Array.isArray(d) ? d : d?.items || [] })
    .catch(() => {})

  const s = init({
    u: auth.user,
    m: {},
    hasMember: false,
    memberLoading: true,
    editing: false,
    saving: false,
    saveErr: null,
    photoSrc: null,
    deviceItems: [],
    deviceId: auth.deviceId || '',
    roleNames: userRoleNames(auth.user),
    permissions: auth.permissions,
    get permGroups() {
      const groups = {}
      for (const p of this.permissions || []) {
        const [scope, action] = p.split(':')
        if (!groups[scope]) groups[scope] = []
        groups[scope].push(action)
      }
      return groups
    },
    get displayName() {
      return this.m.spiritual_name || this.m.name || this.u?.meta?.spiritual_name || this.u?.meta?.name || this.u?.email?.split('@')[0] || '—'
    },
    
    handleSave(opts) {
      s.editing = false
      if (opts?.member) s.m = opts.member
      if (opts?.photoSrc) s.photoSrc = opts.photoSrc
    }
  })
</script>
