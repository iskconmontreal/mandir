<!-- Read-only expense detail fields in form layout -->
<div class="form-row">
  <div class="detail-field">
    <div class="stat-label">Amount</div>
    <div :text="'$' + fmtAmt(detailExp?.amount)"></div>
  </div>
  <div class="detail-field">
    <div class="stat-label">Date</div>
    <div :text="detailExp?.expense_date?.slice(0,10) || '—'"></div>
  </div>
</div>
<div class="form-row">
  <div class="detail-field">
    <div class="stat-label">Payee</div>
    <div :text="detailExp?.member_id ? (memberNames[detailExp?.member_id] || detailExp?.payee) : (detailExp?.payee || '—')"></div>
  </div>
  <div class="detail-field">
    <div class="stat-label">Category</div>
    <div :text="fmt(detailExp?.category)"></div>
  </div>
</div>
<div class="form-row" :if="detailExp?.tax_amount || detailExp?.reference">
  <div class="detail-field" :if="detailExp?.tax_amount">
    <div class="stat-label">Tax</div>
    <div :text="'$' + fmtAmt(detailExp?.tax_amount)"></div>
  </div>
  <div class="detail-field" :if="detailExp?.reference">
    <div class="stat-label">Reference</div>
    <div :text="detailExp?.reference"></div>
  </div>
</div>
<div class="detail-field" :if="detailExp?.member_id && memberNames[detailExp?.member_id]">
  <div class="stat-label">Submitted by</div>
  <div :text="memberNames[detailExp?.member_id]"></div>
</div>
<div :if="detailExp?.note || detailExp?.description">
  <div class="stat-label">Note</div>
  <div :text="detailExp?.note || detailExp?.description"></div>
</div>
<div class="form-row" :if="detailExp?.created_at || detailExp?.updated_at">
  <div class="detail-field" :if="detailExp?.created_at">
    <div class="stat-label">Created</div>
    <div :text="(detailExp?.created_at || '').replace('T', ' ').slice(0,16) + (detailExp?.created_by ? (' · ' + (detailExp?.created_by === myUid ? 'you' : (userNames[detailExp?.created_by] || ('User #' + detailExp?.created_by)))) : '')"></div>
  </div>
  <div class="detail-field" :if="detailExp?.updated_at && detailExp?.updated_at !== detailExp?.created_at">
    <div class="stat-label">Updated</div>
    <div :text="(detailExp?.updated_at || '').replace('T', ' ').slice(0,16) + (detailExp?.updated_by ? (' · ' + (detailExp?.updated_by === myUid ? 'you' : (userNames[detailExp?.updated_by] || ('User #' + detailExp?.updated_by)))) : '')"></div>
  </div>
</div>
