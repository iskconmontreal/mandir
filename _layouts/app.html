<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: "Home" }} — Mandir</title>
  <link rel="modulepreload" href="{{ '/lib/sprae.js' | relative_url }}">
  <link rel="modulepreload" href="{{ '/lib/auth.js' | relative_url }}">
  <link rel="modulepreload" href="{{ '/lib/api.js' | relative_url }}">
  <link rel="modulepreload" href="{{ '/lib/app.js' | relative_url }}">
  {% for path in page.preloads %}<link rel="modulepreload" href="{{ path | relative_url }}">
  {% endfor %}
  <link rel="stylesheet" href="{{ '/css/tokens.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/css/base.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/css/layout.css' | relative_url }}">
</head>
<body>
  <div class="progress loading"
      :scope="{loading: true, mouse: .5}"
      :style="{'--progress-mouse': mouse}"
      :class="{loading, done: !loading}"
      :onload.window="loading = false"></div>
      <div class="app" id="app">
    <!-- :onmousemove.document.throttle-raf="event => { mouse = Math.max(0, Math.min(1, (event?.clientX || 0) / Math.max(window.innerWidth, 1))) }" -->

    <!-- Top navigation -->
    <header class="topbar">
      <a href="{{ '/app' | relative_url }}" class="topbar-brand">
        <img src="{{ '/assets/iskcon-montreal.svg' | relative_url }}" alt="ISKCON Montreal" width="64" height="64">
      </a>

      <nav class="nav">
        <a :if="can('income:view') || can('expenses:view')" class="nav-item" :class="{active: active('finance')}" href="{{ '/app/finance/' | relative_url }}">
          <span :html="icon('nav_finance')"></span>
          Finance
        </a>
        <a :if="can('members:view')" class="nav-item" :class="{active: active('members')}" href="{{ '/app/members/' | relative_url }}">
          <span :html="icon('nav_members')"></span>
          Community
        </a>
      </nav>

      <div class="topbar-user" style="position:relative">
        <button class="user-trigger" :onclick="userMenu = !userMenu" :onclick.outside="userMenu = false">
          <span :text="user?.meta?.spiritual_name || user?.meta?.name || user?.email?.split('@')[0] || 'User'"></span>
          <span :html="icon('chevron_down')"></span>
        </button>
        <div class="user-menu" :if="userMenu">
          <a href="{{ '/app/profile.html' | relative_url }}" class="user-menu-item">
            <span :html="icon('user_profile')"></span>
            Profile
          </a>
          <a href="{{ '/app/organization/' | relative_url }}" class="user-menu-item">
            <span :html="icon('user_organization')"></span>
            Organization
          </a>
          <a :if="can('roles:update')" href="{{ '/app/admin/roles/' | relative_url }}" class="user-menu-item">
            <span :html="icon('user_roles')"></span>
            Roles
          </a>
          <a href="#" class="user-menu-item user-menu-danger" :onclick.prevent="logout">
            <span :html="icon('user_logout')"></span>
            Sign out
          </a>
        </div>
      </div>
    </header>

    <!-- Main content -->
    <main class="main">
      {{ content }}

      <p :if="can('income:view') || can('expenses:view')"
        class="dim" style="text-align:center; margin-top:auto; padding-top:var(--s-xl); font-size:var(--f-sm); font-style:italic"
        :scope="((a) => ({_q: a[Math.floor(Math.random() * a.length)]}))([
          '&ldquo;There must be always individual striving and work and responsibility.&rdquo; — Śrīla Prabhupāda',
          '&ldquo;That is the art of management: to draw out spontaneous loving spirit.&rdquo; — Śrīla Prabhupāda',
          '&ldquo;Accounts must be kept, things must be in order and lawfully done.&rdquo; — Śrīla Prabhupāda',
          '&ldquo;This movement is meant for training men to become reliable and responsible.&rdquo; — Śrīla Prabhupāda',
          '&ldquo;Each center should be responsible for its own management.&rdquo; — Śrīla Prabhupāda',
          '&ldquo;Our leaders shall be careful not to kill the spirit of enthusiastic service.&rdquo; — Śrīla Prabhupāda',
          '&ldquo;Record of expenditures must be there, that is standard procedure.&rdquo; — Śrīla Prabhupāda' ])"
        :text="_q"></p>
      <p :if="!(can('income:view') || can('expenses:view'))"
        class="dim" style="text-align:center; margin-top:auto; padding-top:var(--s-xl); font-size:var(--f-sm); font-style:italic"
        :scope="((a) => ({_q: a[Math.floor(Math.random() * a.length)]}))([ '&ldquo;Even a small service to the Lord is accepted by Him.&rdquo; — Śrīla Prabhupāda',
        '&ldquo;Whatever you do, do it as an offering to Krishna.&rdquo; — Śrīla Prabhupāda',
        '&ldquo;Krishna is so kind that He accepts a little flower, a little water, a little fruit.&rdquo; — Śrīla Prabhupāda',
        '&ldquo;One who gives charity becomes very famous and opulent.&rdquo; — Śrīla Prabhupāda',
        '&ldquo;Every service counts. Nothing is ever lost on this path.&rdquo; — Bhagavad-gītā 2.40',
        '&ldquo;The Lord is very satisfied with even a small offering made by His devotee.&rdquo; — Śrīla Prabhupāda' ])"
        :text="_q"></p>
    </main>

  </div>
</body>
</html>
