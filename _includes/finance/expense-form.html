<!-- Expense detail modal -->
<template id="exp-detail-modal-template">
<div class="modal-overlay" :onkeydown.esc.document="e => { if (lightboxSrc || filePickerOpen) return; cancelAdd() }">
  <div class="modal" :onclick.outside="e => { if (lightboxSrc || filePickerOpen) return; cancelAdd() }">
    <div class="modal-header">
      <h2 style="display:flex;align-items:center;gap:var(--s-sm)">
        <span :text="detailExp?.expense_no || 'Expense'"></span>
        <span class="badge" :class="'badge-' + detailExp?.status" :text="fmtStatus(detailExp?.status)"></span>
      </h2>
      <button class="modal-close" :onclick="cancelAdd()">&times;</button>
    </div>
    <div class="modal-body">
      <div :if="detailExp" style="display:flex;flex-direction:column;gap:var(--s-md)">
        {% include partials/expense-info.html %}

        <div :if="expAttachments.length">
          <div class="stat-label" style="margin-bottom:var(--s-sm)">Receipts</div>
          <div class="receipt-strip" style="flex-wrap:wrap;cursor:default">
            <div :each="a in expAttachments" class="receipt-thumb"
              :onclick="a.mime_type?.startsWith('image/') ? (lightboxSrc = apiBase + '/' + a.file_path) : window.open(apiBase + '/' + a.file_path, '_blank')">
              <img :if="a.mime_type?.startsWith('image/')" :src="apiBase + '/' + a.file_path" :alt="a.original_name">
              <div :if="!a.mime_type?.startsWith('image/')" class="receipt-placeholder" :text="a.original_name?.split('.').pop()?.toUpperCase() || 'FILE'"></div>
            </div>
          </div>
        </div>

        <!-- Activity timeline -->
        <div :if="expTimeline.length">
          <div class="stat-label" style="margin-bottom:var(--s-sm)">Activity</div>
          <div class="activity-feed">
            <div class="activity-item" :each="e in expTimeline">
              <div class="activity-icon" :class="'activity-icon-' + e.badge" :html="activityIcon(e.badge)"></div>
              <div class="activity-body">
                <span :if="e.actor" class="activity-actor"><a :if="e.uid && e.uid !== myUid" href="{{ '/app/members/' | relative_url }}" :text="e.actor"></a><span :if="!e.uid || e.uid === myUid" :text="e.actor"></span> </span>
                <span :text="e.actor ? e.label.toLowerCase() : e.label"></span>
                <span :if="e.detail" class="dim" :text="' · ' + e.detail"></span>
              </div>
              <span class="activity-date" :text="fmtDate(e.date)"></span>
            </div>
          </div>
        </div>

        <!-- Workflow actions -->
        <div :if="detailExp?.status === 'submitted' && can('expenses:approve')" class="action-section">
          <div class="field">
            <label>Note</label>
            <textarea rows="2" :value="actionNote" :oninput="e => actionNote = e.target.value" placeholder="Optional note for approval…"></textarea>
          </div>
        </div>

        <div :if="detailExp?.status === 'approved' && can('expenses:approve')" class="action-section">
          <div class="field">
            <label>Reference</label>
            <input type="text" :value="actionRef" :oninput="e => actionRef = e.target.value" placeholder="e-Transfer ref, cheque #…">
          </div>
        </div>

        <div class="form-warn" :if="addErr" :text="addErr"></div>

        <div style="display:flex; justify-content:flex-end; gap:var(--s-sm); align-items:center">
          <button :if="detailExp?.status === 'submitted' && can('expenses:approve')" class="btn btn-danger btn-sm" :class="{'btn-loading': actioning}" :onclick="rejectExp()" style="margin-right:auto">Reject</button>
          <button :if="detailExp?.status === 'submitted' && can('expenses:approve')" class="btn btn-primary btn-sm" :class="{'btn-loading': actioning}" :onclick="approveExp()">Approve</button>
          <button :if="detailExp?.status === 'approved' && can('expenses:approve')" class="btn btn-primary btn-sm" :class="{'btn-loading': actioning}" :onclick="payExp()">Done</button>
          <button :if="detailExp?.status === 'submitted' && can('expenses:create')" class="btn btn-outline btn-sm" :onclick="editExpense(detailExp, 'detail')">Edit</button>
          <button class="btn btn-outline btn-sm" :onclick="cancelAdd()">Close</button>
        </div>
      </div>

    </div>
  </div>
</div>
</template>

<!-- Expense edit modal -->
<template id="exp-edit-modal-template">
<div class="modal-overlay" :onkeydown.esc.document="e => { if (lightboxSrc || filePickerOpen) return; cancelAdd() }">
  <div class="modal" :onclick.outside="e => { if (lightboxSrc || filePickerOpen) return; cancelAdd() }">
    <div class="modal-header">
      <h2>Edit Expense</h2>
      <button class="modal-close" :onclick="cancelAdd()">&times;</button>
    </div>
    <div class="modal-body">
      <div style="display:flex;flex-direction:column;gap:var(--s-md)">
        <div :if="editId && expAttachments.length">
          <div class="stat-label" style="margin-bottom:var(--s-sm)">Receipts</div>
          <div class="receipt-strip" style="flex-wrap:wrap;cursor:default">
            <div :each="a in expAttachments" class="receipt-thumb"
              :onclick="a.mime_type?.startsWith('image/') ? (lightboxSrc = apiBase + '/' + a.file_path) : window.open(apiBase + '/' + a.file_path, '_blank')">
              <img :if="a.mime_type?.startsWith('image/')" :src="apiBase + '/' + a.file_path" :alt="a.original_name">
              <div :if="!a.mime_type?.startsWith('image/')" class="receipt-placeholder" :text="a.original_name?.split('.').pop()?.toUpperCase() || 'FILE'"></div>
            </div>
          </div>
        </div>

        <form :onsubmit.prevent="saveExpense" style="display:flex;flex-direction:column;gap:var(--s-md)">
          <div :if="can('expenses:approve')" class="form-row">
            <div class="field autocomplete">
              <label>Payee</label>
              <div style="position:relative">
                <input :id="location.pathname.includes('/app/finance') ? 'exp-vendor' : 'home-exp-vendor'" type="text" :value="expForm.member_id ? memberQuery : expForm.payee"
                :onfocus="e => filterExpensePayees(expForm.member_id ? memberQuery : expForm.payee)"
                :oninput="e => { expDirty = true; expForm.member_id = null; filterExpensePayees(e.target.value) }"
                :onblur="e => { vendorHits = []; memberHits = [] }"
                placeholder="Vendor, store, person…" :required="!editId" :disabled="expEditPolicy.payeeLocked">
                <button :if="expForm.member_id && !expEditPolicy.payeeLocked" type="button" class="btn-link"
                  style="position:absolute;right:.5rem;top:50%;transform:translateY(-50%)"
                  :onclick="clearExpMember()">&times;</button>
              </div>
              <div :if="memberHits.length || vendorHits.length" class="autocomplete-list">
                <div :if="memberHits.length" class="autocomplete-group-label">Members</div>
                <div class="autocomplete-item" :each="m in memberHits" :onmousedown.prevent="selectExpMember(m)" :text="m.name"></div>
                <div :if="vendorHits.length" class="autocomplete-group-label">Recent payees</div>
                <div class="autocomplete-item" :each="v in vendorHits" :onmousedown.prevent="selectExpVendor(v)" :text="v"></div>
              </div>
            </div>
            <div class="field">
              <label>Category</label>
              <select :id="location.pathname.includes('/app/finance') ? 'exp-cat' : 'home-exp-cat'" :value="expForm.category" :onchange="e => { expDirty = true; expForm.category = e.target.value }" :disabled="expEditPolicy.lockedAll">
                <option value="" disabled hidden :selected="!(expForm.category || '')">Select…</option>
                {% include partials/expense-category-options.html %}
              </select>
            </div>
          </div>
          <div :if="can('expenses:approve')" class="form-row">
            <div class="field">
              <label>Amount ($)</label>
              <input :id="location.pathname.includes('/app/finance') ? 'exp-amount' : 'home-exp-amount'" type="number" :value="expForm.amount" :oninput="e => { expDirty = true; expForm.amount = e.target.value }" step="0.01" min="0.01" placeholder="0.01" required :disabled="expEditPolicy.amountLocked">
            </div>
            <div class="field">
              <label>Date</label>
              <input :id="location.pathname.includes('/app/finance') ? 'exp-date' : 'home-exp-date'" type="date" :value="expForm.expense_date" :oninput="e => { expDirty = true; expForm.expense_date = e.target.value }" required :disabled="expEditPolicy.dateLocked">
            </div>
          </div>
          <div :if="can('expenses:approve')" class="field">
            <label>Note</label>
            <textarea :id="location.pathname.includes('/app/finance') ? 'exp-desc' : 'home-exp-desc'" rows="1" style="field-sizing:content;resize:none" :value="expForm.note" :oninput="e => { expDirty = true; expForm.note = e.target.value }" placeholder="Optional…" :disabled="expEditPolicy.lockedAll"></textarea>
          </div>
          <div :if="!can('expenses:approve')" class="form-row">
            <div class="field">
              <label>Amount ($)</label>
              <input :id="location.pathname.includes('/app/finance') ? 'exp-amount' : 'home-exp-amount'" type="number" :value="expForm.amount" :oninput="e => expForm.amount = e.target.value" step="0.01" min="0.01" placeholder="0.01" required :disabled="expEditPolicy.amountLocked">
            </div>
            <div class="field">
              <label>Category</label>
              <select :id="location.pathname.includes('/app/finance') ? 'exp-cat' : 'home-exp-cat'" :value="expForm.category" :onchange="e => { expDirty = true; expForm.category = e.target.value }" :disabled="expEditPolicy.lockedAll">
                <option value="" disabled hidden :selected="!(expForm.category || '')">Select…</option>
                {% include partials/expense-category-options.html %}
              </select>
            </div>
          </div>
          <div :if="!can('expenses:approve')" class="field">
            <label>Note</label>
            <textarea :id="location.pathname.includes('/app/finance') ? 'exp-desc' : 'home-exp-desc'" rows="1" style="field-sizing:content;resize:none" :value="expForm.note" :oninput="e => expForm.note = e.target.value" placeholder="Optional…" :disabled="expEditPolicy.lockedAll"></textarea>
          </div>

          <div :if="receipts.some(r => r.duplicate)" class="form-warn">Possible duplicate — a receipt was previously uploaded for another expense</div>
          <div class="form-warn" :if="addErr" :text="addErr"></div>

          <div style="display:flex; justify-content:flex-end; gap:var(--s-sm)">
            <button :if="editId && detailExp?.status === 'submitted' && !delConfirm" type="button" class="btn btn-danger btn-sm" style="margin-right:auto" :onclick="delConfirm = true">Delete</button>
            <span :if="delConfirm" class="dim" style="font-size:var(--f-sm); margin-right:auto; align-self:center">Delete permanently?</span>
            <button :if="delConfirm" type="button" class="btn btn-danger btn-sm" :class="{'btn-loading': deleting}" :onclick="delExpense()">Yes</button>
            <button :if="delConfirm" type="button" class="btn btn-outline btn-sm" :onclick="delConfirm = false">No</button>
            <button :if="!delConfirm" type="button" class="btn btn-outline" :onclick="editId && expMode === 'edit' ? cancelExpenseEdit() : cancelAdd()">Cancel</button>
            <button :if="!delConfirm" type="submit" class="btn btn-primary" :disabled="expEditPolicy.lockedAll || expSaving">Update</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
</template>

<!-- Expense create modal -->
<template id="exp-create-modal-template">
<div class="modal-overlay" :onkeydown.esc.document="e => { if (lightboxSrc || filePickerOpen) return; cancelAdd() }">
  <div class="modal" :onclick.outside="e => { if (lightboxSrc || filePickerOpen) return; cancelAdd() }">
    <div class="modal-header">
      <h2>Add Expense</h2>
      <button class="modal-close" :onclick="cancelAdd()">&times;</button>
    </div>
    <div class="modal-body">
      <div style="display:flex;flex-direction:column;gap:var(--s-md)">
        <div class="receipt-strip"
          :ondragover="e => e.preventDefault()"
          :ondrop="e => { e.preventDefault(); addReceipts(e.dataTransfer.files) }">
          <div :if="!receipts.length" style="flex:1;text-align:center;cursor:pointer"
            :onclick="() => { filePickerOpen = true; document.getElementById('receipt-input').click() }">
            <div class="scan-icon">
              <span :html="icon('scan_receipts')"></span>
            </div>
            <div style="font-weight:var(--f-wt-b)">Scan receipts</div>
            <div class="scan-hint">Drop images or PDFs, or click to browse</div>
          </div>
          <div :each="r in receipts" class="receipt-thumb" :class="{ 'receipt-extracting': r.extracting, 'receipt-error': r.err, 'receipt-duplicate': r.duplicate }"
            :onclick="e => { if (!e.target.closest('.receipt-remove') && r.preview) lightboxSrc = r.preview }">
            <img :if="r.preview" :src="r.preview">
            <div :if="!r.preview" class="receipt-placeholder" :text="r.name?.split('.').pop()?.toUpperCase() || 'FILE'"></div>
            <div class="receipt-amount" :if="r.extracting" :text="'Scanning…'"></div>
            <div :if="r.extracting" class="receipt-spinner"></div>
            <button type="button" class="receipt-remove" :onclick="removeReceipt(r)">&times;</button>
          </div>
          <div :if="receipts.length" class="receipt-add"
            :onclick="() => { filePickerOpen = true; document.getElementById('receipt-input').click() }">+</div>
        </div>
        <input id="receipt-input" type="file" accept="image/*,.pdf" multiple style="display:none"
          :oncancel="() => filePickerOpen = false"
          :onchange="e => { filePickerOpen = false; addReceipts(e.target.files); e.target.value = '' }">

        <form :onsubmit.prevent="saveExpense" style="display:flex;flex-direction:column;gap:var(--s-md)">
          <div :if="can('expenses:approve')" class="form-row">
            <div class="field autocomplete">
              <label>Payee</label>
              <div style="position:relative">
                <input :id="location.pathname.includes('/app/finance') ? 'exp-vendor' : 'home-exp-vendor'" type="text" :value="expForm.member_id ? memberQuery : expForm.payee"
                :onfocus="e => filterExpensePayees(expForm.member_id ? memberQuery : expForm.payee)"
                :oninput="e => { expForm.member_id = null; filterExpensePayees(e.target.value) }"
                :onblur="e => { vendorHits = []; memberHits = [] }"
                placeholder="Vendor, store, person…" :required="!editId" :disabled="expEditPolicy.payeeLocked">
                <button :if="expForm.member_id && !expEditPolicy.payeeLocked" type="button" class="btn-link"
                  style="position:absolute;right:.5rem;top:50%;transform:translateY(-50%)"
                  :onclick="clearExpMember()">&times;</button>
              </div>
              <div :if="memberHits.length || vendorHits.length" class="autocomplete-list">
                <div :if="memberHits.length" class="autocomplete-group-label">Members</div>
                <div class="autocomplete-item" :each="m in memberHits" :onmousedown.prevent="selectExpMember(m)" :text="m.name"></div>
                <div :if="vendorHits.length" class="autocomplete-group-label">Recent payees</div>
                <div class="autocomplete-item" :each="v in vendorHits" :onmousedown.prevent="selectExpVendor(v)" :text="v"></div>
              </div>
            </div>
            <div class="field">
              <label>Category</label>
              <select :id="location.pathname.includes('/app/finance') ? 'exp-cat' : 'home-exp-cat'" :value="expForm.category" :onchange="e => expForm.category = e.target.value" :disabled="expEditPolicy.lockedAll">
                <option value="" disabled hidden :selected="!(expForm.category || '')">Select…</option>
                {% include partials/expense-category-options.html %}
              </select>
            </div>
          </div>
          <div :if="can('expenses:approve')" class="form-row">
            <div class="field">
              <label>Amount ($)</label>
              <input :id="location.pathname.includes('/app/finance') ? 'exp-amount' : 'home-exp-amount'" type="number" :value="expForm.amount" :oninput="e => { expDirty = true; expForm.amount = e.target.value }" step="0.01" min="0.01" placeholder="0.01" required :disabled="expEditPolicy.amountLocked">
            </div>
            <div class="field">
              <label>Date</label>
              <input :id="location.pathname.includes('/app/finance') ? 'exp-date' : 'home-exp-date'" type="date" :value="expForm.expense_date" :oninput="e => { expDirty = true; expForm.expense_date = e.target.value }" required :disabled="expEditPolicy.dateLocked">
            </div>
          </div>
          <div :if="can('expenses:approve')" class="field">
            <label>Note</label>
            <textarea :id="location.pathname.includes('/app/finance') ? 'exp-desc' : 'home-exp-desc'" rows="1" style="field-sizing:content;resize:none" :value="expForm.note" :oninput="e => { expDirty = true; expForm.note = e.target.value }" placeholder="Optional…" :disabled="expEditPolicy.lockedAll"></textarea>
          </div>
          <div :if="!can('expenses:approve')" class="form-row">
            <div class="field">
              <label>Amount ($)</label>
              <input :id="location.pathname.includes('/app/finance') ? 'exp-amount' : 'home-exp-amount'" type="number" :value="expForm.amount" :oninput="e => expForm.amount = e.target.value" step="0.01" min="0.01" placeholder="0.01" required :disabled="expEditPolicy.amountLocked">
            </div>
            <div class="field">
              <label>Category</label>
              <select :id="location.pathname.includes('/app/finance') ? 'exp-cat' : 'home-exp-cat'" :value="expForm.category" :onchange="e => expForm.category = e.target.value" :disabled="expEditPolicy.lockedAll">
                <option value="" disabled hidden :selected="!(expForm.category || '')">Select…</option>
                {% include partials/expense-category-options.html %}
              </select>
            </div>
          </div>
          <div :if="!can('expenses:approve')" class="field">
            <label>Note</label>
            <textarea :id="location.pathname.includes('/app/finance') ? 'exp-desc' : 'home-exp-desc'" rows="1" style="field-sizing:content;resize:none" :value="expForm.note" :oninput="e => expForm.note = e.target.value" placeholder="Optional…" :disabled="expEditPolicy.lockedAll"></textarea>
          </div>

          <div :if="receipts.some(r => r.duplicate)" class="form-warn">Possible duplicate — a receipt was previously uploaded for another expense</div>
          <div class="form-warn" :if="addErr" :text="addErr"></div>

          <div style="display:flex; justify-content:flex-end; gap:var(--s-sm)">
            <button type="button" class="btn btn-outline" :onclick="cancelAdd()">Cancel</button>
            <button type="submit" class="btn btn-primary" :disabled="expEditPolicy.lockedAll || expSaving">Submit</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
</template>
<div :html="showAdd && activeTab === 'expenses'
  ? document.getElementById(
      expMode === 'detail'
        ? 'exp-detail-modal-template'
        : expMode === 'edit'
          ? 'exp-edit-modal-template'
          : 'exp-create-modal-template'
    )
  : ''"></div>
<div :if="lightboxSrc" class="lightbox" :onclick="lightboxSrc = ''" :onkeydown.esc.document="lightboxSrc = ''">
  <img :src="lightboxSrc">
  <button class="lightbox-close" :onclick="lightboxSrc = ''">&times;</button>
</div>
