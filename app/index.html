---
---
<div class="page-header">
  <h1>ISKCON Montreal</h1>
  <p>Organization overview</p>
</div>

<!-- Financial pulse -->
<div class="card" style="margin-bottom:var(--s-xl)">
  <div class="card-header">
    <h3>Financial Pulse</h3>
    <a href="finance.html" class="btn-link" style="color:var(--c-accent)">View details →</a>
  </div>
  <div style="display:flex; gap:var(--s-xl); flex-wrap:wrap">
    <div>
      <div class="stat-label stat-ok">Donations this month</div>
      <div class="stat-value" :text="'$' + fin.donations.toLocaleString(undefined, {minimumFractionDigits: 2})"></div>
    </div>
    <div>
      <div class="stat-label stat-err">Expenses this month</div>
      <div class="stat-value" :text="'$' + fin.expenses.toLocaleString(undefined, {minimumFractionDigits: 2})"></div>
    </div>
    <div>
      <div class="stat-label" :text="fin.net >= 0 ? 'Surplus' : 'Deficit'"></div>
      <div class="stat-value" :class="fin.net >= 0 ? 'stat-ok' : 'stat-err'"
        :text="'$' + Math.abs(fin.net).toLocaleString(undefined, {minimumFractionDigits: 2})"></div>
    </div>
  </div>
  <div class="ratio-bar" style="margin-top:var(--s-lg)">
    <span :style="{width: fin.donPct + '%', background: 'var(--c-ok)'}"></span>
    <span :style="{width: fin.expPct + '%', background: 'var(--c-err)'}"></span>
  </div>
  <div style="display:flex; justify-content:space-between; font-size:var(--f-sm); color:var(--c-text-dim)">
    <span :text="'Donations ' + fin.donPct + '%'"></span>
    <span :text="'Expenses ' + fin.expPct + '%'"></span>
  </div>
</div>

<!-- Members pulse -->
<div class="card" style="margin-bottom:var(--s-xl)">
  <div class="card-header">
    <h3>Members</h3>
    <a href="members.html" class="btn-link" style="color:var(--c-accent)">View all →</a>
  </div>
  <div style="display:flex; gap:var(--s-xl); flex-wrap:wrap">
    <div>
      <div class="stat-label">Total members</div>
      <div class="stat-value" :text="members.total"></div>
    </div>
    <div>
      <div class="stat-label">Active</div>
      <div class="stat-value" :text="members.active"></div>
    </div>
    <div>
      <div class="stat-label">Joined this month</div>
      <div class="stat-value" :text="members.recent"></div>
    </div>
  </div>
</div>

<!-- Quick links -->
<div class="card-grid" style="grid-template-columns: repeat(auto-fit, minmax(14rem, 1fr))">
  <a href="finance.html" class="card" style="text-decoration:none; color:inherit; transition: box-shadow .15s">
    <div style="display:flex; align-items:center; gap:var(--s-sm); margin-bottom:var(--s-sm)">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="var(--c-accent)" stroke-width="2" stroke-linecap="round"><path d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      <b>Finance</b>
    </div>
    <div class="dim" style="font-size:var(--f-sm)">Donations, expenses, reports</div>
  </a>
  <a href="members.html" class="card" style="text-decoration:none; color:inherit; transition: box-shadow .15s">
    <div style="display:flex; align-items:center; gap:var(--s-sm); margin-bottom:var(--s-sm)">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="var(--c-accent)" stroke-width="2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
      <b>Members</b>
    </div>
    <div class="dim" style="font-size:var(--f-sm)">Devotees, contacts, spiritual info</div>
  </a>
</div>

<script type="module">
  import { init } from '../lib/app.js'

  const don = 12480.00, exp = 8635.47, gross = don + exp

  init({
    fin: {
      donations: don,
      expenses: exp,
      net: don - exp,
      donPct: Math.round(don / gross * 100),
      expPct: Math.round(exp / gross * 100),
    },
    members: {
      total: 47,
      active: 38,
      recent: 3,
    },
  })
</script>
