<!-- Member detail modal -->
<div class="modal-overlay" :if="showDetail" :onkeydown.esc.document="closeDetail()" :onclick="e => { if (e.target === e.currentTarget) closeDetail() }">
  <div class="modal">
    <div class="modal-header">
      <h2 :text="detail.name || '—'"></h2>
      <button class="modal-close" :onclick="closeDetail()">&times;</button>
    </div>
    <div class="modal-body" style="display:flex; flex-direction:column; gap:var(--s-md)">
      <div style="display:flex; align-items:center; gap:var(--s-md); margin-bottom:var(--s-xs)">
        <img :if="photoSrc" :src="photoSrc" style="width:64px;height:64px;border-radius:50%;object-fit:cover;border:2px solid var(--c-border);flex-shrink:0">
        <div :if="!photoSrc" style="width:64px;height:64px;border-radius:50%;background:var(--c-accent);display:flex;align-items:center;justify-content:center;color:white;font-size:1.4rem;font-weight:600;flex-shrink:0" :text="(detail.name?.[0]||'').toUpperCase()"></div>
        <span :if="detail.spiritual_name" class="dim" style="font-size:var(--f-sm)" :text="detail.spiritual_name"></span>
      </div>
      <div style="display:flex; gap:var(--s-lg); flex-wrap:wrap">
        <div>
          <div class="stat-label">Email</div>
          <div :text="detail.email || '—'"></div>
        </div>
        <div>
          <div class="stat-label">Phone</div>
          <div :text="detail.phone || '—'"></div>
        </div>
        <div>
          <div class="stat-label">Role</div>
          <span class="badge" :text="detail.role || '—'"></span>
        </div>
        <div :if="detail.services?.length">
          <div class="stat-label">Services</div>
          <div style="display:flex; flex-wrap:wrap; gap:var(--s-xs)">
            <span class="badge" :each="sv in detail.services" :text="sv"></span>
          </div>
        </div>
        <div>
          <div class="stat-label">Joined</div>
          <div :text="detail.joined || '—'"></div>
        </div>
      </div>

      <div :if="detail.spiritual_name || detail.diksa_guru" style="display:flex; gap:var(--s-lg); flex-wrap:wrap">
        <div :if="detail.spiritual_name">
          <div class="stat-label">Spiritual Name</div>
          <div :text="detail.spiritual_name"></div>
        </div>
        <div :if="detail.diksa_guru">
          <div class="stat-label">Diksa Guru</div>
          <div :text="detail.diksa_guru"></div>
        </div>
      </div>

      <div :if="detail.notes" style="font-size:var(--f-sm); color:var(--c-text-dim)" :text="detail.notes"></div>

      <!-- System account section -->
      <div :if="detail._user_id && can('users:view')" style="border-top:1px solid var(--c-border); padding-top:var(--s-md)">
        <div style="display:flex; align-items:center; gap:var(--s-sm); margin-bottom:var(--s-sm)">
          <span class="badge" style="background:rgba(107,92,231,.1); color:var(--c-accent)">System User</span>
        </div>
        <div style="display:flex; gap:var(--s-lg); flex-wrap:wrap; font-size:var(--f-sm)">
          <div>
            <div class="stat-label">Role</div>
            <div :if="!can('roles:update')" :text="userRoleName(userDetail)"></div>
            <select :if="can('roles:update')" style="width:auto; font-size:var(--f-sm)"
              :onchange="e => changeRole(+e.target.value)">
              <option value="0" :selected="!userDetail.role_id">None</option>
              <option :each="r in sysRoles" :value="r.id" :text="r.name" :selected="r.id === userDetail.role_id"></option>
            </select>
          </div>
          <div :if="pendingRoleId" style="flex-basis:100%; display:flex; gap:var(--s-xs); align-items:center">
            <input type="password" placeholder="Set password for this role" :value="rolePassword"
              :oninput="e => rolePassword = e.target.value"
              style="font-size:var(--f-sm); padding:var(--s-xs) var(--s-sm); width:14rem">
            <button class="btn btn-primary btn-sm" :onclick="confirmRolePassword()">Set</button>
            <button class="btn btn-outline btn-sm" :onclick="pendingRoleId = null">Cancel</button>
            <span :if="rolePasswordErr" class="login-error" style="font-size:var(--f-xs)" :text="rolePasswordErr"></span>
          </div>
          <div>
            <div class="stat-label">Last Login</div>
            <div :text="userDetail.last_login?.slice(0, 10) || 'Never'"></div>
          </div>
          <div :if="userDetail.id">
            <div class="stat-label">Trusted Devices</div>
            <div :if="!userDetail.devices?.length" class="dim">None</div>
            <div :each="d in userDetail.devices || []" style="display:flex; align-items:center; gap:var(--s-sm); font-size:var(--f-sm)">
              <span :text="d.label || d.device_id?.slice(0, 8) + '…'"></span>
              <span class="dim" :text="'(' + d.device_id?.slice(0, 8) + '…)'"></span>
            </div>
            <button :if="userDetail.devices?.length" class="btn-link" style="color:var(--c-err); font-size:var(--f-sm); margin-top:var(--s-xs)" :onclick="revokeDevice()" :class="{'btn-loading': revoking}">Revoke all</button>
          </div>
        </div>

        <!-- Permissions (read-only, defined by role) -->
        <div :if="userRolePerms.length" style="margin-top:var(--s-md)">
          <div class="stat-label" style="margin-bottom:var(--s-xs)">Permissions</div>
          <div style="display:flex; flex-wrap:wrap; gap:var(--s-xs)">
            <span class="badge" :each="p in userRolePerms" style="font-size:var(--f-sm)" :text="fmtPerm(p)"></span>
          </div>
        </div>
      </div>

      <!-- Invite section (no account yet) -->
      <div :if="!detail._user_id && detail.email" style="border-top:1px solid var(--c-border); padding-top:var(--s-md)">
        <div class="dim" style="font-size:var(--f-sm); margin-bottom:var(--s-sm)">No system account</div>
        <div style="display:flex; align-items:center; gap:var(--s-sm)">
          <button :if="!inviteConfirm" class="btn btn-outline btn-sm" :onclick="inviteConfirm = true">Send Invite</button>
          <span :if="inviteConfirm" class="dim" style="font-size:var(--f-sm)">Send invite to <span :text="detail.email"></span>?</span>
          <button :if="inviteConfirm" class="btn btn-primary btn-sm" :class="{'btn-loading': inviting}" :onclick="inviteMember()">Yes, send</button>
          <button :if="inviteConfirm" class="btn btn-outline btn-sm" :onclick="inviteConfirm = false">Cancel</button>
        </div>
      </div>

      <div style="display:flex; justify-content:flex-end; gap:var(--s-sm); border-top:1px solid var(--c-border); padding-top:var(--s-md)">
        <button class="btn btn-outline btn-sm" :onclick="editFromDetail()">Edit</button>
      </div>
    </div>
  </div>
</div>
