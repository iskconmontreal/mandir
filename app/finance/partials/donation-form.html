<!-- Donation modal (add/edit) -->
<div class="modal-overlay" :if="showAdd && activeTab === 'donations'" :onkeydown.esc.document="showAdd = false">
  <div class="modal" :onclick.outside="showAdd = false">
    <div class="modal-header">
      <h2 :text="editId ? 'Edit Donation' : 'Add Donation'"></h2>
      <button class="modal-close" :onclick="showAdd = false">&times;</button>
    </div>
    <div class="modal-body">
      <div :if="!editId" class="scan-area" :class="{'has-image': receiptPreview || receiptName}"
        :onclick="document.getElementById('don-receipt-input').click()"
        :ondragover="e => e.preventDefault()"
        :ondrop="e => { e.preventDefault(); scanFile(e.dataTransfer.files[0]) }">
        <img :if="receiptPreview" :src="receiptPreview">
        <div :if="!receiptPreview && receiptName && !extracting" style="text-align:center">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" style="opacity:.5">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/>
          </svg>
          <div class="dim" style="font-size:var(--f-sm);margin-top:var(--s-xs)" :text="receiptName"></div>
          <div class="scan-hint">Click to scan another</div>
        </div>
        <div :if="!receiptPreview && !receiptName && !extracting">
          <div class="scan-icon">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
              <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/>
              <line x1="9" y1="3" x2="9" y2="9"/><circle cx="14" cy="15" r="2.5"/><path d="M16 17l2.5 2.5"/>
            </svg>
          </div>
          <div style="font-weight:var(--f-wt-b)">Scan receipt</div>
          <div class="scan-hint">Drop image or PDF, or click to browse</div>
        </div>
        <div :if="extracting" class="dim">Scanning…</div>
      </div>
      <input id="don-receipt-input" type="file" accept="image/*,.pdf" style="display:none"
        :onchange="e => { scanFile(e.target.files[0]); e.target.value = '' }">

      <form :onsubmit.prevent="saveDonation" style="display:flex;flex-direction:column;gap:var(--s-md)">
        <div class="field">
          <label for="don-amount">Amount ($)</label>
          <input id="don-amount" type="number" :value="donForm.amount" :oninput="e => donForm.amount = e.target.value" step="0.01" min="0.01" required>
        </div>
        <div class="field">
          <label for="don-note">Note</label>
          <textarea id="don-note" rows="1" :value="donForm.note" :oninput="e => donForm.note = e.target.value" placeholder="Optional…"></textarea>
        </div>
        <a :if="!donFull" href="#" class="dim" style="font-size:var(--f-sm)" :onclick.prevent="donFull = true">More fields</a>
        <div :if="donFull" style="display:flex;flex-direction:column;gap:var(--s-md)">
          <div class="field autocomplete">
            <label>Donor</label>
            <div style="position:relative">
              <input type="text" :value="memberQuery"
                :onfocus="e => filterDonors(memberQuery)"
                :oninput="e => { donForm.member_id = null; filterDonors(e.target.value) }"
                :onblur="e => { memberHits = [] }"
                :style="donForm.member_id ? 'padding-right:2rem' : ''"
                placeholder="Search member… (optional)">
              <button :if="donForm.member_id" type="button" class="btn-link"
                style="position:absolute;right:.5rem;top:50%;transform:translateY(-50%)"
                :onclick="clearDonor()">&times;</button>
            </div>
            <div :if="memberHits.length" class="autocomplete-list">
              <div class="autocomplete-item" :each="m in memberHits" :onmousedown.prevent="selectDonor(m)" :text="m.name"></div>
            </div>
          </div>
          <div class="form-row">
            <div class="field">
              <label for="don-date">Date</label>
              <input id="don-date" type="date" :value="donForm.date_received" :oninput="e => donForm.date_received = e.target.value">
            </div>
            <div class="field">
              <label for="don-method">Method</label>
              <select id="don-method" :value="donForm.method" :onchange="e => donForm.method = e.target.value">
                <option :each="m in donMethods" :value="m" :text="fmt(m)"></option>
              </select>
            </div>
          </div>
          <div class="field">
            <label for="don-cat">Category</label>
            <select id="don-cat" :value="donForm.category" :onchange="e => donForm.category = e.target.value">
              <option :each="c in donCats" :value="c" :text="fmt(c)"></option>
            </select>
          </div>
        </div>

        <!-- History -->
        <div :if="donHistory.length">
          <div class="stat-label" style="margin-bottom:var(--s-sm)">History</div>
          <div class="history-list">
            <div class="history-item" :each="h in donHistory">
              <span class="badge" :class="'badge-' + eventBadge(h)" :text="eventLabel(h)"></span>
              <span class="dim" :if="eventDetail(h)" :text="eventDetail(h)"></span>
              <span class="history-date" :text="h.created_at?.slice(0,10) || ''"></span>
            </div>
          </div>
        </div>

        <div class="login-error" :if="addErr" :text="addErr"></div>

        <div style="display:flex; justify-content:flex-end; gap:var(--s-sm)">
          <button :if="editId && !delConfirm" type="button" class="btn btn-danger btn-sm" style="margin-right:auto" :onclick="delConfirm = true">Delete</button>
          <span :if="editId && delConfirm" class="dim" style="font-size:var(--f-sm); margin-right:auto; align-self:center">Delete permanently?</span>
          <button :if="editId && delConfirm" type="button" class="btn btn-danger btn-sm" :class="{'btn-loading': deleting}" :onclick="delDonation()">Yes</button>
          <button :if="editId && delConfirm" type="button" class="btn btn-outline btn-sm" :onclick="delConfirm = false">No</button>
          <button :if="!editId" type="button" class="btn btn-outline" :onclick="cancelAdd()">Cancel</button>
          <button type="submit" class="btn btn-primary" :class="{'btn-loading': adding}" :text="editId ? 'Update' : 'Save Donation'"></button>
        </div>
      </form>
    </div>
  </div>
</div>
