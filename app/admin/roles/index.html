---
title: Roles & Permissions
---
<div class="page-header" style="display:flex; align-items:baseline; justify-content:space-between">
  <h1>Roles &amp; Permissions</h1>
  <button :if="!loading" class="btn btn-primary" :onclick="openModal">+ Add Role</button>
</div>

<div :if="loadErr" class="login-error" style="margin-bottom:var(--s-md)" :text="loadErr"></div>
<div :if="loading" class="dim" style="padding:var(--s-lg)">Loading…</div>

<!-- Role cards -->
<div :if="!loading" style="display:flex; flex-direction:column; gap:var(--s-lg); margin-bottom:var(--s-xl)">
  <div :each="role in roles" class="card">
    <div class="card-header" style="align-items:flex-start; gap:var(--s-md)">
      <div>
        <h3 style="margin:0" :text="role.name"></h3>
        <div class="dim" style="font-size:var(--f-sm)" :text="role.description"></div>
      </div>
      <span style="margin-left:auto; display:flex; gap:var(--s-xs); flex-shrink:0">
        <button class="btn btn-outline btn-sm"
          :onclick="resetRole(role)" :class="{'btn-loading': role._resetting}">Reset</button>
        <button class="btn btn-outline btn-sm" style="color:var(--c-err)"
          :onclick="deleteRole(role)" :class="{'btn-loading': role._deleting}">Delete</button>
      </span>
    </div>
    <div class="perm-grid">
      <div :each="group in permGroups" class="perm-row">
        <span class="perm-scope" :text="group.label"></span>
        <span class="perm-actions">
          <label :each="perm in group.perms" class="perm-check">
            <input type="checkbox"
              :checked="role.permissions.includes(perm.key)"
              :onchange="e => togglePerm(role, perm.key, e.target.checked)">
            <span :text="perm.action"></span>
          </label>
        </span>
      </div>
    </div>
  </div>
</div>

<!-- Add role modal -->
<div :if="showModal" class="modal-overlay" :onclick="e => { if (e.target === e.currentTarget) closeModal() }">
  <div class="modal">
    <div class="modal-header">
      <h2>New Role</h2>
      <button class="modal-close" :onclick="closeModal">&times;</button>
    </div>
    <form class="modal-body" :onsubmit.prevent="createRole">
      <div class="form-row">
        <div class="field">
          <label for="r-name">Name</label>
          <input id="r-name" type="text" :value="newRole.name" :oninput="e => newRole.name = e.target.value" placeholder="e.g. Pujari" required>
        </div>
        <div class="field">
          <label for="r-desc">Description</label>
          <input id="r-desc" type="text" :value="newRole.description" :oninput="e => newRole.description = e.target.value" placeholder="Brief description">
        </div>
      </div>
      <div class="perm-grid">
        <div :each="group in permGroups" class="perm-row">
          <span class="perm-scope" :text="group.label"></span>
          <span class="perm-actions">
            <label :each="perm in group.perms" class="perm-check">
              <input type="checkbox"
                :checked="newRole.permissions.includes(perm.key)"
                :onchange="e => toggleNewPerm(perm.key, e.target.checked)">
              <span :text="perm.action"></span>
            </label>
          </span>
        </div>
      </div>
      <div :if="createErr" class="login-error" :text="createErr"></div>
      <button type="submit" class="btn btn-primary" :class="{'btn-loading': creating}">Create Role</button>
    </form>
  </div>
</div>

<script type="module">
  import { init, fmtCat, auth, toast } from '../../../lib/app.js'
  import { api } from '../../../lib/api.js'

  if (!auth.can('roles:update')) {
    location.replace(new URL('../../', location.href).href)
    throw new Error('redirecting')
  }

  const s = init({
    roles: [],
    allPerms: [],
    loading: true,
    loadErr: null,
    showModal: false,
    creating: false,
    createErr: null,
    newRole: { name: '', description: '', permissions: [] },

    openModal() { s.newRole = { name: '', description: '', permissions: [] }; s.createErr = null; s.showModal = true },
    closeModal() { s.showModal = false },

    get permGroups() {
      const groups = {}
      for (const key of s.allPerms) {
        const [scope, action] = key.split(':')
        ;(groups[scope] ||= []).push({ key, action })
      }
      return Object.entries(groups).map(([scope, perms]) => ({ label: fmtCat(scope), perms }))
    },

    async togglePerm(role, perm, enabled) {
      const prev = [...role.permissions]
      role.permissions = enabled
        ? [...role.permissions, perm].sort()
        : role.permissions.filter(p => p !== perm)
      try {
        await api.updateRolePermission(role.id, perm, enabled)
      } catch (e) {
        role.permissions = prev
        toast(e.message || 'Failed to update permission')
      }
    },

    async resetRole(role) {
      role._resetting = true
      try {
        const res = await api.resetRolePermissions(role.id)
        role.permissions = res.permissions ? res.permissions.split(',').filter(Boolean) : []
        toast(`${role.name} reset to defaults`, 'success')
      } catch (e) {
        toast(e.message || 'Failed to reset role')
      } finally {
        role._resetting = false
      }
    },

    async deleteRole(role) {
      if (!confirm(`Delete role "${role.name}"?`)) return
      role._deleting = true
      try {
        await api.deleteRole(role.id)
        s.roles = s.roles.filter(r => r.id !== role.id)
        toast(`Role "${role.name}" deleted`, 'success')
      } catch (e) {
        toast(e.message || 'Failed to delete role')
      } finally {
        role._deleting = false
      }
    },

    toggleNewPerm(perm, enabled) {
      s.newRole.permissions = enabled
        ? [...s.newRole.permissions, perm].sort()
        : s.newRole.permissions.filter(p => p !== perm)
    },

    async createRole() {
      s.createErr = null
      s.creating = true
      try {
        const role = await api.createRole({
          name: s.newRole.name,
          description: s.newRole.description,
          permissions: s.newRole.permissions,
        })
        s.roles = [...s.roles, { ...role, _resetting: false }]
        toast(`Role "${role.name}" created`, 'success')
        s.showModal = false
      } catch (e) {
        s.createErr = e.message || 'Failed to create role'
      } finally {
        s.creating = false
      }
    },
  })

  async function loadRoles() {
    s.loading = true
    s.loadErr = null
    try {
      const res = await api.getRoles()
      s.allPerms = res.all_permissions || []
      s.roles = (res.roles || []).map(r => ({ ...r, _resetting: false }))
    } catch (e) {
      s.loadErr = e.message || 'Failed to load roles'
    } finally {
      s.loading = false
    }
  }

  loadRoles()
</script>
