---
preloads:
  - /lib/processor.js
  - /lib/icons.js
---
<div class="page-header">
  <h1>Community</h1>
</div>

<!-- ===== MEMBERS TAB ===== -->
<section>

<!-- Member modals -->
<member-edit-form :show="showEdit" :member="editing" :roles="roles" :photosrc="photoSrc" :services="SERVICES"
  :onsave="e => { showEdit = false; editing = null; if (e.detail?.member) openDetail(e.detail.member); load() }"
  :oncancel="() => { showEdit = false; editing = null }">
</member-edit-form>

<member-detail :show="showDetail" :member="detail" :photosrc="photoSrc" :sysroles="sysRoles"
  :onedit="e => { showDetail = false; editing = e.detail; form = Object.assign({}, e.detail); showEdit = true }"
  :onclose="() => { showDetail = false; detail = {} }">
</member-detail>

<!-- Filter bar -->
<div class="filter-bar">
  <button class="btn btn-primary btn-sm" :onclick="openAdd()">+ Member</button>
  <input class="filter-search" type="search" placeholder="Search name, email or phone…"
    :value="search" :oninput.debounce-150="e => { search = e.target.value; page = 1; load() }">
  <select :value="filterRole" :change="v => { filterRole = v; page = 1; load() }" style="width:auto">
    <option value="">All roles</option>
    <option :each="r in roles" :value="r" :text="r"></option>
  </select>
  <button class="btn btn-outline btn-sm" :if="search || filterRole" :onclick="e => { search = ''; filterRole = ''; load() }">Clear</button>
</div>

<!-- Members list -->
<div class="card">
  <div :if="loadErr" class="login-error" :text="loadErr" style="margin:var(--s-md)"></div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th class="th-sort" :class="sortCls('data.name')" :onclick="sort('data.name')">Name</th>
          <th class="th-sort" :class="sortCls('data.email')" :onclick="sort('data.email')">Email</th>
          <th class="th-sort" :class="sortCls('data.phone')" :onclick="sort('data.phone')">Phone</th>
          <th class="th-sort" :class="sortCls('data.role')" :onclick="sort('data.role')">Role</th>
          <th class="th-sort" :class="sortCls('created_at')" :onclick="sort('created_at')">Joined</th>
        </tr>
      </thead>
      <tbody>
        <tr :each="m in members" :class="{'dim': m.status}" style="cursor:pointer" :onclick="openDetail(m)">
          <td>
            <span :html="hl(m.spiritual_name || m.name || '—', search)"></span>
            <span :if="m.status" class="badge" style="margin-left:var(--s-xs); font-size:var(--f-xs)" :text="m.status"></span>
            <span :if="m._user_id" class="badge" style="margin-left:var(--s-xs); font-size:var(--f-xs); background:rgba(107,92,231,.1); color:var(--c-accent)">User</span>
          </td>
          <td :html="hl(m.email || '—', search)"></td>
          <td :html="hl(m.phone || '—', search)"></td>
          <td>
            <span :if="m.roles?.length">
              <span :each="r in m.roles" class="badge" style="margin-right:var(--s-xs)" :text="r"></span>
            </span>
            <span :if="!m.roles?.length" class="badge" :text="m.role || '—'"></span>
          </td>
          <td class="dim" :text="m.joined || '—'"></td>
        </tr>
        <tr :if="!members.length && !loadErr">
          <td colspan="5" class="dim" style="text-align:center; padding:var(--s-lg)" :text="loading ? 'Loading…' : 'No members found'"></td>
        </tr>
      </tbody>
    </table>
  </div>
  <div :if="totalPages > 1" style="display:flex; justify-content:space-between; align-items:center; padding:var(--s-sm) var(--s-md); border-top:1px solid var(--c-border)">
    <span class="dim" style="font-size:var(--f-sm)" :text="total + ' members'"></span>
    <div style="display:flex; gap:var(--s-xs)">
      <button class="btn btn-outline btn-sm" :onclick="page = Math.max(1, page - 1); load()" :class="{dim: page === 1}" :html="icon('chevron_left')"></button>
      <span style="padding:var(--s-xs) var(--s-sm); font-size:var(--f-sm)" :text="page + ' / ' + totalPages"></span>
      <button class="btn btn-outline btn-sm" :onclick="page = Math.min(totalPages, page + 1); load()" :class="{dim: page === totalPages}" :html="icon('chevron_right')"></button>
    </div>
  </div>
</div>

</section>

<script src="../../lib/define-element.js" defer></script>
{% include components/member-edit-form.html %}
{% include components/member-detail.html %}

<script type="module">
  import sprae from '../../lib/sprae.js'
  import { setupProcessor } from '../../lib/processor.js'
  import { init, SERVICES, auth, fmtCat, toast, hl, loadSystemRoles, uniq } from '../../lib/app.js'
  import { icon } from '../../lib/icons.js'
  import { api, BASE } from '../../lib/api.js'

  setupProcessor(sprae, { fmtCat, toast, icon, api, BASE, SERVICES })

  if (!auth.can('members:view')) {
    location.replace(new URL('../', location.href).href)
    throw new Error('redirecting')
  }

  const today = new Date().toISOString().slice(0, 10)
  const perPage = 20
  const roleNameById = new Map()
  const userRolesByUserId = new Map()
  let userRoleLookupDenied = false

  const emptyForm = (role = '') => ({
    name: '', spiritual_name: '', email: '', phone: '', role, joined: today,
    address: '', notes: '', status: '',
    diksa_guru: '', guiding_devotee: '', services: [],
    rounds: '', rounds_years: '', four_regs_years: '',
    kc_years: '', temple: '', dob: '', gender: '', nationality: '', occupation: '',
    marriage_status: '', spouse: '', children: '',
    lives_in_temple: false, namahatta: false
  })

  function roleName(v) {
    if (!v) return ''
    if (typeof v === 'number') return roleNameById.get(v) || String(v)
    if (typeof v === 'string') {
      const s = v.trim()
      if ((s.startsWith('{') || s.startsWith('[')) && s.length > 1) {
        try { return roleName(JSON.parse(s)) } catch {}
      }
      if (/^\d+$/.test(s)) return roleNameById.get(+s) || s
      return s
    }
    if (Array.isArray(v)) return roleName(v[0])
    if (typeof v !== 'object') return ''
    return v.name || v.role_name || roleName(v.role) || roleName(v.id) || roleName(v.role_id) || ''
  }

  function roleTags(v) {
    if (!v) return []
    if (Array.isArray(v)) return uniq(v.flatMap(roleTags))
    if (typeof v === 'number') return uniq([roleName(v)])
    if (typeof v === 'string') {
      const s = v.trim()
      if (!s) return []
      if ((s.startsWith('{') || s.startsWith('[')) && s.length > 1) {
        try { return roleTags(JSON.parse(s)) } catch {}
      }
      if (s.includes(',')) return uniq(s.split(',').map(x => roleName(x)))
      return uniq([roleName(s) || s])
    }
    if (typeof v !== 'object') return []
    return uniq([
      ...roleTags(v.roles),
      ...roleTags(v.role),
      ...roleTags(v.name),
      ...roleTags(v.role_name),
      ...roleTags(v.id),
      ...roleTags(v.role_id),
    ])
  }

  function fmtJoined(v) {
    if (!v) return ''
    const s = String(v)
    if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0, 10)
    const t = new Date(v)
    return Number.isNaN(t.getTime()) ? s : t.toISOString().slice(0, 10)
  }

  function toMember(c) {
    let d = c.data
    if (typeof d === 'string') {
      try { d = JSON.parse(d) } catch { d = {} }
    }
    if (!d || typeof d !== 'object') d = {}

    const services = Array.isArray(d.services) ? d.services
      : (d.services ? String(d.services).split(',').map(s => s.trim()).filter(Boolean) : [])

    const roles = uniq([
      ...roleTags(d.roles),
      ...roleTags(d.role),
      ...roleTags(d.role_name),
      ...roleTags(d.user_role),
      ...roleTags(d.role_id),
      ...roleTags(c.roles),
      ...roleTags(c.role),
      ...roleTags(c.role_name),
      ...roleTags(c.user_role),
      ...roleTags(c.role_id),
      ...roleTags(c.user?.roles),
      ...roleTags(c.user?.role),
      ...roleTags(c.user?.role_id),
    ])
    const role = roles[0] || ''
    const joined = fmtJoined(d.joined || d.joined_at || d.member_since || c.joined || c.joined_at || c.member_since || c.created_at || d.created_at)

    return { _id: c.id, _public: c.public_id, _user_id: c.user_id, ...d, role: role || d.role || '', roles, joined: joined || d.joined || '', services }
  }

  function userRoles(u) {
    return uniq([
      ...roleTags(u?.roles),
      ...roleTags(u?.role),
      ...roleTags(u?.role_id),
      ...roleTags(u?.data?.roles),
      ...roleTags(u?.data?.role),
      ...roleTags(u?.data?.role_id),
      ...roleTags(u?.user?.roles),
      ...roleTags(u?.user?.role),
      ...roleTags(u?.user?.role_id),
      ...roleTags(u?.item?.roles),
      ...roleTags(u?.item?.role),
      ...roleTags(u?.item?.role_id),
    ])
  }

  function mergeUserRoles(rows) {
    return rows.map(m => {
      if (!m._user_id) return m
      const extra = userRolesByUserId.get(String(m._user_id)) || []
      if (!extra.length) return m
      const roles = uniq([...(m.roles || []), ...extra])
      return { ...m, roles, role: roles[0] || m.role || '' }
    })
  }

  const s = init({
    showEdit: false,
    showDetail: false,
    editing: null,
    form: emptyForm(),
    detail: {},
    sysRoles: [],
    members: [],
    total: 0,
    roles: [],
    SERVICES, hl,
    loading: false,
    loadErr: null,
    search: '',
    filterRole: '',
    page: 1,
    sortBy: '', sortDir: 'asc',

    sort(col) {
      if (this.sortBy === col) this.sortDir = this.sortDir === 'asc' ? 'desc' : 'asc'
      else { this.sortBy = col; this.sortDir = 'asc' }
      this.page = 1; load()
    },
    sortCls(col) { return this.sortBy === col ? (this.sortDir === 'asc' ? 'th-sort-asc' : 'th-sort-desc') : '' },

    get totalPages() { return Math.max(1, Math.ceil(this.total / perPage)) },

    get userRolePerms() {
      const role = this.sysRoles.find(r => r.id === this.userDetail.role_id)
      return role?.permissions || []
    },

    fmtPerm(key) {
      const [scope, action] = key.split(':')
      return fmtCat(scope) + ' — ' + action
    },

    openAdd() {
      s.editing = null
      s.form = emptyForm(s.roles[0] || '')
      s.formErr = null
      s.showEdit = true
    },

    async openDetail(m) {
      s.detail = m
      s.userDetail = {}
      s.showDetail = true
      loadPhoto(m._public)
      if (m._user_id && auth.can('users:view')) {
        try { s.userDetail = await api.getUser(m._user_id) }
        catch {}
        if (auth.can('roles:update') && !s.sysRoles.length) {
          try {
            s.sysRoles = await loadSystemRoles()
          } catch {}
        }
      }
    },

    photoSrc: null,
    load,
  })

  async function loadPhoto(publicId) {
    if (s.photoSrc?.startsWith('blob:')) URL.revokeObjectURL(s.photoSrc)
    s.photoSrc = null
    if (!publicId) return
    try {
      const res = await fetch(`${BASE}/uploads/community/members/${publicId}.webp`, {
        headers: auth.token ? { Authorization: `Bearer ${auth.token}` } : {},
      })
      if (!res.ok) return
      s.photoSrc = URL.createObjectURL(await res.blob())
    } catch {}
  }

  async function load() {
    s.loading = true
    s.loadErr = null
    try {
      const params = { page: s.page, itemsPerPage: perPage }
      if (s.search) params.search = s.search
      if (s.filterRole) params['data.role'] = s.filterRole
      if (s.sortBy) { params.sortBy = s.sortBy; params.sortDesc = s.sortDir === 'desc' }
      const res = await api.getMembers(params)
      let rows = (res.items || []).map(toMember)
      if (!userRoleLookupDenied) {
        const missingIds = [...new Set(rows
          .filter(m => m._user_id && !(m.roles || []).length)
          .map(m => String(m._user_id).trim())
          .filter(Boolean)
          .filter(id => !userRolesByUserId.has(id))
        )]
        for (const id of missingIds) {
          try {
            const u = await api.getUser(id)
            userRolesByUserId.set(id, userRoles(u))
          } catch (e) {
            const msg = String(e?.message || '')
            if (/forbidden|unauthorized|401|403/i.test(msg)) {
              userRoleLookupDenied = true
              break
            }
            userRolesByUserId.set(id, [])
          }
        }
      }
      if (!userRoleLookupDenied) {
        rows = mergeUserRoles(rows)
      }
      s.members = rows
      s.total = res.total || 0
    } catch (e) {
      s.loadErr = e.message || 'Failed to load members'
    } finally {
      s.loading = false
    }
  }

  load()
  loadSystemRoles().then(roles => {
    if (!roles.length) return
    s.roles = roles.map(r => r.name)
    roleNameById.clear()
    for (const r of roles) roleNameById.set(+r.id, r.name)
    if (!s.form.role) s.form.role = s.roles[0] || ''
    load()
  }).catch(() => {})
</script>
