<define-element>
  <expense-list years:array mopen:object mloading:object mfresh:string="" loading:boolean="false" error:string="" search:string="" hasmore:boolean="false" empty:boolean="false" nomatch:boolean="false" canapprove:boolean="false" quickloading:object myapprovals:object>
    <style>:host { display: contents; }</style>
    <template>
      <div :if="error" class="login-error" :text="error" style="margin-bottom:var(--s-sm)"></div>
      <div :if="loading && !years.length" class="dim" style="text-align:center;padding:var(--s-lg)">Loading…</div>
      <div :if="empty" class="dim" style="text-align:center;padding:var(--s-xl)">No expenses yet</div>
      <div :if="nomatch" class="dim" style="text-align:center;padding:var(--s-lg)">No expenses match filters</div>
      <div :each="yr in years" class="finance-year-section">
        <div class="finance-year-sticky" :if="yr.key !== 'unknown'" :text="yr.key"></div>
        <div class="finance-year-months">
          <div :each="(g, gi) in yr.items" :class="{'finance-month-wrap-open': mopen[g.key], 'finance-month-wrap-divider': gi > 0}">
            <button type="button" class="exp-group-header" :class="{'exp-group-header-open': mopen[g.key], 'exp-group-header-empty': !g.count}" :aria-expanded="mopen[g.key] ? 'true' : 'false'" :disabled="!g.count" :onpointerdown="e => g.count && _emit('prime', g.key)" :onclick="e => g.count && _toggle(g.key)">
              <span class="exp-group-chevron" :html="icon('chevron_down')"></span>
              <span class="exp-group-heading">
                <span class="exp-group-label">
                  <span class="finance-month-label-desktop" :text="fmtMonthShort(g.key)"></span>
                  <span class="finance-month-label-mobile" :text="fmtMonth(g.key)"></span>
                </span>
                <span :if="g.count" class="exp-group-count" :text="g.count"></span>
              </span>
              <span class="exp-group-total" :text="'$' + fmtAmt(g.total || 0)"></span>
              <span :if="g.breakdown?.length" class="exp-group-breakdown">
                <span :each="seg in g.breakdown" class="exp-group-breakdown-seg" :title="seg.title" :style="seg.style"></span>
              </span>
            </button>
            <div class="recent-exp-list finance-exp-list" :class="{'finance-exp-list-open': mopen[g.key], 'finance-exp-list-fresh': mfresh === g.key}" :aria-hidden="mopen[g.key] ? 'false' : 'true'">
              <div :if="mopen[g.key] && mloading[g.key]" class="finance-exp-list-loader"><span class="load-spinner"></span></div>
              <div :each="x in g.items" class="recent-exp-item row-link finance-exp-item" :onclick="e => _emit('view', x)">
                <span class="recent-exp-icon-col">
                  <span class="status-icon" :class="'status-' + (x.status || 'submitted')" :html="statusIcon(x.status || 'submitted')"></span>
                </span>
                <div class="recent-exp-main">
                  <div class="recent-exp-info">
                    <div class="recent-exp-title-row">
                      <div class="recent-exp-title">
                        <span :html="hl(x.payee || '\u2014', search || '')"></span>
                        <span :if="x.expense_no" class="recent-exp-title-sub dim" :text="'#' + x.expense_no"></span>
                      </div>
                    </div>
                    <div class="recent-exp-meta-row">
                      <span class="recent-exp-status-text" :class="'status-' + (x.status || 'submitted')" :text="(x.status || 'submitted') === 'submitted' && x.approvals_required ? `Approval ${x.approval_count || 0}/${x.approvals_required}` : fmtStatus(x.status || 'submitted')"></span>
                      <time class="recent-exp-time" :datetime="x.expense_date || x.created_at || ''" :title="(x.expense_date || x.created_at) ? new Date(x.expense_date || x.created_at).toLocaleString() : ''" :text="fmtDate(x.expense_date || x.created_at)"></time>
                    </div>
                  </div>
                  <div :if="x.attachments?.length" class="row-attachments">
                    <img :each="a in (x.attachments || []).slice(0, 4)" :if="a.mime_type?.startsWith('image/')" class="row-attach-thumb" :src="apiBase + '/' + a.file_path" :alt="a.original_name">
                    <span :each="a in (x.attachments || []).slice(0, 4)" :if="!a.mime_type?.startsWith('image/')" class="row-attach-file" :title="a.original_name" :html="icon('attach')"></span>
                  </div>
                </div>
                <span :if="canapprove" class="recent-exp-actions" :onclick.stop="">
                  <span :if="quickloading[x.id]" class="load-spinner" aria-label="Working"></span>
                  <button :if="x.status === 'submitted' && !quickloading[x.id] && !myapprovals[x.id]" type="button" class="btn btn-sm btn-outline" aria-label="Quick approve expense" :onclick.stop="e => _emit('approve', x)" :html="approveIcon + ' Approve'"></button>
                  <span :if="x.status === 'submitted' && myapprovals[x.id] && !quickloading[x.id]" class="dim" aria-label="Approved by you" style="font-size:var(--f-sm)" title="You approved this — awaiting co-approval">✓ Approved</span>
                  <button :if="x.status === 'approved' && !quickloading[x.id]" type="button" class="btn btn-sm btn-outline" aria-label="Mark as paid" :onclick.stop="e => _emit('pay', x)" :html="payIcon + ' Paid'"></button>
                  <button :if="x.status === 'paid' && !x.attachments?.length && !quickloading[x.id]" type="button" class="btn btn-sm btn-outline" :onclick.stop="e => _emit('attach', x)">Attach receipt</button>
                </span>
                <div class="recent-exp-cat">
                  <span :if="x.attachments?.length" class="recent-exp-attach" :title="x.attachments.length + ' document' + (x.attachments.length > 1 ? 's' : '')">
                    <span class="recent-exp-attach-icon" :html="icon('attach')"></span>
                    <span :if="x.attachments.length > 1" class="recent-exp-attach-count" :text="x.attachments.length"></span>
                  </span>
                  <span class="badge" :class="catCls(x.category || 'other')" :text="fmtCat(x.category || 'other')"></span>
                </div>
                <div class="recent-exp-amount">
                  <div class="recent-exp-value stat-err" :text="'-$' + fmtAmt(x.amount || 0)"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div :if="hasmore" class="scroll-sentinel"><span class="load-spinner"></span></div>
    </template>
  </expense-list>
</define-element>
