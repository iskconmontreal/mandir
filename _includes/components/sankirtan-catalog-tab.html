<define-element>
  <sankirtan-catalog-tab active:boolean="false" books:array loading:boolean="false" error:string="" canmanage:boolean="false">
    <style>
      :host { display: contents; }
      .book-list { display: flex; flex-direction: column; gap: var(--s-md); }
      .book-card { padding: var(--s-md) var(--s-lg); }
      .book-card.is-inactive { opacity: 0.6; }

      /* Toggle switch (for Active field in Edit modal) */
      .toggle-switch {
        position: relative;
        display: inline-block;
        width: 2.5rem;
        height: 1.4rem;
        flex-shrink: 0;
      }
      .toggle-switch input { opacity: 0; width: 0; height: 0; }
      .toggle-switch .slider {
        position: absolute; inset: 0;
        background: var(--c-border);
        border-radius: 999px;
        cursor: pointer;
        transition: background 0.15s;
      }
      .toggle-switch .slider::before {
        content: '';
        position: absolute;
        left: 2px; top: 2px;
        width: calc(1.4rem - 4px);
        height: calc(1.4rem - 4px);
        background: var(--c-surface);
        border-radius: 50%;
        transition: transform 0.15s;
        box-shadow: 0 1px 2px rgba(0,0,0,0.15);
      }
      .toggle-switch input:checked + .slider { background: var(--c-ok); }
      .toggle-switch input:checked + .slider::before { transform: translateX(1.1rem); }
      .book-title {
        font-size: var(--f-lg);
        font-weight: var(--f-wt-b);
        margin: 0 0 var(--s-sm) 0;
        line-height: 1.2;
      }
      .book-meta {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: var(--s-sm) var(--s-md);
        font-size: var(--f-sm);
      }
      .book-meta .meta-label { color: var(--c-text-dim); margin-right: var(--s-xs); }
      .book-meta .meta-value { font-weight: var(--f-wt-b); }
      .book-stock {
        margin-top: var(--s-sm);
        padding-top: var(--s-sm);
        border-top: 1px solid var(--c-border);
        display: flex;
        flex-wrap: wrap;
        gap: var(--s-md);
        font-size: var(--f-sm);
        color: var(--c-text-dim);
      }
      .book-stock .stock-item .stock-value { color: var(--c-text); font-weight: var(--f-wt-b); }
      .book-actions { margin-left: auto; display: flex; gap: var(--s-xs); align-items: center; }
      .modal-close svg, .modal-close svg * { pointer-events: none; }
      .badge.badge-low {
        background: #ffe5d0;
        color: #c2410c;
      }
    </style>
    <template>
      <section :if="active">

        <div :if="error" class="login-error" :text="error"></div>

        <!-- Filter bar -->
        <div class="filter-bar" style="margin-bottom:var(--s-md)">
          <div class="filter-search-wrap" style="flex:1">
            <input class="filter-search" type="search" placeholder="Search title…"
              :value="filterSearch" :oninput="e => filterSearch = e.target.value">
          </div>
          <select :value="filterType" :change="v => filterType = v" style="width:auto">
            <option value="">All</option>
            <option value="book">Books</option>
            <option value="stack">Stacks</option>
          </select>
          <select :value="filterSize" :change="v => filterSize = v" style="width:auto">
            <option value="">All sizes</option>
            <option :each="s in SIZES" :value="s" :text="s"></option>
          </select>
          <select :value="filterLanguage" :change="v => filterLanguage = v" style="width:auto">
            <option value="">All languages</option>
            <option :each="l in LANGUAGES" :value="l" :text="l"></option>
          </select>
          <select :value="filterCover" :change="v => filterCover = v" style="width:auto">
            <option value="">All covers</option>
            <option value="Soft">Soft</option>
            <option value="Hard">Hard</option>
          </select>
          <button :if="filterSearch || filterType || filterSize || filterLanguage || filterCover"
            type="button" class="btn btn-outline"
            :onclick="filterSearch=''; filterType=''; filterSize=''; filterLanguage=''; filterCover=''">Clear</button>
          <div class="filter-bar-actions" style="margin-left:auto; display:flex; gap:var(--s-xs)">
            <button :if="canmanage" type="button" class="btn btn-outline"
              :class="{'btn-loading': importing}"
              :onclick="(host || document).querySelector('#catalog-import-input')?.click()">Import</button>
            <input type="file" id="catalog-import-input" accept=".xlsx" style="display:none"
              :onchange="e => { importCatalog(e.target.files[0]); e.target.value = '' }">
            <button :if="canmanage" type="button" class="btn btn-outline"
              :onclick="exportCatalog()">Export</button>
            <button :if="canmanage" type="button" class="btn btn-primary"
              :onclick="openAdd()">+ Add Book</button>
          </div>
        </div>

        <div :if="loading && !books.length" class="dim" style="padding:var(--s-lg); text-align:center">Loading…</div>
        <div :if="!loading && !books.length && !error" class="dim" style="padding:var(--s-lg); text-align:center">No books in catalog yet.</div>
        <div :if="books.length && !filteredBooks().length" class="dim" style="padding:var(--s-lg); text-align:center">No books match the current filters.</div>

        <div :if="filteredBooks().length" class="book-list">
          <div :each="b in filteredBooks()" class="card book-card" :class="{'is-inactive': !b.active}">
            <h3 class="book-title" :text="b.title"></h3>

            <div class="book-meta">
              <span :if="b.is_stack" class="badge cat-purple">Stack</span>
              <span :if="!b.is_stack" class="badge" :class="coverCls(b.category)" :text="coverLabel(b.category)"></span>
              <span :if="!b.is_stack" class="badge" :class="catCls(b.category)" :text="sizeLabel(b.category)"></span>
              <span :if="!b.is_stack && b.language" class="badge cat-gray" :text="b.language"></span>
              <span :each="lg in (b.is_stack ? stackLangs(b) : [])" class="badge cat-gray" :text="lg"></span>
              <span :if="b.exclude_from_bbt" class="badge" style="background:#ffedd5; color:#ea580c">Excluded from BBT</span>
              <span :if="!b.exclude_from_bbt"><span class="meta-label">Points:</span><span class="meta-value" :text="b.points_per_unit"></span></span>
              <span><span class="meta-label">Cost:</span><span class="meta-value" :text="b.cost_cents ? '$' + fmtAmt(b.cost_cents) : '—'"></span></span>
              <span><span class="meta-label">Retail:</span><span class="meta-value" :text="b.retail_price_cents ? '$' + fmtAmt(b.retail_price_cents) : '—'"></span></span>
              <span :if="!b.is_stack"><span class="meta-label">Pages:</span><span class="meta-value" :text="b.pages || '—'"></span></span>
              <span :if="b.is_stack"><span class="meta-label">Contains:</span><span class="meta-value" :text="(b.books_per_unit || stackContents(b).length) + ' books'"></span></span>
              <span :if="b.note"><span class="meta-label">Note:</span><span class="meta-value" :text="b.note"></span></span>
              <span :if="b.active" class="badge badge-paid">Active</span>
              <span :if="b.active === false" class="badge badge-rejected">Inactive</span>

              <span :if="canmanage" class="book-actions">
                <button type="button" class="btn btn-outline btn-sm"
                  :onclick="openEdit(b)">Edit</button>
                <span :if="!b._confirm">
                  <button type="button" class="btn btn-outline btn-sm"
                    style="color:var(--c-err)"
                    :onclick="b._confirm = true">Delete</button>
                </span>
                <span :if="b._confirm" style="display:inline-flex; align-items:center; gap:var(--s-xs)">
                  <span class="dim" style="font-size:var(--f-sm)">Delete?</span>
                  <button type="button" class="btn btn-danger btn-sm"
                    :class="{'btn-loading': b._deleting}"
                    :onclick="doDelete(b)">Yes</button>
                  <button type="button" class="btn-link" style="font-size:var(--f-sm)"
                    :onclick="b._confirm = false">No</button>
                </span>
              </span>
            </div>

            <p :if="!b.is_stack && isTrackedSeparately(b.language)" class="dim" style="font-size:var(--f-sm); margin:var(--s-sm) 0 0"
              :text="b.language + ' is tracked separately by the BBT — excluded from the BBT report.'"></p>

            <div class="book-stock" :if="!b.is_stack">
              <span class="stock-item">
                Stock <span class="stock-value" :text="b.stock ?? 0"></span>
                <span :if="isLowStock(b)" class="badge badge-low" style="margin-left:var(--s-xs)">Need to order</span>
              </span>
            </div>
            <div class="book-stock" :if="b.is_stack">
              <span class="stock-item">Available <span class="stock-value" :text="stackAvailable(b)"></span> <span class="dim">(min of components)</span></span>
              <span class="stock-item">Books: <span class="stock-value" :text="stackTitles(b) || '—'"></span></span>
            </div>
          </div>
        </div>

        <!-- Add / Edit modal -->
        <div :if="showModal" class="modal-overlay"
          :onpointerdown="e => { _downOnBackdrop = (e.target === e.currentTarget) }"
          :onclick="e => { if (_downOnBackdrop && e.target === e.currentTarget) closeModal() }"
          :onkeydown.esc.document="closeModal()">
          <div class="modal">
            <div class="modal-header">
              <h2 :text="modalBook ? 'Edit Book' : 'Add Book'"></h2>
              <button class="modal-close" type="button" aria-label="Close"
                :onclick="closeModal" :html="icon('close')"></button>
            </div>
            <form class="modal-body" :onsubmit.prevent="saveBook()">
              <div class="form-row">
                <div class="field">
                  <label for="bk-title">Title</label>
                  <input id="bk-title" type="text" required
                    placeholder="e.g. Bhagavad-gita As It Is"
                    :value="form.title"
                    :oninput="e => form.title = e.target.value">
                </div>
              </div>

              <!-- Stack toggle (Add only) / kind label (Edit) -->
              <div class="form-row">
                <div class="field" :if="!modalBook">
                  <label style="display:flex; align-items:center; gap:var(--s-md); cursor:pointer">
                    <span class="toggle-switch">
                      <input type="checkbox"
                        :value="form.is_stack"
                        :change="v => setIsStack(v)">
                      <span class="slider"></span>
                    </span>
                    <span>This is a stack</span>
                  </label>
                </div>
              </div>

              <!-- ── Book-only fields ── -->
              <div :if="!form.is_stack" style="display:flex; flex-direction:column; gap:var(--s-md)">
                <div class="form-row">
                  <div class="field">
                    <label for="bk-lang">Language</label>
                    <select id="bk-lang" :disabled="form.is_stack" :change="v => { form.language = v; setExcludeFromBBT(isTrackedSeparately(v)) }">
                      <option value="" :selected="!form.language">— Select —</option>
                      <option :each="l in LANGUAGES" :value="l" :text="l" :selected="l === form.language"></option>
                    </select>
                    <p :if="isTrackedSeparately(form.language)" class="dim" style="font-size:var(--f-sm); margin:var(--s-xs) 0 0"
                      :text="form.language + ' is tracked separately by the BBT — excluded from the BBT report.'"></p>
                  </div>
                </div>
                <div class="form-row">
                  <div class="field">
                    <label for="bk-cover">Cover</label>
                    <select id="bk-cover"
                      :change="v => { form.cover = v; form.points_per_unit = autoPointsFromPages(form.pages) }">
                      <option value="Soft" :selected="form.cover === 'Soft'">Soft cover</option>
                      <option value="Hard" :selected="form.cover === 'Hard'">Hard cover</option>
                    </select>
                    <p class="dim" style="font-size:var(--f-sm); margin:var(--s-xs) 0 0" :if="form.pages"
                      :text="coverLabel(form.cover === 'Hard' ? 'H' : 'S') + ' · ' + sizeLabel(categoryFrom(form.cover, form.pages)) + ' book'"></p>
                  </div>
                  <div class="field">
                    <label for="bk-pages">Pages</label>
                    <input id="bk-pages" type="number" min="1" placeholder="e.g. 320"
                      :value="form.pages || ''"
                      :oninput="e => { form.pages = parseInt(e.target.value) || null; form.points_per_unit = autoPointsFromPages(form.pages) }">
                  </div>
                  <div class="field">
                    <label for="bk-low-stock">Low-stock threshold</label>
                    <input id="bk-low-stock" type="number" min="0" inputmode="numeric" placeholder="5"
                      :value="form.low_stock_threshold ?? ''"
                      :oninput="e => form.low_stock_threshold = parseInt(e.target.value) || 0">
                  </div>
                </div>
                <div class="form-row">
                  <div class="field">
                    <label for="bk-stock">Stock</label>
                    <input id="bk-stock" type="text" inputmode="numeric" placeholder="0"
                      :value="form.stock ?? ''"
                      :oninput="e => form.stock = parseInt(e.target.value) || 0">
                  </div>
                </div>
              </div>

              <!-- ── Note (applies to books and stacks) ── -->
              <div class="field">
                <label for="bk-note">Note</label>
                <textarea id="bk-note" rows="2" placeholder="e.g. To order 2 boxes"
                  :value="form.note"
                  :oninput="e => form.note = e.target.value"></textarea>
              </div>

              <!-- ── Stack-only fields: component picker ── -->
              <div :if="form.is_stack" class="field">
                <label>Books in this stack
                  <span class="dim" style="font-weight:normal" :text="'· contains ' + form.items.length + ' book' + (form.items.length === 1 ? '' : 's')"></span>
                </label>
                <div :if="form.items.length" style="display:flex; flex-wrap:wrap; gap:var(--s-xs); margin-bottom:var(--s-sm)">
                  <span :each="cb in stackComponentBooks()" class="badge cat-blue" style="display:inline-flex; align-items:center; gap:var(--s-xs)">
                    <span :text="cb.title + (cb.language ? ' (' + cb.language + ')' : '')"></span>
                    <button type="button" class="btn-link" style="font-size:var(--f-sm); color:inherit" :onclick="toggleComponent(cb.id)">×</button>
                  </span>
                </div>
                <p :if="stackLanguages().length" class="dim" style="font-size:var(--f-sm)"
                  :text="'Languages: ' + stackLanguages().join(' · ')"></p>
                <input type="search" placeholder="Search books to add…"
                  :value="componentSearch" :oninput="e => componentSearch = e.target.value">
                <div style="max-height:12rem; overflow:auto; border:1px solid var(--c-border); border-radius:var(--r-sm); margin-top:var(--s-xs)">
                  <label :each="rb in componentResults()" style="display:flex; align-items:center; gap:var(--s-sm); padding:var(--s-xs) var(--s-sm); cursor:pointer">
                    <input type="checkbox" :checked="isComponent(rb.id)" :onchange="toggleComponent(rb.id)">
                    <span :text="rb.title"></span>
                    <span :if="!rb.is_stack" class="badge" :class="coverCls(rb.category)" :text="coverLabel(rb.category)"></span>
                    <span :if="rb.language" class="badge cat-gray" :text="rb.language"></span>
                    <span class="dim" style="margin-left:auto; font-size:var(--f-sm)" :text="rb.points_per_unit + ' pts · $' + ((rb.cost_cents || 0) / 100).toFixed(2)"></span>
                  </label>
                </div>
              </div>

              <!-- ── Shared: Cost / Retail / Score ── -->
              <div class="form-row" style="align-items:flex-end">
                <div class="field">
                  <label for="bk-cost">Cost price (CAD)</label>
                  <input id="bk-cost" type="text" inputmode="decimal" placeholder="0.00"
                    :value="form.cost_cents ? (form.cost_cents / 100).toFixed(2) : ''"
                    :oninput="e => form.cost_cents = Math.round(parseFloat(e.target.value || 0) * 100)">
                </div>
                <div class="field">
                  <label for="bk-retail-price">Retail Price ($ CAD)</label>
                  <input id="bk-retail-price" type="text" inputmode="decimal" placeholder="0.00"
                    :value="form.retail_price_cents ? (form.retail_price_cents / 100).toFixed(2) : ''"
                    :oninput="e => form.retail_price_cents = Math.round(parseFloat(e.target.value || 0) * 100)">
                </div>
                <div class="field">
                  <label for="bk-score">Score <span class="dim" style="font-weight:normal" :if="form.is_stack">(sum of score)</span></label>
                  <input id="bk-score" type="number" step="0.25" min="0" placeholder="0"
                    :disabled="form.exclude_from_bbt"
                    :value="form.points_per_unit || ''"
                    :oninput="e => form.points_per_unit = parseFloat(e.target.value) || 0">
                </div>
              </div>

              <div :if="!form.is_stack" class="form-row">
                <div class="field">
                  <label style="display:flex; align-items:center; gap:var(--s-md); cursor:pointer">
                    <span class="toggle-switch">
                      <input type="checkbox"
                        :value="form.exclude_from_bbt"
                        :change="v => setExcludeFromBBT(v)">
                      <span class="slider"></span>
                    </span>
                    <span>Exclude from BBT report</span>
                  </label>
                </div>
              </div>

              <div :if="modalBook" class="form-row">
                <div class="field">
                  <label style="display:flex; align-items:center; gap:var(--s-md); cursor:pointer">
                    <span class="toggle-switch">
                      <input type="checkbox"
                        :value="form.active"
                        :change="v => form.active = v">
                      <span class="slider"></span>
                    </span>
                    <span :text="form.active ? 'Active' : 'Inactive'"></span>
                  </label>
                </div>
              </div>
              <div :if="saveErr" class="login-error" :text="saveErr"></div>
              <button type="submit" class="btn btn-primary"
                :class="{'btn-loading': saving}"
                :text="modalBook ? 'Save Changes' : (form.is_stack ? 'Add Stack' : 'Add Book')"></button>
            </form>
          </div>
        </div>

      </section>
    </template>
    <script>
      this.SIZES = ['Small','Medium','Big','Mahabig']
      this.LANGUAGES = ['English','French','Spanish','Arabic','Bengali','Hindi','Gujarati','Chinese','Farsi','Russian','Urdu']
      // Languages the BBT tracks separately — Mandir defaults "Exclude from BBT" on
      // for these and shows a reminder note (the flag is still editable per book).
      this.TRACKED_SEPARATELY = ['Farsi','Arabic']
      this.isTrackedSeparately = function(lang) { return this.TRACKED_SEPARATELY.indexOf(lang) >= 0 }
      // Excluding a book from the BBT report zeroes its score (no points computed);
      // un-excluding restores the page-derived score.
      this.setExcludeFromBBT = function(on) {
        this.form.exclude_from_bbt = on
        this.form.points_per_unit = on ? 0 : this.autoPointsFromPages(this.form.pages)
      }
      // Low stock is per-book now: each book carries its own low_stock_threshold (default 5).
      this.isLowStock = function(b) { return (b.stock || 0) <= (b.low_stock_threshold ?? 5) }
      this.showModal = false
      this._downOnBackdrop = false
      this.modalBook = null
      this.form = { title:'', language:'', cover:'Soft', points_per_unit:0, cost_cents:0, retail_price_cents:0, exclude_from_bbt:false, low_stock_threshold:5, pages:null, stock:0, note:'', active:true, is_stack:false, items:[] }
      this.componentSearch = ''
      // Snapshot of the catalog taken when the modal opens — the `books` prop is
      // not in scope inside the modal subtree, so the stack picker reads this instead.
      this._catalog = []
      this.saving = false
      this.saveErr = null
      this.importing = false
      this.filterSearch = ''
      this.filterSize = ''
      this.filterLanguage = ''
      this.filterCover = ''
      this.filterType = ''   // '' = all, 'book', 'stack'
      this.filteredBooks = function() {
        var self = this
        var q = (self.filterSearch || '').toLowerCase()
        return (self.books || []).filter(function(b) {
          var stack = !!b.is_stack
          if (self.filterType === 'book' && stack) return false
          if (self.filterType === 'stack' && !stack) return false
          if (q && !(b.title || '').toLowerCase().includes(q)) return false
          if (self.filterLanguage) {
            // A stack matches a language if any of its component books is in it.
            var langOK = stack ? self.stackLangs(b).indexOf(self.filterLanguage) >= 0 : b.language === self.filterLanguage
            if (!langOK) return false
          }
          // Size / cover are book-only filters → exclude stacks when set.
          if (self.filterSize && (stack || self.sizeLabel(b.category) !== self.filterSize)) return false
          if (self.filterCover) {
            if (stack) return false
            var cover = (b.category && b.category[0] === 'H') ? 'Hard' : 'Soft'
            if (cover !== self.filterCover) return false
          }
          return true
        })
      }
      this.catCls = function(cat) {
        return ({ S1:'cat-blue', S2:'cat-teal', S3:'cat-green', S4:'cat-purple',
                  H1:'cat-blue', H2:'cat-teal', H3:'cat-green', H4:'cat-purple' })[cat] || 'cat-gray'
      }
      this.coverLabel = function(cat) { return (cat && cat[0] === 'H') ? 'Hard cover' : 'Soft cover' }
      this.coverCls = function(cat) { return (cat && cat[0] === 'H') ? 'cat-purple' : 'cat-blue' }
      // The category code is internal: cover + page count fully determine it.
      // Page count → size tier (rubric ranges). Anything below 150 is Small (tier 1).
      // A blank/invalid page count → tier 0 = size pending (cover known, no score).
      this.tierFromPages = function(p) {
        p = parseInt(p, 10) || 0
        if (p < 1) return 0
        if (p >= 500) return 4
        if (p >= 300) return 3
        if (p >= 150) return 2
        return 1
      }
      this.coverLetter = function(cover) { return cover === 'Hard' ? 'H' : 'S' }
      this.categoryFrom = function(cover, pages) { return this.coverLetter(cover) + this.tierFromPages(pages) }
      this.autoPointsFromPages = function(pages) { return ({ 0:0, 1:0.25, 2:0.5, 3:1.0, 4:2.0 })[this.tierFromPages(pages)] }
      // Size label read from a STORED code's digit (tier 0 = pending).
      this.sizeLabel = function(cat) { return ({ '0':'Pending', '1':'Small', '2':'Medium', '3':'Big', '4':'Mahabig' })[cat && cat[1]] || '—' }
      // ── Stacks ──────────────────────────────────────────────
      this.isStack = function(b) { return !!(b && b.is_stack) }
      this.setIsStack = function(on) {
        this.form.is_stack = on
        if (on) { this.form.items = []; this.form.points_per_unit = 0; this.form.cost_cents = 0 }
        else { this.form.points_per_unit = this.autoPointsFromPages(this.form.pages) }
      }
      this.bookById = function(id) { var list = (this.books && this.books.length) ? this.books : (this._catalog || []); return list.find(function(x) { return x.id === id }) }
      this.isComponent = function(id) { return this.form.items.indexOf(id) >= 0 }
      this.toggleComponent = function(id) {
        var items = this.form.items.slice()
        var i = items.indexOf(id)
        if (i >= 0) items.splice(i, 1)
        else items.push(id)
        this.form.items = items          // reassign → sprae reacts, checkbox ticks
        // Auto-fill score & cost from the new component set (editable afterwards).
        this.form.points_per_unit = this.stackPointsSum()
        this.form.cost_cents = this.stackCostSum()
      }
      this.stackComponentBooks = function() {
        var self = this
        return this.form.items.map(function(id) { return self.bookById(id) }).filter(Boolean)
      }
      this.stackPointsSum = function() {
        return Math.round(this.stackComponentBooks().reduce(function(s, b) { return s + (b.points_per_unit || 0) }, 0) * 100) / 100
      }
      this.stackCostSum = function() {
        return this.stackComponentBooks().reduce(function(s, b) { return s + (b.cost_cents || 0) }, 0)
      }
      this.stackLanguages = function() {
        var langs = []
        this.stackComponentBooks().forEach(function(b) { if (b.language && langs.indexOf(b.language) < 0) langs.push(b.language) })
        return langs
      }
      this.componentResults = function() {
        var q = (this.componentSearch || '').toLowerCase()
        return (this._catalog || []).filter(function(b) {
          if (b.is_stack || b.active === false) return false
          if (!q) return true
          return (b.title || '').toLowerCase().includes(q) || (b.language || '').toLowerCase().includes(q)
        }).slice(0, 40)
      }
      // Card helpers — operate on a stored stack row's items ([{ book_id }]).
      this.stackItemIds = function(b) { return (b.items || []).map(function(it) { return it.book_id }) }
      this.stackContents = function(b) {
        var self = this
        return this.stackItemIds(b).map(function(id) { return self.bookById(id) }).filter(Boolean)
      }
      this.stackAvailable = function(b) {
        var comps = this.stackContents(b)
        if (!comps.length) return 0
        return Math.min.apply(null, comps.map(function(c) { return c.stock || 0 }))
      }
      this.stackLangs = function(b) {
        var langs = []
        this.stackContents(b).forEach(function(c) { if (c.language && langs.indexOf(c.language) < 0) langs.push(c.language) })
        return langs
      }
      this.stackTitles = function(b) {
        return this.stackContents(b).map(function(c) { return c.title }).join(', ')
      }
      this.openAdd = function() {
        this.form.title = ''
        this.form.language = ''
        this.form.cover = 'Soft'
        this.form.pages = null
        this.form.points_per_unit = this.autoPointsFromPages(null)
        this.form.cost_cents = 0
        this.form.retail_price_cents = 0
        this.form.exclude_from_bbt = false
        this.form.low_stock_threshold = 5
        this.form.stock = 0
        this.form.note = ''
        this.form.is_stack = false
        this.form.items = []
        this.componentSearch = ''
        this._catalog = (this.books || []).slice()
        this.modalBook = null
        this.saveErr = null
        this.showModal = true
      }
      this.openEdit = function(b) {
        this.form.title = b.title || ''
        this.form.language = b.language || ''
        this.form.cover = (b.category && b.category[0] === 'H') ? 'Hard' : 'Soft'
        this.form.pages = b.pages || null
        // Preserve the stored score (a stack/custom score is not re-derived).
        this.form.points_per_unit = b.points_per_unit ?? this.autoPointsFromPages(b.pages)
        this.form.cost_cents = b.cost_cents || 0
        this.form.retail_price_cents = b.retail_price_cents || 0
        this.form.exclude_from_bbt = !!b.exclude_from_bbt
        this.form.low_stock_threshold = b.low_stock_threshold ?? 5
        this.form.stock = b.stock ?? 0
        this.form.note = b.note || ''
        this.form.active = b.active !== false
        this.form.is_stack = !!b.is_stack
        this.form.items = b.is_stack ? this.stackItemIds(b) : []
        this.componentSearch = ''
        this._catalog = (this.books || []).slice()
        this.modalBook = b
        this.saveErr = null
        this.showModal = true
      }
      this.closeModal = function() {
        this.form.is_stack = false
        this.form.items = []
        this.componentSearch = ''
        this.showModal = false
      }
      this.saveBook = function() {
        var self = this
        self.saving = true
        self.saveErr = null
        // Stacks: send is_stack + items + the (component-derived, editable) score/cost.
        // The backend derives category/language/books_per_unit; no book-only fields.
        var formChanges = self.form.is_stack ? {
          title:              self.form.title,
          is_stack:           true,
          items:              self.form.items,
          points_per_unit:    self.form.points_per_unit || 0,
          cost_cents:         self.form.cost_cents || 0,
          retail_price_cents: self.form.retail_price_cents || 0,
          note:               self.form.note || '',
        } : {
          title:               self.form.title,
          language:            self.form.language || '',
          category:            self.categoryFrom(self.form.cover, self.form.pages),
          points_per_unit:     self.form.points_per_unit || 0,
          cost_cents:          self.form.cost_cents || 0,
          retail_price_cents:  self.form.retail_price_cents || 0,
          exclude_from_bbt:    !!self.form.exclude_from_bbt,
          low_stock_threshold: self.form.low_stock_threshold ?? 5,
          pages:               self.form.pages || null,
          note:                self.form.note || '',
        }
        var payload, req
        if (self.modalBook) {
          // PUT: preserve every existing server field (retail_price_cents, etc.)
          // by spreading modalBook first, then overlaying form values.
          payload = Object.assign({}, self.modalBook, formChanges, {
            stock:  self.form.stock || 0,
            active: !!self.form.active,
          })
          delete payload.id
          delete payload.created_at
          delete payload.updated_at
          req = self.api.updateSankirtanBook(self.modalBook.id, payload)
        } else {
          // Add: the admin enters the current on-hand count.
          payload = Object.assign({ stock: self.form.stock || 0 }, formChanges)
          req = self.api.createSankirtanBook(payload)
        }
        req
          .then(function() {
            self.saving = false
            self.showModal = false
            self.toast && self.toast(self.modalBook ? 'Book updated' : 'Book added', 'success')
            self.emit('reload')
          })
          .catch(function(e) {
            self.saving = false
            self.saveErr = e.message || 'Failed to save'
          })
      }
      this.exportCatalog = function() {
        var self = this
        self.api.downloadSankirtanCatalogXLSX()
          .catch(function(e) { self.toast && self.toast(e.message || 'Failed to export', 'error') })
      }
      this.importCatalog = function(file) {
        if (!file) return
        var self = this
        self.importing = true
        self.api.importSankirtanBooks(file)
          .then(function(res) {
            self.importing = false
            var msg = 'Imported ' + (res.imported || 0) + ' book' + (res.imported === 1 ? '' : 's')
            if (res.updated) msg += ', ' + res.updated + ' updated'
            if (res.skipped) msg += ', ' + res.skipped + ' skipped'
            var stacks = (res.stacks_imported || 0) + (res.stacks_updated || 0)
            if (stacks) msg += ', ' + stacks + ' stack' + (stacks === 1 ? '' : 's')
            self.toast && self.toast(msg, 'success')
            self.emit('reload')
          })
          .catch(function(e) {
            self.importing = false
            self.toast && self.toast(e.message || 'Failed to import', 'error')
          })
      }
      this.doDelete = function(b) {
        var self = this
        b._deleting = true
        self.api.deleteSankirtanBook(b.id)
          .then(function(res) {
            b._deleting = false
            b._confirm = false
            if (res && res.archived) {
              self.toast && self.toast('Book is in use — archived instead of deleted')
            } else {
              self.toast && self.toast('Book deleted', 'success')
            }
            self.emit('reload')
          })
          .catch(function(e) {
            b._deleting = false
            b._confirm = false
            self.toast && self.toast(e.message || 'Failed to delete')
          })
      }
    </script>
  </sankirtan-catalog-tab>
</define-element>
