<define-element>
  <transaction-filter-bar search:string="" filtertype:string="" expfiltercats:array expfilterstatus:string="" incfiltertype:string="" incfiltermethods:array amtmin:string="" amtmax:string="" amtlo:number amthi:number amtceil:number amthist:array datefrom:string="" dateto:string="" expcats:array incmethods:array resultcount:number="0">
    <style>:host { display: contents; }</style>
    <template>
      <div class="filter-search-wrap" :onclick.outside="panel = false">
        <input class="filter-search filter-search-input" type="search" placeholder="Search all transactions…"
          :value="search" :oninput.debounce-150="e => _change({ search: e.target.value })">
        <div :class="{'hidden': !(filtertype || datefrom || dateto || amtmin || amtmax || (filtertype === 'expense' && (expfiltercats.length || expfilterstatus)) || (filtertype === 'income' && (incfiltertype || incfiltermethods.length)))}" class="filter-inline-chips" data-testid="filter-chips">
          <span :if="filtertype" class="chip filter-inline-chip" :onclick="_change({ filtertype: '' })" :text="(filtertype === 'expense' ? 'Expenses' : 'Income') + ' ×'"></span>
          <span :if="filtertype === 'expense'" :each="cat in expfiltercats" class="chip filter-inline-chip" :onclick="_change({ expfiltercats: expfiltercats.filter(x => x !== cat) })" :text="fmtCat(cat) + ' ×'"></span>
          <span :if="filtertype === 'expense' && expfilterstatus" class="chip filter-inline-chip" :onclick="_change({ expfilterstatus: '' })" :text="fmtStatus(expfilterstatus) + ' ×'"></span>
          <span :if="filtertype === 'income' && incfiltertype" class="chip filter-inline-chip" :onclick="_change({ incfiltertype: '' })" :text="fmtCat(incfiltertype) + ' ×'"></span>
          <span :if="filtertype === 'income'" :each="met in incfiltermethods" class="chip filter-inline-chip" :onclick="_change({ incfiltermethods: incfiltermethods.filter(x => x !== met) })" :text="met + ' ×'"></span>
          <span :if="amtmin || amtmax" class="chip filter-inline-chip" :onclick="_change({ amtmin: '', amtmax: '' })" :text="'$' + amtlo + '–$' + amthi + ' ×'"></span>
          <span :if="datefrom" class="chip filter-inline-chip" :onclick="_change({ datefrom: '' })" :text="'From ' + datefrom + ' ×'"></span>
          <span :if="dateto" class="chip filter-inline-chip" :onclick="_change({ dateto: '' })" :text="'To ' + dateto + ' ×'"></span>
        </div>
        <div class="filter-search-seg">
          <button class="btn btn-filter filter-search-btn" :class="{'filter-search-btn-active': panel || filtertype || datefrom || dateto || amtmin || amtmax || expfiltercats.length || expfilterstatus || incfiltertype || incfiltermethods.length}" :onclick="panel = !panel">Filter</button>
          <div class="filter-dropdown hidden" data-testid="filter-panel" :class="{'hidden': !panel}">
            <div class="field">
              <label>Type</label>
              <div class="seg-group" style="width:100%">
                <span class="seg" style="flex:1;text-align:center" :class="{'seg-active': !filtertype}" :onclick="_change({ filtertype: '' })">All</span>
                <span class="seg" style="flex:1;text-align:center" :class="{'seg-active': filtertype === 'expense'}" :onclick="_change({ filtertype: 'expense' })">Expenses</span>
                <span class="seg" style="flex:1;text-align:center" :class="{'seg-active': filtertype === 'income'}" :onclick="_change({ filtertype: 'income' })">Income</span>
              </div>
            </div>

            <!-- Expense specific filters -->
            <div :class="{'hidden': filtertype === 'income'}" class="field">
              <label>Category</label>
              <div class="tag-cloud">
                <span :each="cat in expcats" class="tag" :class="catCls(cat) + (expfiltercats.includes(cat) ? ' tag-active' : '')"
                  :onclick="_change({ expfiltercats: expfiltercats.includes(cat) ? expfiltercats.filter(x => x !== cat) : [].concat(expfiltercats, [cat]) })"
                  :text="fmtCat(cat)"></span>
              </div>
            </div>
            <div :class="{'hidden': filtertype === 'income'}" class="field">
              <label>Status</label>
              <select :value="expfilterstatus" :onchange="e => _change({ expfilterstatus: e.target.value })">
                <option value="" :selected="!expfilterstatus">All statuses</option>
                <option value="submitted" :selected="expfilterstatus === 'submitted'">Approval</option>
                <option value="approved" :selected="expfilterstatus === 'approved'">Approved</option>
                <option value="paid" :selected="expfilterstatus === 'paid'">Paid</option>
                <option value="rejected" :selected="expfilterstatus === 'rejected'">Rejected</option>
              </select>
            </div>

            <!-- Income specific filters -->
            <div :class="{'hidden': filtertype === 'expense'}" class="field">
              <label>Income Type</label>
              <div class="seg-group" style="width:100%">
                <span class="seg" style="flex:1;text-align:center" :class="{'seg-active': !incfiltertype}" :onclick="_change({ incfiltertype: '' })">All</span>
                <span class="seg" style="flex:1;text-align:center" :class="{'seg-active': incfiltertype === 'donation'}" :onclick="_change({ incfiltertype: 'donation' })">Donations</span>
                <span class="seg" style="flex:1;text-align:center" :class="{'seg-active': incfiltertype === 'other'}" :onclick="_change({ incfiltertype: 'other' })">Other</span>
              </div>
            </div>
            <div :class="{'hidden': filtertype === 'expense'}" class="field" :scope="{ methods: incmethods }">
              <label>Payment Method</label>
              <div class="tag-cloud">
                <span :each="met in methods" class="tag" :class="incfiltermethods.includes(met) ? 'tag-active' : ''"
                  :onclick="_change({ incfiltermethods: incfiltermethods.includes(met) ? incfiltermethods.filter(x => x !== met) : [].concat(incfiltermethods, [met]) })"
                  :text="met"></span>
              </div>
            </div>
            <div class="field">
              <label>Amount range</label>
              <div class="range-track">
                <div class="range-hist" :if="amthist.length">
                  <span :each="(h, i) in amthist" class="range-hist-bar" :style="'height:' + (h * 100) + '%'" :class="{'range-hist-bar-dim': i < (_amtToPos(amtlo) / 1000 * amthist.length) || i >= (_amtToPos(amthi) / 1000 * amthist.length)}"></span>
                </div>
                <div class="range-slider" :ref="el => { el.style.setProperty('--lh', (_amtToPos(amtlo) / 10) + '%'); el.style.setProperty('--rh', (_amtToPos(amthi) / 10) + '%') }">
                  <input type="range" class="range-lo" min="0" max="1000" step="1"
                    :ref="el => { el.value = _amtToPos(amtlo) }"
                    :oninput="e => _rangeSync(e, +e.target.value, true)">
                  <input type="range" class="range-hi" min="0" max="1000" step="1"
                    :ref="el => { el.value = _amtToPos(amthi) }"
                    :oninput="e => _rangeSync(e, +e.target.value, false)">
                </div>
              </div>
              <div style="display:flex;gap:var(--s-sm);align-items:center">
                <span class="input-prefix"><span class="input-prefix-label">$</span><input type="number" min="0" placeholder="Min" :value="amtmin"
                  :onchange="e => { var v = Math.max(0, Math.min(+e.target.value || 0, amthi)); _change({ amtmin: e.target.value === '' ? '' : v }) }"></span>
                <span class="dim">—</span>
                <span class="input-prefix"><span class="input-prefix-label">$</span><input type="number" min="0" placeholder="Max" :value="amtmax"
                  :onchange="e => { var v = Math.min(amtceil, Math.max(+e.target.value || 0, amtlo)); _change({ amtmax: v >= amtceil ? '' : v }) }"></span>
              </div>
            </div>
            <div class="field">
              <label>Date range</label>
              <div style="display:flex;gap:var(--s-sm);align-items:center">
                <input type="date" :value="datefrom" :onchange="e => _change({ datefrom: e.target.value })" style="flex:1">
                <span class="dim">—</span>
                <input type="date" :value="dateto" :onchange="e => _change({ dateto: e.target.value })" style="flex:1">
              </div>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center;padding-top:var(--s-sm);border-top:1px solid var(--c-border)">
              <button class="btn-link" :if="filtertype || datefrom || dateto || amtmin || amtmax || expfiltercats.length || expfilterstatus || incfiltertype || incfiltermethods.length"
                :onclick="_change({ filtertype: '', expfiltercats: [], expfilterstatus: '', incfiltertype: '', incfiltermethods: [], datefrom: '', dateto: '', amtmin: '', amtmax: '' }); panel = false" :text="'Clear all'"></button>
              <span :if="!filtertype && !datefrom && !dateto && !amtmin && !amtmax && !expfiltercats.length && !expfilterstatus && !incfiltertype && !incfiltermethods.length"></span>
              <button class="btn btn-primary btn-sm" :onclick="panel = false" :text="'Show ' + resultcount + ' results'"></button>
            </div>
          </div>
        </div>
      </div>
    </template>
    <script>
      this.panel = false
      this._amtTimer = null

      this._change = function(patch) {
        this.emit('change', patch)
      }

      this._changeDebounced = function(patch) {
        clearTimeout(this._amtTimer)
        this._amtTimer = setTimeout(() => this._change(patch), 500)
      }

      this._amtToPos = function(amt) {
        var c = this.amtceil
        if (!c || !amt || amt <= 0) return 0
        if (amt >= c) return 1000
        return Math.round(Math.log(amt + 1) / Math.log(c + 1) * 1000)
      }

      this._posToAmt = function(pos) {
        var c = this.amtceil
        if (!c || pos <= 0) return 0
        if (pos >= 1000) return c
        return Math.round(Math.exp(pos / 1000 * Math.log(c + 1)) - 1)
      }

      this._syncRangeVars = function() {
        var root = this.host || this
        var slider = root.querySelector?.('.range-slider')
        if (!slider) return
        var loPos = this._amtToPos(this.amtlo)
        var hiPos = this._amtToPos(this.amthi)
        slider.style.setProperty('--lh', (loPos / 10) + '%')
        slider.style.setProperty('--rh', (hiPos / 10) + '%')
        var loInput = slider.querySelector('.range-lo')
        var hiInput = slider.querySelector('.range-hi')
        if (loInput) loInput.value = loPos
        if (hiInput) hiInput.value = hiPos
      }

      this._rangeSync = function(e, pos, isLo) {
        var v = this._posToAmt(pos)
        var slider = e.target.closest('.range-slider')
        if (slider) {
          if (isLo) slider.style.setProperty('--lh', (pos / 10) + '%')
          else slider.style.setProperty('--rh', (pos / 10) + '%')
        }
        if (isLo) this.amtlo = v; else this.amthi = pos >= 1000 ? this.amtceil : v
        var numEl = this.host.querySelector('input[type="number"][placeholder="' + (isLo ? 'Min' : 'Max') + '"]')
        if (numEl) numEl.value = isLo ? (v || '') : (pos >= 1000 ? '' : v)
        var patch = isLo ? { amtmin: v || '' } : { amtmax: pos >= 1000 ? '' : v }
        this._changeDebounced(patch)
      }

      this.onconnected = function() {
        queueMicrotask(() => this._syncRangeVars?.())
      }
      this.onpropchange = function(k) {
        if (['amtlo', 'amthi', 'amtceil'].includes(k)) queueMicrotask(() => this._syncRangeVars?.())
      }
    </script>
  </transaction-filter-bar>
</define-element>
