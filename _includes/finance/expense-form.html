<!-- Expense existing modal -->
<template id="exp-existing-modal-template">
<div class="modal-overlay" :onkeydown.esc.document="e => { if (lightboxSrc || filePickerOpen) return; cancelAdd() }">
  <div class="modal modal-expense" :onclick.outside="e => { if (lightboxSrc || filePickerOpen) return; cancelAdd() }">
    <div class="expense-media-pane"
      :ondragover="e => e.preventDefault()"
      :ondrop="e => { e.preventDefault(); addReceipts(e.dataTransfer.files) }">
      
      <div :if="!expAttachments.length && !receipts.length" class="expense-media-empty"
        :onclick="() => { filePickerOpen = true; document.getElementById('receipt-input-existing').click() }">
        <div class="scan-icon">
          <span :html="icon('scan_receipts')"></span>
        </div>
        <div class="expense-media-empty-title">Scan image</div>
      </div>

      <div :if="expAttachments.length || receipts.length" class="receipt-carousel">
        <div id="exp-receipt-track-existing" class="receipt-carousel-track" :onscroll="e => syncExpenseReceiptSlide(e)">
          <div :each="(item, i) in expenseReceiptItems(expAttachments)" class="receipt-thumb receipt-thumb-gallery"
            :class="{ 'receipt-extracting': item.kind === 'queued' && item.value.extracting, 'receipt-error': item.kind === 'queued' && item.value.err, 'receipt-duplicate': item.kind === 'queued' && item.value.duplicate }"
            :onclick="e => {
              if (item.kind === 'saved') {
                return item.value.mime_type?.startsWith('image/')
                  ? (lightboxSrc = apiBase + '/' + item.value.file_path)
                  : window.open(apiBase + '/' + item.value.file_path, '_blank')
              }
              if (!e.target.closest('.receipt-remove') && item.value.preview) lightboxSrc = item.value.preview
            }">
            <img :if="item.kind === 'saved' && item.value.mime_type?.startsWith('image/')" :src="apiBase + '/' + item.value.file_path" :alt="item.value.original_name">
            <img :if="item.kind === 'queued' && item.value.preview" :src="item.value.preview">
            <div :if="item.kind === 'saved' && !item.value.mime_type?.startsWith('image/')" class="receipt-placeholder" :text="item.value.original_name?.split('.').pop()?.toUpperCase() || 'FILE'"></div>
            <div :if="item.kind === 'queued' && !item.value.preview" class="receipt-placeholder" :text="item.value.name?.split('.').pop()?.toUpperCase() || 'FILE'"></div>
            <div class="receipt-amount" :if="item.kind === 'queued' && item.value.extracting" :text="'Scanning…'"></div>
            <div :if="item.kind === 'queued' && item.value.extracting" class="receipt-spinner"></div>
            <button :if="item.kind === 'queued'" type="button" class="receipt-remove" :onclick="removeReceipt(item.value)">&times;</button>
          </div>
        </div>
        <div class="receipt-dots" :if="expenseReceiptItems(expAttachments).length > 1">
          <button type="button" class="receipt-dot" :each="(_, i) in expenseReceiptItems(expAttachments)" :class="expenseReceiptDotClass(i)" :onclick="jumpExpenseReceiptSlide('exp-receipt-track-existing', i)"></button>
        </div>
      </div>
      <button :if="expAttachments.length || receipts.length" type="button" class="receipt-add receipt-add-gallery"
        :onclick="() => { filePickerOpen = true; document.getElementById('receipt-input-existing').click() }">
        + Add more
      </button>
      <input id="receipt-input-existing" type="file" accept="image/*,.pdf" multiple style="display:none"
        :onchange="e => { addReceipts(e.target.files); e.target.value = '' }">
    </div>

    <div class="expense-content-pane">
      <div class="modal-header">
        <h2 style="display:flex;align-items:center;gap:var(--s-sm)">
          <span>Edit Expense</span>
          <span :if="detailExp?.expense_no" class="dim modal-title-sub" :text="'#' + detailExp?.expense_no"></span>
          <span :if="detailExp?.status" class="badge" :class="'badge-' + detailExp?.status" :text="fmtStatus(detailExp?.status)"></span>
        </h2>
        <button class="modal-close" :onclick="cancelAdd()">&times;</button>
      </div>
      <div class="modal-body">
        <form id="exp-existing-form" :onsubmit.prevent="saveExpense" style="display:flex;flex-direction:column;gap:var(--s-md)">
          <div :if="expEditPolicy.message" class="dim" style="font-size:var(--f-sm)" :text="expEditPolicy.message"></div>
          <div :if="can('expenses:approve')" class="form-row">
            <div class="field autocomplete">
              <label>Payee</label>
              <div style="position:relative">
                <input :id="location.pathname.includes('/app/finance') ? 'exp-vendor' : 'home-exp-vendor'" type="text" :value="expForm.payee"
                :onfocus="e => filterExpensePayees(expForm.payee)"
                :oninput="e => { expForm.member_id = null; filterExpensePayees(e.target.value) }"
                :onblur="e => { vendorHits = []; memberHits = [] }"
                placeholder="Vendor, store, person…" :required="!editId" :disabled="expEditPolicy.payeeLocked">
                <button :if="expForm.member_id && !expEditPolicy.payeeLocked" type="button" class="btn-link"
                  style="position:absolute;right:.5rem;top:50%;transform:translateY(-50%)"
                  :onclick="clearExpMember()">&times;</button>
              </div>
              <div :if="memberHits.length || vendorHits.length" class="autocomplete-list">
                <div :if="memberHits.length" class="autocomplete-group-label">Members</div>
                <div class="autocomplete-item" :each="m in memberHits" :onmousedown.prevent="selectExpMember(m)" :text="m.name"></div>
                <div :if="vendorHits.length" class="autocomplete-group-label">Recent payees</div>
                <div class="autocomplete-item" :each="v in vendorHits" :onmousedown.prevent="selectExpVendor(v)" :text="v"></div>
              </div>
            </div>
            <div class="field">
              <label>Category</label>
              <select :id="location.pathname.includes('/app/finance') ? 'exp-cat' : 'home-exp-cat'" :value="expForm.category" :onchange="e => expForm.category = e.target.value" :disabled="expEditPolicy.lockedAll">
                <option value="" disabled hidden :selected="!(expForm.category || '')">Select…</option>
                {% include partials/expense-category-options.html %}
              </select>
            </div>
          </div>
          <div :if="can('expenses:approve')" class="form-row">
            <div class="field">
              <label>Amount ($)</label>
              <input :id="location.pathname.includes('/app/finance') ? 'exp-amount' : 'home-exp-amount'" type="number" :value="expForm.amount" :oninput="e => { expDirty = true; expForm.amount = e.target.value }" step="0.01" min="0.01" placeholder="0.01" required :disabled="expEditPolicy.amountLocked">
            </div>
            <div class="field">
              <label>Date</label>
              <input :id="location.pathname.includes('/app/finance') ? 'exp-date' : 'home-exp-date'" type="date" :value="expForm.expense_date" :oninput="e => { expDirty = true; expForm.expense_date = e.target.value }" required :disabled="expEditPolicy.dateLocked">
            </div>
          </div>
          <div :if="can('expenses:approve')" class="field">
            <label>Note</label>
            <textarea :id="location.pathname.includes('/app/finance') ? 'exp-desc' : 'home-exp-desc'" rows="1" style="field-sizing:content;resize:none" :value="expForm.note" :oninput="e => { expDirty = true; expForm.note = e.target.value }" placeholder="Optional…" :disabled="expEditPolicy.lockedAll"></textarea>
          </div>
          <div :if="!can('expenses:approve')" class="form-row">
            <div class="field">
              <label>Amount ($)</label>
              <input :id="location.pathname.includes('/app/finance') ? 'exp-amount' : 'home-exp-amount'" type="number" :value="expForm.amount" :oninput="e => expForm.amount = e.target.value" step="0.01" min="0.01" placeholder="0.01" required :disabled="expEditPolicy.amountLocked">
            </div>
            <div class="field">
              <label>Category</label>
              <select :id="location.pathname.includes('/app/finance') ? 'exp-cat' : 'home-exp-cat'" :value="expForm.category" :onchange="e => expForm.category = e.target.value" :disabled="expEditPolicy.lockedAll">
                <option value="" disabled hidden :selected="!(expForm.category || '')">Select…</option>
                {% include partials/expense-category-options.html %}
              </select>
            </div>
          </div>
          <div :if="!can('expenses:approve')" class="field">
            <label>Note</label>
            <textarea :id="location.pathname.includes('/app/finance') ? 'exp-desc' : 'home-exp-desc'" rows="1" style="field-sizing:content;resize:none" :value="expForm.note" :oninput="e => expForm.note = e.target.value" placeholder="Optional…" :disabled="expEditPolicy.lockedAll"></textarea>
          </div>

          <div :if="receipts.some(r => r.duplicate)" class="form-warn">Possible duplicate — a receipt was previously uploaded for another expense</div>
          <div class="form-warn" :if="addErr" :text="addErr"></div>
        </form>

        <div :if="detailExp" style="display:flex;flex-direction:column;gap:var(--s-sm)">
          <div class="stat-label">History</div>
          <div class="activity-feed">
            <div class="activity-item" :each="e in expTimeline">
              <span class="activity-marker" :class="'activity-marker-' + e.badge" :html="activityIcon(e.badge)"></span>
              <div class="activity-copy">
                <div class="activity-line">
                  <span class="activity-label" :text="e.label"></span>
                  <span :if="e.actor"> by </span>
                  <a class="activity-actor-link" :if="e.actor && e.uid && e.uid !== myUid" href="{{ '/app/members/' | relative_url }}" :text="e.actor"></a>
                  <span :if="e.actor && (!e.uid || e.uid === myUid)" :text="e.actor"></span>
                  <span class="activity-date-inline" :if="e.date" :text="timelineShortDate(e.date)"></span>
                </div>
                <div :if="e.detail" class="activity-detail" :text="e.detail"></div>
              </div>
            </div>

            <div class="activity-item activity-item-current">
              <span class="activity-marker" :class="'activity-marker-' + expenseCurrentStatusBadge(detailExp)" :html="activityIcon(expenseCurrentStatusBadge(detailExp))"></span>
              <div class="activity-copy">
                <div class="activity-line activity-line-current">
                  <span class="activity-label" :text="expenseCurrentStatusText(detailExp)"></span>
                  <div :if="detailExp?.status === 'submitted' && can('expenses:approve') && !expRejecting" class="activity-followup-actions activity-followup-actions-inline">
                    <button class="btn btn-primary btn-sm" :class="{'btn-loading': actioning}" :onclick="approveExp()">Approve</button>
                    <button class="btn btn-danger btn-sm" :onclick="openExpenseReject()">Reject</button>
                  </div>
                  <div :if="detailExp?.status === 'submitted' && can('expenses:approve') && expRejecting" class="activity-followup-actions activity-followup-actions-inline activity-followup-actions-reject-inline">
                    <span class="activity-inline-input-wrap">
                      <input class="activity-inline-input" type="text" :value="actionNote" :oninput="e => actionNote = e.target.value" placeholder="Reason">
                      <button class="activity-inline-clear" aria-label="Cancel reject" title="Cancel reject" :onclick="cancelExpenseReject()">×</button>
                    </span>
                    <button class="btn btn-danger btn-sm" :class="{'btn-loading': actioning}" :onclick="rejectExp()">Send</button>
                  </div>
                  <div :if="detailExp?.status === 'approved' && can('expenses:approve')" class="activity-followup-actions activity-followup-actions-inline">
                    <button class="btn btn-primary btn-sm" :class="{'btn-loading': actioning}" :onclick="payExp()">Paid</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div style="display:flex; justify-content:flex-end; gap:var(--s-sm); align-items:center; flex-wrap:wrap">
          <button :if="editId && expMode === 'edit' && detailExp?.status === 'submitted' && !delConfirm" type="button" class="btn btn-danger" style="margin-right:auto" :onclick="delConfirm = true">Delete</button>
          <span :if="delConfirm" class="dim" style="font-size:var(--f-sm); margin-right:auto; align-self:center">Delete permanently?</span>
          <button :if="delConfirm" type="button" class="btn btn-danger" :class="{'btn-loading': deleting}" :onclick="delExpense()">Yes</button>
          <button :if="delConfirm" type="button" class="btn btn-outline" :onclick="delConfirm = false">No</button>
          <button :if="!delConfirm && expMode !== 'edit'" type="button" class="btn btn-outline" :onclick="cancelExpenseEdit()">Close</button>
          <button :if="!delConfirm && expMode !== 'edit' && detailExp?.status === 'submitted'" type="button" class="btn btn-primary" :onclick="beginExpenseEdit()">Edit</button>
          <button :if="!delConfirm && expMode === 'edit'" type="button" class="btn btn-outline" :onclick="cancelExpenseEdit()">Cancel</button>
          <button :if="!delConfirm && expMode === 'edit'" type="submit" form="exp-existing-form" class="btn btn-primary" :class="{'btn-loading': expSaving}" :disabled="expEditPolicy.lockedAll || expSaving">Update</button>
        </div>
      </div>
    </div>
  </div>
</div>
</template>

<!-- Expense create modal -->
<template id="exp-create-modal-template">
<div class="modal-overlay" :onkeydown.esc.document="e => { if (lightboxSrc || filePickerOpen) return; cancelAdd() }">
  <div class="modal modal-expense" :onclick.outside="e => { if (lightboxSrc || filePickerOpen) return; cancelAdd() }">
    <div class="expense-media-pane"
      :ondragover="e => e.preventDefault()"
      :ondrop="e => { e.preventDefault(); addReceipts(e.dataTransfer.files) }">
      
      <div :if="!receipts.length" class="expense-media-empty"
        :onclick="() => { filePickerOpen = true; document.getElementById('receipt-input').click() }">
        <div class="scan-icon">
          <span :html="icon('scan_receipts')"></span>
        </div>
        <div class="expense-media-empty-title">Scan image</div>
      </div>

      <div :if="receipts.length" class="receipt-carousel">
        <div id="exp-receipt-track-create" class="receipt-carousel-track" :onscroll="e => syncExpenseReceiptSlide(e)">
          <div :each="(r, i) in receipts" class="receipt-thumb receipt-thumb-gallery" :class="{ 'receipt-extracting': r.extracting, 'receipt-error': r.err, 'receipt-duplicate': r.duplicate }"
            :onclick="e => { if (!e.target.closest('.receipt-remove') && r.preview) lightboxSrc = r.preview }">
            <img :if="r.preview" :src="r.preview">
            <div :if="!r.preview" class="receipt-placeholder" :text="r.name?.split('.').pop()?.toUpperCase() || 'FILE'"></div>
            <div class="receipt-amount" :if="r.extracting" :text="'Scanning…'"></div>
            <div :if="r.extracting" class="receipt-spinner"></div>
            <button type="button" class="receipt-remove" :onclick="removeReceipt(r)">&times;</button>

        <div class="receipt-dots" :if="receipts.length > 1">

      <button :if="receipts.length" type="button" class="receipt-add receipt-add-gallery"

        :onchange="e => { filePickerOpen = false; addReceipts(e.target.files); e.target.value = '' }">
    </div>

    <div class="expense-content-pane">

        <form id="exp-create-form" :onsubmit.prevent="saveExpense" style="display:flex;flex-direction:column;gap:var(--s-md)">
          <div :if="can('expenses:approve')" class="form-row">
            <div class="field autocomplete">
              <label>Payee</label>
              <div style="position:relative">
                <input :id="location.pathname.includes('/app/finance') ? 'exp-vendor' : 'home-exp-vendor'" type="text" :value="expForm.payee"
                :onfocus="e => filterExpensePayees(expForm.payee)"
                :oninput="e => { expForm.member_id = null; filterExpensePayees(e.target.value) }"
                :onblur="e => { vendorHits = []; memberHits = [] }"
                placeholder="Vendor, store, person…" :required="!editId" :disabled="expEditPolicy.payeeLocked">
                <button :if="expForm.member_id && !expEditPolicy.payeeLocked" type="button" class="btn-link"
                  style="position:absolute;right:.5rem;top:50%;transform:translateY(-50%)"
                  :onclick="clearExpMember()">&times;</button>
              </div>
              <div :if="memberHits.length || vendorHits.length" class="autocomplete-list">
                <div :if="memberHits.length" class="autocomplete-group-label">Members</div>
                <div class="autocomplete-item" :each="m in memberHits" :onmousedown.prevent="selectExpMember(m)" :text="m.name"></div>
                <div :if="vendorHits.length" class="autocomplete-group-label">Recent payees</div>
                <div class="autocomplete-item" :each="v in vendorHits" :onmousedown.prevent="selectExpVendor(v)" :text="v"></div>
              </div>
            </div>
            <div class="field">
              <label>Category</label>
              <select :id="location.pathname.includes('/app/finance') ? 'exp-cat' : 'home-exp-cat'" :value="expForm.category" :onchange="e => expForm.category = e.target.value" :disabled="expEditPolicy.lockedAll">
                <option value="" disabled hidden :selected="!(expForm.category || '')">Select…</option>
                {% include partials/expense-category-options.html %}
              </select>
            </div>
          </div>
          <div :if="can('expenses:approve')" class="form-row">
            <div class="field">
              <label>Amount ($)</label>
              <input :id="location.pathname.includes('/app/finance') ? 'exp-amount' : 'home-exp-amount'" type="number" :value="expForm.amount" :oninput="e => { expDirty = true; expForm.amount = e.target.value }" step="0.01" min="0.01" placeholder="0.01" required :disabled="expEditPolicy.amountLocked">

              <label>Date</label>

          </div>
          <div :if="!can('expenses:approve')" class="form-row">
            <div class="field">
              <label>Amount ($)</label>
              <input :id="location.pathname.includes('/app/finance') ? 'exp-amount' : 'home-exp-amount'" type="number" :value="expForm.amount" :oninput="e => expForm.amount = e.target.value" step="0.01" min="0.01" placeholder="0.01" required :disabled="expEditPolicy.amountLocked">
            </div>
            <div class="field">
              <label>Category</label>
              <select :id="location.pathname.includes('/app/finance') ? 'exp-cat' : 'home-exp-cat'" :value="expForm.category" :onchange="e => expForm.category = e.target.value" :disabled="expEditPolicy.lockedAll">
                <option value="" disabled hidden :selected="!(expForm.category || '')">Select…</option>
                {% include partials/expense-category-options.html %}
              </select>
            </div>
          </div>
          <div :if="!can('expenses:approve')" class="field">

            <textarea :id="location.pathname.includes('/app/finance') ? 'exp-desc' : 'home-exp-desc'" rows="1" style="field-sizing:content;resize:none" :value="expForm.note" :oninput="e => expForm.note = e.target.value" placeholder="Optional…" :disabled="expEditPolicy.lockedAll"></textarea>

        <div style="display:flex; justify-content:flex-end; gap:var(--s-sm)">
          <button type="button" class="btn btn-outline" :onclick="cancelAdd()">Cancel</button>

        </div>
      </div>
    </div>
  </div>
</div>
</template>
<div :html="showAdd && activeTab === 'expenses'
  ? document.getElementById(
      expMode === 'create'
        ? 'exp-create-modal-template'
        : 'exp-existing-modal-template'
    )
  : ''"></div>
<div :if="lightboxSrc" class="lightbox" :onclick="lightboxSrc = ''" :onkeydown.esc.document="lightboxSrc = ''">
  <img :src="lightboxSrc">
  <button class="lightbox-close" :onclick="lightboxSrc = ''">&times;</button>
</div>
