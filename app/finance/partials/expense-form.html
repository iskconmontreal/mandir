<!-- Expense modal (add/edit/detail) -->
<div class="modal-overlay" :if="showAdd && activeTab === 'expenses'" :onkeydown.esc.document="e => { if (lightboxSrc || filePickerOpen) return; showAdd = false }">
  <div class="modal" :onclick.outside="e => { if (lightboxSrc || filePickerOpen) return; showAdd = false }">
    <div class="modal-header">
      <h2 :if="!detailExp" :text="editId ? 'Edit Expense' : 'Add Expense'"></h2>
      <h2 :if="detailExp" style="display:flex;align-items:center;gap:var(--s-sm)">
        <span :text="detailExp?.expense_no || 'Expense'"></span>
        <span class="badge" :class="'badge-' + detailExp?.status" :text="fmtStatus(detailExp?.status)"></span>
      </h2>
      <button class="modal-close" :onclick="showAdd = false">&times;</button>
    </div>
    <div class="modal-body">

      <!-- ===== DETAIL MODE (non-editable states) ===== -->
      <div :if="detailExp && !expEditable" style="display:flex;flex-direction:column;gap:var(--s-md)">
        <div class="detail-grid">
          <div class="detail-field">
            <div class="stat-label">Amount</div>
            <div :text="'$' + fmtAmt(detailExp?.amount)"></div>
          </div>
          <div class="detail-field" :if="detailExp?.tax_amount">
            <div class="stat-label">Tax</div>
            <div :text="'$' + fmtAmt(detailExp?.tax_amount)"></div>
          </div>
          <div class="detail-field">
            <div class="stat-label">Payee</div>
            <div :text="detailExp?.member_id ? (memberNames[detailExp?.member_id] || detailExp?.payee) : detailExp?.payee"></div>
          </div>
          <div class="detail-field">
            <div class="stat-label">Category</div>
            <div :text="fmt(detailExp?.category)"></div>
          </div>
          <div class="detail-field">
            <div class="stat-label">Date</div>
            <div :text="detailExp?.expense_date?.slice(0,10) || '—'"></div>
          </div>
          <div class="detail-field" :if="detailExp?.bank_ref">
            <div class="stat-label">Bank Ref</div>
            <div :text="detailExp?.bank_ref"></div>
          </div>
          <div class="detail-field" :if="detailExp?.member_id">
            <div class="stat-label">Submitted by</div>
            <div :text="memberNames[detailExp?.member_id] || '—'"></div>
          </div>
        </div>
        <div :if="detailExp?.description">
          <div class="stat-label">Description</div>
          <div :text="detailExp?.description"></div>
        </div>

        <div :if="expAttachments.length">
          <div class="stat-label" style="margin-bottom:var(--s-sm)">Receipts</div>
          <div class="receipt-strip" style="flex-wrap:wrap;cursor:default">
            <div :each="a in expAttachments" class="receipt-thumb"
              :onclick="a.mime_type?.startsWith('image/') ? (lightboxSrc = apiBase + '/' + a.file_path) : window.open(apiBase + '/' + a.file_path, '_blank')">
              <img :if="a.mime_type?.startsWith('image/')" :src="apiBase + '/' + a.file_path" :alt="a.original_name">
              <div :if="!a.mime_type?.startsWith('image/')" class="receipt-placeholder" :text="a.original_name?.split('.').pop()?.toUpperCase() || 'FILE'"></div>
            </div>
          </div>
        </div>

        <!-- Activity timeline -->
        <div :if="expTimeline.length">
          <div class="stat-label" style="margin-bottom:var(--s-sm)">Activity</div>
          <div class="activity-feed">
            <div class="activity-item" :each="e in expTimeline">
              <div class="activity-icon" :class="'activity-icon-' + e.badge" :html="activityIcon(e.badge)"></div>
              <div class="activity-body">
                <span :if="e.actor" class="activity-actor"><a :if="e.uid && e.uid !== myUid" href="{{ '/app/members/' | relative_url }}" :text="e.actor"></a><span :if="!e.uid || e.uid === myUid" :text="e.actor"></span> </span>
                <span :text="e.actor ? e.label.toLowerCase() : e.label"></span>
                <span :if="e.detail" class="dim" :text="' · ' + e.detail"></span>
              </div>
              <span class="activity-date" :text="fmtDate(e.date)"></span>
            </div>
          </div>
        </div>

        <!-- Workflow actions -->
        <div :if="detailExp?.status === 'submitted' && can('expenses:approve')" class="action-section">
          <div class="field">
            <label>Note</label>
            <textarea rows="2" :value="actionNote" :oninput="e => actionNote = e.target.value" placeholder="Optional note for approval…"></textarea>
          </div>
        </div>

        <div :if="detailExp?.status === 'approved' && can('expenses:approve')" class="action-section">
          <div class="field">
            <label>Bank Reference</label>
            <input type="text" :value="actionRef" :oninput="e => actionRef = e.target.value" placeholder="e-Transfer ref, cheque #…">
          </div>
        </div>

        <div class="login-error" :if="addErr" :text="addErr"></div>

        <div style="display:flex; justify-content:flex-end; gap:var(--s-sm); align-items:center">
          <button :if="detailExp?.status === 'submitted' && can('expenses:approve')" class="btn btn-danger btn-sm" :class="{'btn-loading': actioning}" :onclick="rejectExp()" style="margin-right:auto">Reject</button>
          <button :if="detailExp?.status === 'submitted' && can('expenses:approve')" class="btn btn-primary btn-sm" :class="{'btn-loading': actioning}" :onclick="approveExp()">Approve</button>
          <button :if="detailExp?.status === 'approved' && can('expenses:approve')" class="btn btn-primary btn-sm" :class="{'btn-loading': actioning}" :onclick="payExp()">Done</button>
          <button class="btn btn-outline btn-sm" :onclick="showAdd = false">Close</button>
        </div>
      </div>

      <!-- ===== EDIT MODE (submitted/new) ===== -->
      <div :if="!detailExp || expEditable" style="display:flex;flex-direction:column;gap:var(--s-md)">
        <div :if="!editId" class="receipt-strip"
          :ondragover="e => e.preventDefault()"
          :ondrop="e => { e.preventDefault(); addReceipts(e.dataTransfer.files) }">
          <div :if="!receipts.length" style="flex:1;text-align:center;cursor:pointer"
            :onclick="() => { filePickerOpen = true; document.getElementById('receipt-input').click() }">
            <div class="scan-icon">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/>
                <line x1="9" y1="3" x2="9" y2="9"/><circle cx="14" cy="15" r="2.5"/><path d="M16 17l2.5 2.5"/>
              </svg>
            </div>
            <div style="font-weight:var(--f-wt-b)">Scan receipts</div>
            <div class="scan-hint">Drop images or PDFs, or click to browse</div>
          </div>
          <div :each="r in receipts" class="receipt-thumb" :class="{ 'receipt-extracting': r.extracting, 'receipt-error': r.err }"
            :onclick="e => { if (!e.target.closest('.receipt-remove') && r.preview) lightboxSrc = r.preview }">
            <img :if="r.preview" :src="r.preview">
            <div :if="!r.preview" class="receipt-placeholder" :text="r.name?.split('.').pop()?.toUpperCase() || 'FILE'"></div>
            <div class="receipt-amount" :if="r.extracting || r.data?.amount" :text="r.extracting ? 'Scanning…' : '$' + r.data.amount"></div>
            <div :if="r.extracting" class="receipt-spinner"></div>
            <button type="button" class="receipt-remove" :onclick="removeReceipt(r)">&times;</button>
          </div>
          <div :if="receipts.length" class="receipt-add"
            :onclick="() => { filePickerOpen = true; document.getElementById('receipt-input').click() }">+</div>
        </div>
        <input id="receipt-input" type="file" accept="image/*,.pdf" multiple style="display:none"
          :oncancel="() => filePickerOpen = false"
          :onchange="e => { filePickerOpen = false; addReceipts(e.target.files); e.target.value = '' }">

        <div :if="editId && expAttachments.length">
          <div class="stat-label" style="margin-bottom:var(--s-sm)">Receipts</div>
          <div class="receipt-strip" style="flex-wrap:wrap;cursor:default">
            <div :each="a in expAttachments" class="receipt-thumb"
              :onclick="a.mime_type?.startsWith('image/') ? (lightboxSrc = apiBase + '/' + a.file_path) : window.open(apiBase + '/' + a.file_path, '_blank')">
              <img :if="a.mime_type?.startsWith('image/')" :src="apiBase + '/' + a.file_path" :alt="a.original_name">
              <div :if="!a.mime_type?.startsWith('image/')" class="receipt-placeholder" :text="a.original_name?.split('.').pop()?.toUpperCase() || 'FILE'"></div>
            </div>
          </div>
        </div>

        <form :onsubmit.prevent="saveExpense" style="display:flex;flex-direction:column;gap:var(--s-md)">
          <div class="field">
            <label for="exp-amount">Amount ($)</label>
            <input id="exp-amount" type="number" :value="expForm.amount" :oninput="e => expForm.amount = e.target.value" step="0.01" min="0.01" placeholder="0.01" required>
          </div>
          <div class="field">
            <label for="exp-desc">Description</label>
            <textarea id="exp-desc" rows="1" :value="expForm.description" :oninput="e => expForm.description = e.target.value" placeholder="What's this for? (optional)"></textarea>
          </div>
          <a :if="!expFull" href="#" class="dim" style="font-size:var(--f-sm)" :onclick.prevent="expFull = true">More fields</a>
          <div :if="expFull" style="display:flex;flex-direction:column;gap:var(--s-md)">
            <div class="form-row">
              <div class="field autocomplete">
                <label for="exp-vendor">Payee</label>
                <input id="exp-vendor" type="text" :value="expForm.payee"
                  :oninput="e => filterVendors(e.target.value)"
                  :onblur="e => { vendorHits = [] }"
                  placeholder="Defaults to your name">
                <div :if="vendorHits.length" class="autocomplete-list">
                  <div class="autocomplete-item" :each="v in vendorHits" :onmousedown.prevent="() => { expForm.payee = v; vendorHits = [] }" :text="v"></div>
                </div>
              </div>
              <div class="field">
                <label for="exp-cat">Category</label>
                <select id="exp-cat" :value="expForm.category" :onchange="e => expForm.category = e.target.value">
                  <option :each="c in expCats" :value="c" :text="fmt(c)"></option>
                </select>
              </div>
            </div>
            <div class="field">
              <label for="exp-date">Date</label>
              <input id="exp-date" type="date" :value="expForm.expense_date" :oninput="e => expForm.expense_date = e.target.value">
            </div>
          </div>

          <div class="login-error" :if="addErr" :text="addErr"></div>

          <div style="display:flex; justify-content:flex-end; gap:var(--s-sm)">
            <button :if="editId && detailExp?.status === 'submitted' && !delConfirm" type="button" class="btn btn-danger btn-sm" style="margin-right:auto" :onclick="delConfirm = true">Delete</button>
            <span :if="delConfirm" class="dim" style="font-size:var(--f-sm); margin-right:auto; align-self:center">Delete permanently?</span>
            <button :if="delConfirm" type="button" class="btn btn-danger btn-sm" :class="{'btn-loading': deleting}" :onclick="delExpense()">Yes</button>
            <button :if="delConfirm" type="button" class="btn btn-outline btn-sm" :onclick="delConfirm = false">No</button>
            <button :if="!editId && !delConfirm" type="button" class="btn btn-outline" :onclick="cancelAdd()">Cancel</button>
            <button :if="!delConfirm" type="submit" class="btn btn-primary" :class="{'btn-loading': adding}" :text="editId ? 'Update' : 'Submit'"></button>
          </div>
        </form>
      </div>

    </div>
  </div>
</div>
<div :if="lightboxSrc" class="lightbox" :onclick="lightboxSrc = ''" :onkeydown.esc.document="lightboxSrc = ''">
  <img :src="lightboxSrc">
  <button class="lightbox-close" :onclick="lightboxSrc = ''">&times;</button>
</div>
